<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AE Matriz</title>
<link rel="manifest" href="manifest_matriz.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0F2A4A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde-escuro:#0F2A4A;
    --verde-medio:#1D5DA8;
    --verde-claro:#9DC0E8;
    --grafite:#1E2A38;
    --cinza:#65758A;
    --cinza-claro:#DEE6F0;
    --cinza-bg:#F2F5FA;
    --branco:#FFFFFF;
    --trigo:#C98A2B;
    --alerta:#B3462F;
    --alerta-bg:#F6E7E2;
    --ok-bg:#E5EEF9;
    --bom:#0C7A43;
    --bom-bg:#E3F1E8;
    --radius:10px;
    --shadow:0 1px 2px rgba(15,42,74,0.06), 0 4px 12px rgba(15,42,74,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--cinza-bg);
    color:var(--grafite);
    -webkit-font-smoothing:antialiased;
  }
  .app{display:flex; min-height:100vh;}
  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:230px; flex-shrink:0; background:var(--verde-escuro); color:var(--branco);
    display:flex; flex-direction:column; padding:24px 16px;
  }
  .brand{display:flex; align-items:center; gap:10px; padding:0 8px 24px 8px; margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.12);}
  .brand-mark{width:32px;height:32px;flex-shrink:0;}
  .brand-name{font-family:'Fraunces',serif; font-weight:600; font-size:19px; letter-spacing:0.2px;}
  nav{margin-top:18px; display:flex; flex-direction:column; gap:4px;}
  .nav-item{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; cursor:pointer;
    font-size:14px; font-weight:500; color:rgba(255,255,255,0.72); transition:background 0.15s, color 0.15s;
    border:none; background:none; width:100%; text-align:left;
  }
  .nav-item:hover{background:rgba(255,255,255,0.06); color:var(--branco);}
  .nav-item.active{background:var(--verde-medio); color:var(--branco);}
  .nav-item svg{flex-shrink:0;}
  .sidebar-footer{margin-top:auto; padding-top:16px; border-top:1px solid rgba(255,255,255,0.12); font-size:11px; color:rgba(255,255,255,0.45); line-height:1.5;}
  /* ---------- MAIN ---------- */
  .main{flex:1; padding:32px 40px 60px 40px; max-width:1180px;}
  .page-header{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:28px; gap:16px; flex-wrap:wrap;}
  .eyebrow{font-size:11px; text-transform:uppercase; letter-spacing:1.4px; color:var(--verde-medio); font-weight:600; margin:0 0 4px 0;}
  h1{font-family:'Fraunces',serif; font-size:28px; font-weight:600; margin:0; color:var(--verde-escuro);}
  .page-desc{color:var(--cinza); font-size:13.5px; margin-top:6px; max-width:560px;}
  .btn{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; padding:10px 18px; border-radius:8px;
    border:none; cursor:pointer; transition:filter 0.15s, transform 0.1s; display:inline-flex; align-items:center; gap:6px;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--verde-escuro); color:var(--branco);}
  .btn-primary:hover{filter:brightness(1.15);}
  .btn-ghost{background:transparent; color:var(--verde-escuro); border:1px solid var(--cinza-claro);}
  .btn-ghost:hover{background:var(--branco);}
  .btn-danger-ghost{background:transparent; color:var(--alerta); border:1px solid var(--cinza-claro); padding:6px 10px; font-size:12px;}
  .btn-danger-ghost:hover{background:var(--alerta-bg);}
  .btn-sm{padding:6px 12px; font-size:12.5px;}

  .card{background:var(--branco); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--cinza-claro);}
  .card-pad{padding:22px 24px;}
  .stat-row{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px;}
  .stat-card{background:var(--branco); border:1px solid var(--cinza-claro); border-radius:var(--radius); padding:16px 18px;}
  .stat-label{font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--cinza); font-weight:600;}
  .stat-value{font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:600; color:var(--verde-escuro); margin-top:6px;}
  .stat-value.alerta{color:var(--alerta);}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.6px; color:var(--cinza); font-weight:600; padding:10px 14px; border-bottom:1px solid var(--cinza-claro); white-space:nowrap;}
  td{padding:12px 14px; border-bottom:1px solid var(--cinza-claro); color:var(--grafite); vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .pill{display:inline-block; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px;}
  .pill-ok{background:var(--ok-bg); color:var(--verde-medio);}
  .pill-alerta{background:var(--alerta-bg); color:var(--alerta);}
  .pill-cat{background:var(--cinza-claro); color:var(--grafite);}
  .pill-warn{background:#F5E9D7; color:var(--trigo);}

  /* form modal */
  .overlay{position:fixed; inset:0; background:rgba(31,61,46,0.35); display:flex; align-items:flex-start; justify-content:center; padding:50px 20px; overflow-y:auto; z-index:50;}
  .modal{background:var(--branco); border-radius:14px; width:100%; max-width:560px; box-shadow:0 20px 60px rgba(0,0,0,0.25);}
  .modal-head{padding:20px 24px; border-bottom:1px solid var(--cinza-claro); display:flex; justify-content:space-between; align-items:center;}
  .modal-head h3{font-family:'Fraunces',serif; font-size:18px; margin:0; color:var(--verde-escuro);}
  .modal-close{background:none;border:none;cursor:pointer;color:var(--cinza);font-size:20px; line-height:1;}
  .modal-body{padding:22px 24px; display:flex; flex-direction:column; gap:14px; max-height:70vh; overflow-y:auto;}
  .modal-foot{padding:16px 24px; border-top:1px solid var(--cinza-claro); display:flex; justify-content:flex-end; gap:10px;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  label{font-size:12px; font-weight:600; color:var(--grafite);}
  input, select, textarea{
    font-family:'Inter',sans-serif; font-size:13.5px; padding:9px 11px; border:1px solid var(--cinza-claro);
    border-radius:7px; background:var(--branco); color:var(--grafite); outline:none;
  }
  input:focus, select:focus, textarea:focus{border-color:var(--verde-medio); box-shadow:0 0 0 3px rgba(61,107,79,0.12);}
  input[type=color]{padding:3px; height:38px; width:100%;}
  .hint{font-size:11px; color:var(--cinza);}
  .composicao-row{display:grid; grid-template-columns: 1fr 90px 32px; gap:8px; align-items:center;}

  .empty{text-align:center; padding:50px 20px; color:var(--cinza);}
  .empty h4{font-family:'Fraunces',serif; color:var(--verde-escuro); margin:10px 0 6px 0; font-size:16px;}
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:12px;}

  /* ---------- LOGIN ---------- */
  .login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .login-card{background:var(--branco); border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,0.12); border:1px solid var(--cinza-claro); padding:40px 36px; width:100%; max-width:360px;}
  .login-brand{display:flex; align-items:center; gap:10px; margin-bottom:28px;}
  .login-brand .brand-name{color:var(--verde-escuro); font-family:'Fraunces',serif; font-weight:600; font-size:19px;}
  .login-field{margin-bottom:16px; display:flex; flex-direction:column; gap:5px;}
  .login-field input{width:100%;}
  .login-error{background:var(--alerta-bg); color:var(--alerta); font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:16px;}
  .login-btn{width:100%; margin-top:6px; justify-content:center;}
  .login-btn:disabled{opacity:0.6; cursor:default;}
  .login-loading{min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--cinza); font-size:14px;}

  /* ---------- USUÁRIO LOGADO (sidebar) ---------- */
  .sidebar-user{margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid rgba(255,255,255,0.12); display:flex; flex-direction:column; gap:8px; font-size:12.5px; color:rgba(255,255,255,0.85);}
  .sidebar-user-nome{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .sidebar-user-actions{display:flex; gap:8px;}
  .btn-sair{background:rgba(255,255,255,0.1); border:none; color:#fff; padding:6px 10px; border-radius:6px; font-size:11.5px; cursor:pointer; white-space:nowrap; flex:1;}
  .btn-sair:hover{background:rgba(255,255,255,0.2);}
  .status-dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px;}
  .status-dot.ativo{background:var(--bom);}
  .status-dot.inativo{background:var(--cinza);}

  /* ---------- PAINEL: cards de app ---------- */
  .app-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px;}
  .app-card{background:var(--branco); border:1px solid var(--cinza-claro); border-radius:var(--radius); padding:20px 22px; box-shadow:var(--shadow); border-top:4px solid var(--app-cor, var(--verde-medio)); display:flex; flex-direction:column; gap:10px;}
  .app-card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .app-card-nome{font-family:'Fraunces',serif; font-weight:600; font-size:17px; color:var(--verde-escuro);}
  .app-card-desc{font-size:12.5px; color:var(--cinza); line-height:1.5;}
  .app-card-stats{display:flex; gap:18px; flex-wrap:wrap; margin-top:2px;}
  .app-card-stat .v{font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--verde-escuro); font-size:16px;}
  .app-card-stat .l{font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--cinza);}
  .app-card-actions{display:flex; gap:8px; margin-top:auto; padding-top:10px;}
  .badge-em-breve{background:var(--cinza-claro); color:var(--cinza);}

  /* ---------- RESPONSIVO (celular) ---------- */
  @media (max-width:760px){
    .app{flex-direction:column;}
    .sidebar{width:100%; flex-direction:row; align-items:center; justify-content:space-between; padding:12px 16px; gap:12px; overflow-x:auto;}
    .brand{border-bottom:none; padding:0; margin-bottom:0; flex-shrink:0;}
    nav{margin-top:0; flex-direction:row; gap:4px;}
    .nav-item{white-space:nowrap; padding:8px 10px; font-size:13px;}
    .sidebar-footer{display:none;}
    .sidebar-user{margin-bottom:0; padding-bottom:0; border-bottom:none; flex-shrink:0;}
    .main{padding:20px 16px 48px 16px; max-width:100%;}
    .page-header{flex-direction:column; align-items:flex-start; gap:14px;}
    h1{font-size:23px;}
    .btn{width:100%; justify-content:center;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .toolbar{flex-direction:column; align-items:stretch;}
    .card{overflow-x:auto; -webkit-overflow-scrolling:touch;}
    .field-row{grid-template-columns:1fr;}
    .overlay{padding:16px 10px;}
    .app-grid{grid-template-columns:1fr;}
    .composicao-row{grid-template-columns:1fr 68px 28px; gap:6px;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== SUPABASE ===================== */
// Projeto da própria matriz (cadastro central de fazendas, apps e
// usuários). Crie um projeto Supabase novo, rode matriz_schema.sql
// nele e substitua a URL/chave abaixo — mesmo processo do AECombustível.
const db = supabase.createClient(
  'https://SUBSTITUA.supabase.co',
  'SUBSTITUA_PELA_CHAVE_PUBLISHABLE'
);

// Cliente extra, só de leitura, apontando pro projeto da Pecuária —
// usado para os indicadores ao vivo do card "AE Pecuária" no Painel.
// Não duplica dado nenhum: cada consulta lê direto do banco da Pecuária.
const dbPecuaria = supabase.createClient(
  'https://leojfqlbdtlriemdgnyw.supabase.co',
  'sb_publishable_IYD9cnj_7tlul7K5zs5YHg_kv5YvzjB'
);

function rowToFazenda(r){ return {id:r.id, nome:r.nome, areaHa:r.area_ha, localizacao:r.localizacao||'', observacao:r.observacao||''}; }
function fazendaToRow(f){ return {nome:f.nome, area_ha:f.areaHa||null, localizacao:f.localizacao||'', observacao:f.observacao||''}; }
function rowToOperacao(r){ return {id:r.id, fazendaId:r.fazenda_id, operacao:r.operacao, areaHa:r.area_ha}; }
function rowToApp(r){ return {id:r.id, nome:r.nome, slug:r.slug, descricao:r.descricao||'', url:r.url||'', cor:r.cor||'#1D5DA8', ordem:r.ordem||0, status:r.status||'em_breve'}; }
function appToRow(a){ return {nome:a.nome, slug:a.slug, descricao:a.descricao||'', url:a.url||null, cor:a.cor||'#1D5DA8', ordem:a.ordem||0, status:a.status||'em_breve'}; }
function rowToPerfil(r){ return {id:r.id, nome:r.nome, usuario:r.usuario, papel:r.papel, ativo:r.ativo}; }

async function loadAll(){
  const [faz, op, ap, perfis] = await Promise.all([
    db.from('fazendas').select('*').order('nome'),
    db.from('fazenda_operacoes').select('*'),
    db.from('apps').select('*').order('ordem'),
    souAdmin() ? db.from('profiles').select('*').order('nome') : Promise.resolve({data:[]}),
  ]);
  state.fazendas = (faz.data||[]).map(rowToFazenda);
  state.fazendaOperacoes = {};
  (op.data||[]).map(rowToOperacao).forEach(o=>{
    if(!state.fazendaOperacoes[o.fazendaId]) state.fazendaOperacoes[o.fazendaId] = [];
    state.fazendaOperacoes[o.fazendaId].push(o);
  });
  state.apps = (ap.data||[]).map(rowToApp);
  state.perfis = (perfis.data||[]).map(rowToPerfil);
  render();
  carregarIndicadoresPecuaria();
  carregarResultadoPecuaria();
}

async function carregarIndicadoresPecuaria(){
  state.indicadores.pecuaria = {...state.indicadores.pecuaria, loading:true, erro:''};
  render();
  try{
    const [lotesRes, dietasRes] = await Promise.all([
      dbPecuaria.from('lotes').select('numero_animais, data_fim'),
      dbPecuaria.from('dietas').select('id', {count:'exact', head:true}),
    ]);
    if(lotesRes.error) throw lotesRes.error;
    if(dietasRes.error) throw dietasRes.error;
    const ativos = (lotesRes.data||[]).filter(l=>!l.data_fim);
    state.indicadores.pecuaria = {
      loading:false, erro:'',
      lotesAtivos: ativos.length,
      totalAnimais: ativos.reduce((s,l)=>s+(Number(l.numero_animais)||0),0),
      dietas: dietasRes.count ?? 0,
    };
  } catch(e){
    state.indicadores.pecuaria = {loading:false, erro:'Não foi possível carregar agora.', lotesAtivos:null, totalAnimais:null, dietas:null};
  }
  render();
}

// Resultado (receita x despesa) da pecuária, lido direto do banco dela —
// mesma lógica de "custo variável do mês" (ração/pasto/cria) e "custo fixo
// do mês" (com fallback pro recorrente) que o próprio AE Pecuária usa em
// Financeiro/Resultados, só que sem o detalhamento por área (aqui o que
// interessa é o total da fazenda inteira, pra comparar com as outras
// operações). Se essa lógica mudar lá, precisa atualizar aqui também.
function mesesDoAnoAtePecuaria(){
  const hoje = new Date();
  const meses = [];
  for(let m=0; m<=hoje.getMonth(); m++) meses.push(`${hoje.getFullYear()}-${String(m+1).padStart(2,'0')}`);
  return meses;
}
async function carregarResultadoPecuaria(){
  state.resultados.pecuaria = {...state.resultados.pecuaria, loading:true, erro:''};
  render();
  try{
    const [ingRes, dietRes, srRes, ptRes, rcRes, cfRes, recRes] = await Promise.all([
      dbPecuaria.from('ingredientes').select('id, preco_kg'),
      dbPecuaria.from('dietas').select('id, itens'),
      dbPecuaria.from('saidas_racao').select('data, dieta_id, quantidade_kg'),
      dbPecuaria.from('pasto').select('data, dieta_id, quantidade'),
      dbPecuaria.from('reproducao_custos').select('data, custo'),
      dbPecuaria.from('custos_fixos').select('nome, categoria, valor_mensal, mes, areas'),
      dbPecuaria.from('receitas').select('data, valor'),
    ]);
    for(const r of [ingRes, dietRes, srRes, ptRes, rcRes, cfRes, recRes]) if(r.error) throw r.error;

    const ingredientes = ingRes.data||[];
    const custoKgPorDieta = new Map();
    (dietRes.data||[]).forEach(d=>{
      let custoKg = 0;
      (d.itens||[]).forEach(it=>{
        const ing = ingredientes.find(i=>i.id===it.ingredienteId);
        if(ing) custoKg += Number(ing.preco_kg||0) * (Number(it.pct||0)/100);
      });
      custoKgPorDieta.set(d.id, custoKg);
    });

    function custoVariavelDoMes(prefixo){
      const racao = (srRes.data||[]).filter(s=>s.data.startsWith(prefixo)).reduce((a,s)=>a+(custoKgPorDieta.get(s.dieta_id)||0)*Number(s.quantidade_kg||0), 0);
      const pasto = (ptRes.data||[]).filter(p=>p.data.startsWith(prefixo)).reduce((a,p)=>a+(custoKgPorDieta.get(p.dieta_id)||0)*Number(p.quantidade||0), 0);
      const reproducao = (rcRes.data||[]).filter(r=>r.data.startsWith(prefixo)).reduce((a,r)=>a+Number(r.custo||0), 0);
      return racao + pasto + reproducao;
    }
    function fixosDoMes(mesFiltro){
      const grupos = new Map();
      (cfRes.data||[]).forEach(c=>{
        const chaveAreas = (c.areas||[]).slice().sort().join(',');
        const chave = `${c.nome}||${c.categoria||''}||${chaveAreas}`;
        if(!grupos.has(chave)) grupos.set(chave, []);
        grupos.get(chave).push(c);
      });
      let total = 0;
      grupos.forEach(rows=>{
        const doMes = rows.filter(c=>c.mes===mesFiltro);
        const usar = doMes.length>0 ? doMes : rows.filter(c=>!c.mes);
        total += usar.reduce((a,c)=>a+Number(c.valor_mensal||0),0);
      });
      return total;
    }
    function receitaNoPrefixo(prefixo){
      return (recRes.data||[]).filter(r=>r.data.startsWith(prefixo)).reduce((a,r)=>a+Number(r.valor||0),0);
    }

    const meses = mesesDoAnoAtePecuaria();
    const mesAtual = meses[meses.length-1];
    const despesaMes = custoVariavelDoMes(mesAtual) + fixosDoMes(mesAtual);
    const receitaMes = receitaNoPrefixo(mesAtual);
    let despesaAno = 0, receitaAno = 0;
    meses.forEach(prefixo=>{
      despesaAno += custoVariavelDoMes(prefixo) + fixosDoMes(prefixo);
      receitaAno += receitaNoPrefixo(prefixo);
    });

    state.resultados.pecuaria = {
      loading:false, erro:'',
      despesaMes, receitaMes, resultadoMes: receitaMes-despesaMes,
      despesaAno, receitaAno, resultadoAno: receitaAno-despesaAno,
    };
  } catch(e){
    state.resultados.pecuaria = {loading:false, erro:'Não foi possível carregar os resultados agora.', despesaMes:null, receitaMes:null, resultadoMes:null, despesaAno:null, receitaAno:null, resultadoAno:null};
  }
  render();
}

/* ===================== ESTADO ===================== */
const state = {
  page: 'painel',
  fazendas: [],
  fazendaOperacoes: {}, // fazendaId -> [{id, fazendaId, operacao, areaHa}]
  apps: [],
  perfis: [],
  modal: null, // {type:'fazenda'|'app'|'usuario'|'papelUsuario'|'trocarSenha', data:{...}}
  indicadores: { pecuaria: {loading:false, erro:'', lotesAtivos:null, totalAnimais:null, dietas:null} },
  resultados: { pecuaria: {loading:false, erro:'', despesaMes:null, receitaMes:null, resultadoMes:null, despesaAno:null, receitaAno:null, resultadoAno:null} },
  // ---- autenticação ----
  authChecked: false,
  session: null,
  perfil: null,
  perfilErroRede: false,
  loginDraft: {usuario:'', senha:''},
  loginError: '',
  loginLoading: false,
  usuarioError: '',
  usuarioLoading: false,
};

let editDraft = null;

function fmt(n, dec=2){ return Number(n||0).toLocaleString('pt-BR', {minimumFractionDigits:dec, maximumFractionDigits:dec}); }
function fmtInt(n){ return Number(n||0).toLocaleString('pt-BR'); }

function render(){
  const root = document.getElementById('root');

  if(!state.authChecked){
    root.innerHTML = `<div class="login-loading">Carregando...</div>`;
    return;
  }
  if(!state.session){
    root.innerHTML = LoginPage();
    attachEvents();
    return;
  }
  if(!state.perfil || !state.perfil.ativo){
    root.innerHTML = AguardandoLiberacao();
    attachEvents();
    return;
  }

  let conteudo;
  try{
    conteudo = `
      ${Header()}
      ${state.page==='painel' ? PagePainel() : ''}
      ${state.page==='resultados' ? PageResultados() : ''}
      ${state.page==='fazendas' ? PageFazendas() : ''}
      ${state.page==='usuarios' ? PageUsuarios() : ''}
    `;
  } catch(e){
    console.error('Erro ao montar a tela:', e);
    conteudo = `<div class="card" style="margin:20px;">
      <h3 style="color:var(--alerta);">Ocorreu um erro ao carregar esta tela</h3>
      <p class="hint">Mande um print desta mensagem: <strong>${String(e && e.message || e)}</strong></p>
      <button class="btn btn-ghost btn-sm" data-voltar-erro="1" style="margin-top:10px;">Voltar pro Painel</button>
    </div>`;
  }
  let modalHtml = '';
  if(state.modal){
    try{ modalHtml = Modal(); }
    catch(e){
      console.error('Erro ao abrir modal:', e);
      state.modal = null;
      alert('Ocorreu um erro ao abrir esta janela: ' + String(e && e.message || e));
    }
  }
  root.innerHTML = `
    <div class="app">
      ${Sidebar()}
      <div class="main">${conteudo}</div>
    </div>
    ${modalHtml}
  `;
  attachEvents();
}

/* ===================== AUTENTICAÇÃO E PERMISSÕES ===================== */
const DOMINIO_LOGIN = 'aeagropecuaria.local';
const PAGES = [
  {key:'painel', label:'Painel', adminOnly:false},
  {key:'resultados', label:'Resultados', adminOnly:false},
  {key:'fazendas', label:'Fazendas', adminOnly:false},
  {key:'usuarios', label:'Usuários', adminOnly:true},
];

function normalizeUsuario(s){ return String(s||'').trim().toLowerCase().replace(/[^a-z0-9._-]/g,''); }
function souAdmin(){ return state.perfil?.papel === 'admin'; }
function paginasVisiveis(){ return PAGES.filter(p=>!p.adminOnly || souAdmin()); }
function pareceErroDeRede(error){
  const msg = String(error?.message||'').toLowerCase();
  return msg.includes('fetch') || msg.includes('network') || msg.includes('failed');
}

const PERFIL_CACHE_KEY = 'aematriz_perfil_cache_v1';
function lerPerfilCache(uid){
  try{
    const cache = JSON.parse(localStorage.getItem(PERFIL_CACHE_KEY)||'null');
    return (cache && cache.uid===uid) ? cache.perfil : null;
  }catch(e){ return null; }
}
function salvarPerfilCache(uid, perfil){
  try{ localStorage.setItem(PERFIL_CACHE_KEY, JSON.stringify({uid, perfil})); }
  catch(e){ /* localStorage indisponível (modo privado etc.) */ }
}
async function loadPerfil(){
  const uid = state.session?.user?.id;
  if(!uid){ state.perfil = null; state.perfilErroRede = false; return; }
  const { data, error } = await db.from('profiles').select('*').eq('id', uid).single();
  state.perfilErroRede = false;
  if(data){
    state.perfil = rowToPerfil(data);
    salvarPerfilCache(uid, state.perfil);
  } else if(error && pareceErroDeRede(error)){
    const cache = lerPerfilCache(uid);
    if(cache){ state.perfil = cache; }
    else { state.perfil = null; state.perfilErroRede = true; }
  } else {
    state.perfil = null;
  }
  if(state.perfil && state.perfil.ativo && !paginasVisiveis().some(p=>p.key===state.page)){
    state.page = 'painel';
  }
}

async function initAuth(){
  const { data } = await db.auth.getSession();
  state.session = data.session;
  if(state.session) await loadPerfil();
  state.authChecked = true;
  render();
  if(state.session && state.perfil?.ativo) loadAll();

  let primeiroEvento = true;
  db.auth.onAuthStateChange(async (event, newSession)=>{
    if(primeiroEvento){ primeiroEvento = false; return; }
    if(event==='SIGNED_IN' && state.session?.access_token===newSession?.access_token) return;
    state.session = newSession;
    if(newSession){
      await loadPerfil();
      render();
      if(state.perfil?.ativo) loadAll();
    } else {
      state.perfil = null;
      render();
    }
  });
}

async function fazerLogin(){
  const usuario = normalizeUsuario(state.loginDraft.usuario);
  const senha = state.loginDraft.senha;
  if(!usuario || !senha){ state.loginError = 'Informe usuário e senha.'; render(); return; }
  state.loginLoading = true; state.loginError = ''; render();
  const email = `${usuario}@${DOMINIO_LOGIN}`;
  const { data, error } = await db.auth.signInWithPassword({ email, password: senha });
  state.loginLoading = false;
  if(error){
    state.loginError = 'Usuário ou senha inválidos.';
    render();
    return;
  }
  state.session = data.session;
  await loadPerfil();
  state.loginDraft = {usuario:'', senha:''};
  render();
  if(state.perfil?.ativo) loadAll();
}

async function fazerLogout(){
  await db.auth.signOut();
  state.session = null;
  state.perfil = null;
  render();
}

/* ===================== RESULTADOS (geral, todas as operações) ===================== */
// Cada app com dados ligados vira uma linha aqui. Por enquanto só a
// Pecuária está com o banco real; Combustível, Cana e Cereais aparecem
// como "sem dados" até serem implantados e ganharem seu próprio cálculo.
function linhasResultado(){
  return state.apps.map(a=>({
    app: a,
    resultado: a.slug==='pecuaria' ? state.resultados.pecuaria : null,
  }));
}
function resultadoTotal(campo){
  return linhasResultado().reduce((soma,l)=> soma + (l.resultado && l.resultado[campo]!=null ? l.resultado[campo] : 0), 0);
}
function algumResultadoCarregando(){
  return linhasResultado().some(l=>l.resultado?.loading);
}
function PageResultados(){
  if(state.apps.length===0) return Empty('Nenhum app cadastrado', 'Cadastre os apps que compõem a matriz para ver os resultados aqui.');
  if(algumResultadoCarregando()){
    return `<div class="card card-pad"><p class="hint">Carregando resultados...</p></div>`;
  }
  const despesaMes = resultadoTotal('despesaMes'), receitaMes = resultadoTotal('receitaMes'), resultadoMes = receitaMes-despesaMes;
  const despesaAno = resultadoTotal('despesaAno'), receitaAno = resultadoTotal('receitaAno'), resultadoAno = receitaAno-despesaAno;
  return `
  <p class="eyebrow" style="margin-bottom:10px;">Mês atual — todas as operações</p>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-label">Receita</div><div class="stat-value">R$ ${fmt(receitaMes)}</div></div>
    <div class="stat-card"><div class="stat-label">Despesa</div><div class="stat-value">R$ ${fmt(despesaMes)}</div></div>
    <div class="stat-card"><div class="stat-label">Resultado</div><div class="stat-value ${resultadoMes<0?'alerta':''}">R$ ${fmt(resultadoMes)}</div></div>
  </div>
  <p class="eyebrow" style="margin-bottom:10px;">Ano atual — todas as operações</p>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-label">Receita</div><div class="stat-value">R$ ${fmt(receitaAno)}</div></div>
    <div class="stat-card"><div class="stat-label">Despesa</div><div class="stat-value">R$ ${fmt(despesaAno)}</div></div>
    <div class="stat-card"><div class="stat-label">Resultado</div><div class="stat-value ${resultadoAno<0?'alerta':''}">R$ ${fmt(resultadoAno)}</div></div>
  </div>
  <div class="card" style="overflow-x:auto;">
    <table>
      <thead><tr><th>Operação</th><th>Receita (mês)</th><th>Despesa (mês)</th><th>Resultado (mês)</th><th>Receita (ano)</th><th>Despesa (ano)</th><th>Resultado (ano)</th></tr></thead>
      <tbody>
        ${linhasResultado().map(l=>{
          const r = l.resultado;
          if(!r || r.erro) return `<tr><td><strong>${l.app.nome}</strong></td><td colspan="6" class="hint">${r?.erro || 'Sem dados ainda.'}</td></tr>`;
          return `<tr>
            <td><strong>${l.app.nome}</strong></td>
            <td class="mono">R$ ${fmt(r.receitaMes)}</td>
            <td class="mono">R$ ${fmt(r.despesaMes)}</td>
            <td class="mono">R$ ${fmt(r.resultadoMes)}</td>
            <td class="mono">R$ ${fmt(r.receitaAno)}</td>
            <td class="mono">R$ ${fmt(r.despesaAno)}</td>
            <td class="mono">R$ ${fmt(r.resultadoAno)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>
  <p class="hint" style="margin-top:14px;">Números da Pecuária calculados a partir de receitas, despesas fixas e custo de ração/pasto/cria lançados no AE Pecuária. Não inclui investimentos (compra de animais, máquinas etc.) nem rateio por área — pra esse detalhe, use a aba Resultados de cada app.</p>`;
}

  return `
  <div class="card" style="overflow-x:auto;">
    ${state.perfis.length===0 ? Empty('Nenhum usuário cadastrado','Crie contas de acesso para quem vai usar a matriz.') : `
    <table>
      <thead><tr><th>Nome</th><th>Usuário</th><th>Perfil</th><th>Status</th><th></th></tr></thead>
      <tbody>
        ${state.perfis.map(p=>`
          <tr>
            <td><strong>${p.nome}</strong></td>
            <td class="mono">${p.usuario}</td>
            <td>${papelPill(p.papel)}</td>
            <td><span class="status-dot ${p.ativo?'ativo':'inativo'}"></span>${p.ativo?'Ativo':'Inativo'}</td>
            <td><button class="btn-ghost btn-sm" data-editar-usuario="${p.id}">Editar acesso</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table>`}
  </div>`;
}

function ModalUsuario(){
  const d = editDraft;
  return `
  <div class="overlay" data-close-overlay="1">
    <div class="modal" data-stop="1">
      <div class="modal-head"><h3>Novo usuário</h3><button class="modal-close" data-close="1">&times;</button></div>
      <div class="modal-body">
        ${state.usuarioError ? `<div class="login-error">${state.usuarioError}</div>` : ''}
        <div class="field"><label>Nome completo</label><input id="f-nomeusuario" value="${d.nome}" placeholder="Ex: João Silva" autocomplete="off"/></div>
        <div class="field"><label>Usuário (login)</label><input id="f-usuario" value="${d.usuario}" placeholder="Ex: joao.silva" autocomplete="off"/><span class="hint">Sem espaços ou acentos. É o que a pessoa vai digitar para entrar.</span></div>
        <div class="field"><label>Senha</label><input id="f-senhausuario" type="password" value="${d.senha}" autocomplete="new-password"/><span class="hint">Mínimo 6 caracteres. Pode ser trocada depois pela pessoa.</span></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close="1">Cancelar</button>
        <button class="btn btn-primary" data-criar-usuario="1" ${state.usuarioLoading?'disabled':''}>${state.usuarioLoading?'Criando...':'Criar usuário'}</button>
      </div>
    </div>
  </div>`;
}

function ModalPapelUsuario(){
  const d = editDraft;
  return `
  <div class="overlay" data-close-overlay="1">
    <div class="modal" data-stop="1">
      <div class="modal-head"><h3>Editar acesso — ${d.nome}</h3><button class="modal-close" data-close="1">&times;</button></div>
      <div class="modal-body">
        <div class="field"><label>Usuário</label><input value="${d.usuario}" disabled/></div>
        <div class="field"><label>Perfil</label>
          <select id="f-papelusuario">
            <option value="gestor" ${d.papel==='gestor'?'selected':''}>Gestor</option>
            <option value="admin" ${d.papel==='admin'?'selected':''}>Administrador</option>
          </select>
        </div>
        <div class="field"><label><input type="checkbox" id="f-ativousuario" ${d.ativo?'checked':''} style="width:auto; margin-right:6px;"/> Conta ativa</label></div>
        <p class="hint">Administrador pode gerenciar fazendas, apps e usuários. Gestor só visualiza o painel e as fazendas.</p>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close="1">Cancelar</button>
        <button class="btn btn-primary" data-save="papelUsuario">Salvar</button>
      </div>
    </div>
  </div>`;
}

function ModalTrocarSenha(){
  const d = editDraft;
  return `
  <div class="overlay" data-close-overlay="1">
    <div class="modal" data-stop="1">
      <div class="modal-head"><h3>Trocar senha</h3><button class="modal-close" data-close="1">&times;</button></div>
      <div class="modal-body">
        <div class="field"><label>Senha atual</label><input id="f-senhaatual" type="password" autocomplete="current-password" value="${d.senhaAtual}"/></div>
        <div class="field"><label>Nova senha</label><input id="f-novasenha" type="password" autocomplete="new-password" value="${d.novaSenha}"/></div>
        <div class="field"><label>Confirmar nova senha</label><input id="f-confirmarsenha" type="password" autocomplete="new-password" value="${d.confirmarSenha}"/></div>
        <p class="hint">A nova senha precisa ter pelo menos 6 caracteres.</p>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close="1">Cancelar</button>
        <button class="btn btn-primary" data-save="trocarSenha">Salvar nova senha</button>
      </div>
    </div>
  </div>`;
}

function Empty(title, sub){
  return `<div class="empty">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#6E756C" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M9 10h.01M15 10h.01M8 15c1 1.2 2.4 2 4 2s3-.8 4-2"/></svg>
    <h4>${title}</h4>
    <div class="page-desc" style="margin:0 auto;">${sub}</div>
  </div>`;
}

/* ===================== MODAL / FORMS ===================== */
function Modal(){
  if(state.modal.type==='fazenda') return ModalFazenda();
  if(state.modal.type==='app') return ModalApp();
  if(state.modal.type==='usuario') return ModalUsuario();
  if(state.modal.type==='papelUsuario') return ModalPapelUsuario();
  if(state.modal.type==='trocarSenha') return ModalTrocarSenha();
  return '';
}

/* ===================== EVENTOS ===================== */
function attachEvents(){
  const loginForm = document.querySelector('[data-login-form]');
  if(loginForm){
    loginForm.onsubmit = (e)=>{ e.preventDefault(); fazerLogin(); };
    const uEl = document.querySelector('[data-login-usuario]');
    const sEl = document.querySelector('[data-login-senha]');
    if(uEl) uEl.oninput = (e)=>{ state.loginDraft.usuario = e.target.value; };
    if(sEl) sEl.oninput = (e)=>{ state.loginDraft.senha = e.target.value; };
  }
  document.querySelectorAll('[data-logout]').forEach(el=>{ el.onclick = ()=> fazerLogout(); });
  document.querySelectorAll('[data-retry-perfil]').forEach(el=>{
    el.onclick = async ()=>{ await loadPerfil(); render(); if(state.perfil?.ativo) loadAll(); };
  });
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick = ()=>{ state.page = el.dataset.nav; render(); };
  });
  const voltarErroBtn = document.querySelector('[data-voltar-erro]');
  if(voltarErroBtn) voltarErroBtn.onclick = ()=>{ state.page = 'painel'; render(); };

  document.querySelectorAll('[data-trocar-senha-abrir]').forEach(el=>{
    el.onclick = ()=>{ editDraft = {senhaAtual:'', novaSenha:'', confirmarSenha:''}; state.modal = {type:'trocarSenha'}; render(); };
  });

  // ---- fazendas ----
  const novaFazendaBtn = document.querySelector('[data-nova-fazenda]');
  if(novaFazendaBtn) novaFazendaBtn.onclick = ()=>{
    editDraft = {nome:'', areaHa:null, localizacao:'', observacao:'', operacoes:[]};
    state.modal = {type:'fazenda'}; render();
  };
  document.querySelectorAll('[data-editar-fazenda]').forEach(el=>{
    el.onclick = ()=>{
      const f = state.fazendas.find(x=>x.id===Number(el.dataset.editarFazenda));
      const operacoes = (state.fazendaOperacoes[f.id]||[]).map(o=>({operacao:o.operacao, areaHa:o.areaHa}));
      editDraft = {...f, _editId:f.id, operacoes};
      state.modal = {type:'fazenda'}; render();
    };
  });
  document.querySelectorAll('[data-del-fazenda]').forEach(el=>{
    el.onclick = async ()=>{
      if(!confirm('Excluir esta fazenda?')) return;
      await db.from('fazendas').delete().eq('id', Number(el.dataset.delFazenda));
      await loadAll();
    };
  });

  // fazenda: operações (linhas dinâmicas) — sincroniza os outros campos
  // antes de re-renderizar, senão o que já foi digitado se perde.
  function sincronizarCamposFazenda(){
    const nomeEl = document.getElementById('f-nomefazenda');
    const areaEl = document.getElementById('f-areafazenda');
    const localEl = document.getElementById('f-localfazenda');
    const obsEl = document.getElementById('f-obsfazenda');
    if(nomeEl) editDraft.nome = nomeEl.value;
    if(areaEl) editDraft.areaHa = areaEl.value;
    if(localEl) editDraft.localizacao = localEl.value;
    if(obsEl) editDraft.observacao = obsEl.value;
  }
  document.querySelectorAll('[data-op-add]').forEach(el=>{
    el.onclick = ()=>{ sincronizarCamposFazenda(); editDraft.operacoes.push({operacao:'pecuaria', areaHa:''}); render(); };
  });
  document.querySelectorAll('[data-op-del]').forEach(el=>{
    el.onclick = ()=>{ sincronizarCamposFazenda(); editDraft.operacoes.splice(Number(el.dataset.opDel),1); render(); };
  });
  document.querySelectorAll('[data-op-tipo]').forEach(el=>{
    el.onchange = (e)=>{ editDraft.operacoes[Number(el.dataset.opTipo)].operacao = e.target.value; };
  });
  document.querySelectorAll('[data-op-area]').forEach(el=>{
    el.oninput = (e)=>{ editDraft.operacoes[Number(el.dataset.opArea)].areaHa = e.target.value; };
  });

  // ---- apps ----
  const novoAppBtn = document.querySelector('[data-novo-app]');
  if(novoAppBtn) novoAppBtn.onclick = ()=>{
    editDraft = {nome:'', slug:'', descricao:'', url:'', cor:'#1D5DA8', ordem:(state.apps.length+1)*10, status:'em_breve'};
    state.modal = {type:'app'}; render();
  };
  document.querySelectorAll('[data-editar-app]').forEach(el=>{
    el.onclick = ()=>{
      const a = state.apps.find(x=>x.id===Number(el.dataset.editarApp));
      editDraft = {...a, _editId:a.id};
      state.modal = {type:'app'}; render();
    };
  });
  document.querySelectorAll('[data-del-app]').forEach(el=>{
    el.onclick = async ()=>{
      if(!confirm('Excluir este app do painel?')) return;
      await db.from('apps').delete().eq('id', Number(el.dataset.delApp));
      await loadAll();
    };
  });

  // ---- usuários ----
  const novoUsuarioBtn = document.querySelector('[data-novo-usuario]');
  if(novoUsuarioBtn) novoUsuarioBtn.onclick = ()=>{
    editDraft = {nome:'', usuario:'', senha:''};
    state.usuarioError = '';
    state.modal = {type:'usuario'}; render();
  };
  document.querySelectorAll('[data-editar-usuario]').forEach(el=>{
    el.onclick = ()=>{
      const perfil = state.perfis.find(p=>p.id===el.dataset.editarUsuario);
      editDraft = {_perfilId: perfil.id, nome: perfil.nome, usuario: perfil.usuario, papel: perfil.papel, ativo: perfil.ativo};
      state.modal = {type:'papelUsuario'}; render();
    };
  });
  const criarUsuarioBtn = document.querySelector('[data-criar-usuario]');
  if(criarUsuarioBtn){
    criarUsuarioBtn.onclick = async ()=>{
      const nome = document.getElementById('f-nomeusuario').value.trim();
      const usuario = document.getElementById('f-usuario').value.trim();
      const senha = document.getElementById('f-senhausuario').value;
      if(!nome || !usuario || !senha){ state.usuarioError = 'Preencha nome, usuário e senha.'; render(); return; }
      state.usuarioLoading = true; state.usuarioError = ''; render();
      const { data, error } = await db.functions.invoke('criar-usuario-matriz', { body: { nome, usuario, senha } });
      state.usuarioLoading = false;
      if(error || data?.error){
        let msg = data?.error || error?.message || 'Falha ao criar usuário.';
        if(error?.context && typeof error.context.json === 'function'){
          try { const corpo = await error.context.json(); if(corpo?.error) msg = corpo.error; } catch(e){}
        }
        state.usuarioError = msg;
        render();
        return;
      }
      state.modal = null; editDraft = null;
      await loadAll();
    };
  }

  // ---- fechar overlay ----
  document.querySelectorAll('[data-close], [data-close-overlay]').forEach(el=>{
    el.onclick = (e)=>{
      if(el.dataset.closeOverlay!==undefined && e.target!==el) return;
      state.modal = null; editDraft = null; state.usuarioError = '';
      render();
    };
  });
  document.querySelectorAll('[data-stop]').forEach(el=>{ el.onclick = (e)=> e.stopPropagation(); });

  // ---- salvar (fazenda / app / papelUsuario / trocarSenha) ----
  const saveBtn = document.querySelector('[data-save]');
  if(saveBtn){
    saveBtn.onclick = async ()=>{
      const type = saveBtn.dataset.save;
      let error;
      if(type==='fazenda'){
        const f = {
          nome: document.getElementById('f-nomefazenda').value.trim(),
          areaHa: document.getElementById('f-areafazenda').value ? Number(document.getElementById('f-areafazenda').value) : null,
          localizacao: document.getElementById('f-localfazenda').value.trim(),
          observacao: document.getElementById('f-obsfazenda').value.trim(),
        };
        if(!f.nome){ alert('Informe o nome da fazenda.'); return; }
        let fazendaId = editDraft._editId;
        if(fazendaId){
          ({error} = await db.from('fazendas').update(fazendaToRow(f)).eq('id', fazendaId));
        } else {
          const inserted = await db.from('fazendas').insert(fazendaToRow(f)).select().single();
          error = inserted.error;
          fazendaId = inserted.data?.id;
        }
        if(!error && fazendaId){
          await db.from('fazenda_operacoes').delete().eq('fazenda_id', fazendaId);
          const linhas = (editDraft.operacoes||[])
            .filter(op=>op.operacao)
            .map(op=>({fazenda_id: fazendaId, operacao: op.operacao, area_ha: op.areaHa ? Number(op.areaHa) : null}));
          if(linhas.length>0){
            ({error} = await db.from('fazenda_operacoes').insert(linhas));
          }
        }
      } else if(type==='app'){
        const a = {
          nome: document.getElementById('f-nomeapp').value.trim(),
          slug: normalizeUsuario(document.getElementById('f-slugapp').value),
          descricao: document.getElementById('f-descapp').value.trim(),
          url: document.getElementById('f-urlapp').value.trim(),
          cor: document.getElementById('f-corapp').value,
          ordem: Number(document.getElementById('f-ordemapp').value)||0,
          status: document.getElementById('f-statusapp').value,
        };
        if(!a.nome || !a.slug){ alert('Informe nome e identificador do app.'); return; }
        if(editDraft._editId){
          const row = appToRow(a); delete row.slug;
          ({error} = await db.from('apps').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('apps').insert(appToRow(a)));
        }
      } else if(type==='papelUsuario'){
        const papel = document.getElementById('f-papelusuario').value;
        const ativo = document.getElementById('f-ativousuario').checked;
        ({error} = await db.from('profiles').update({papel, ativo}).eq('id', editDraft._perfilId));
      } else if(type==='trocarSenha'){
        const senhaAtual = document.getElementById('f-senhaatual').value;
        const novaSenha = document.getElementById('f-novasenha').value;
        const confirmarSenha = document.getElementById('f-confirmarsenha').value;
        if(!senhaAtual || !novaSenha || !confirmarSenha){ alert('Preencha todos os campos.'); return; }
        if(novaSenha.length<6){ alert('A nova senha precisa ter pelo menos 6 caracteres.'); return; }
        if(novaSenha!==confirmarSenha){ alert('A confirmação não bate com a nova senha.'); return; }
        const email = `${state.perfil.usuario}@${DOMINIO_LOGIN}`;
        const { error: erroSenhaAtual } = await db.auth.signInWithPassword({ email, password: senhaAtual });
        if(erroSenhaAtual){ alert('Senha atual incorreta.'); return; }
        ({error} = await db.auth.updateUser({ password: novaSenha }));
        if(error){ alert('Não foi possível trocar a senha: ' + error.message); return; }
        state.modal = null; editDraft = null;
        alert('Senha alterada com sucesso.');
        render();
        return;
      }
      if(error){ alert('Não foi possível salvar: ' + error.message); return; }
      state.modal = null; editDraft = null;
      await loadAll();
    };
  }
}

initAuth();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw_matriz.js'));
}
</script>
</body>
</html>
