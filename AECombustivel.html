<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AE Combustível</title>
<link rel="manifest" href="manifest_combustivel.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0F2A4A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --azul-escuro:#0F2A4A;
    --azul-medio:#1D5DA8;
    --azul-claro:#9DC0E8;
    --grafite:#1E2A38;
    --cinza:#65758A;
    --cinza-claro:#DEE6F0;
    --cinza-bg:#F2F5FA;
    --branco:#FFFFFF;
    --ambar:#C98A2B;
    --ambar-bg:#F5E9D7;
    --alerta:#B3462F;
    --alerta-bg:#F6E7E2;
    --ok-bg:#E5EEF9;
    --bom:#0C7A43;
    --bom-bg:#E3F1E8;
    --radius:10px;
    --shadow:0 1px 2px rgba(15,42,74,0.06), 0 4px 12px rgba(15,42,74,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--cinza-bg);
    color:var(--grafite);
    -webkit-font-smoothing:antialiased;
  }
  .app{display:flex; min-height:100vh;}
  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:230px; flex-shrink:0; background:var(--azul-escuro); color:var(--branco);
    display:flex; flex-direction:column; padding:24px 16px;
  }
  .brand{
    display:flex; align-items:center; gap:10px; padding:0 8px 24px 8px; margin-bottom:8px;
    border-bottom:1px solid rgba(255,255,255,0.12);
  }
  .brand-mark{width:32px; height:32px; flex-shrink:0;}
  .brand-name{font-family:'Fraunces',serif; font-weight:600; font-size:19px; letter-spacing:0.2px;}
  nav{margin-top:18px; display:flex; flex-direction:column; gap:4px;}
  .nav-item{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; cursor:pointer;
    font-size:14px; font-weight:500; color:rgba(255,255,255,0.72);
    transition:background 0.15s, color 0.15s; border:none; background:none; width:100%; text-align:left;
  }
  .nav-item:hover{background:rgba(255,255,255,0.06); color:var(--branco);}
  .nav-item.active{background:var(--azul-medio); color:var(--branco);}
  .nav-item svg{flex-shrink:0;}
  .sidebar-footer{
    margin-top:auto; padding-top:16px; border-top:1px solid rgba(255,255,255,0.12);
    font-size:11px; color:rgba(255,255,255,0.45); line-height:1.5;
  }
  /* ---------- MAIN ---------- */
  .main{flex:1; padding:32px 40px 60px 40px; max-width:1180px;}
  .page-header{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:28px;}
  .eyebrow{font-size:11px; text-transform:uppercase; letter-spacing:1.4px; color:var(--azul-medio); font-weight:600; margin:0 0 4px 0;}
  h1{font-family:'Fraunces',serif; font-size:28px; font-weight:600; margin:0; color:var(--azul-escuro);}
  .page-desc{color:var(--cinza); font-size:13.5px; margin-top:6px; max-width:560px;}
  .btn{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; padding:10px 18px; border-radius:8px;
    border:none; cursor:pointer; transition:filter 0.15s, transform 0.1s; display:inline-flex; align-items:center; gap:6px;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--azul-escuro); color:var(--branco);}
  .btn-primary:hover{filter:brightness(1.15);}
  .btn-ghost{background:transparent; color:var(--azul-escuro); border:1px solid var(--cinza-claro);}
  .btn-ghost:hover{background:var(--branco);}
  .btn-danger-ghost{background:transparent; color:var(--alerta); border:1px solid var(--cinza-claro); padding:6px 10px; font-size:12px;}
  .btn-danger-ghost:hover{background:var(--alerta-bg);}
  .btn-sm{padding:6px 12px; font-size:12.5px;}
  .card{background:var(--branco); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--cinza-claro);}
  .card-pad{padding:22px 24px;}
  .stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px;}
  .stat-card{background:var(--branco); border:1px solid var(--cinza-claro); border-radius:var(--radius); padding:16px 18px;}
  .stat-label{font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--cinza); font-weight:600;}
  .stat-value{font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:600; color:var(--azul-escuro); margin-top:6px;}
  .stat-value.alerta{color:var(--alerta);}
  .silo-wrap{display:flex; align-items:center; gap:8px;}
  .silo{width:14px; height:30px; border:1.5px solid var(--azul-escuro); border-radius:3px; position:relative; overflow:hidden; background:var(--cinza-claro); flex-shrink:0;}
  .silo-fill{position:absolute; bottom:0; left:0; right:0; background:var(--azul-medio);}
  .silo-fill.alerta{background:var(--alerta);}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.6px; color:var(--cinza);
    font-weight:600; padding:10px 14px; border-bottom:1px solid var(--cinza-claro); white-space:nowrap;
  }
  td{padding:12px 14px; border-bottom:1px solid var(--cinza-claro); color:var(--grafite); vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .pill{display:inline-block; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px;}
  .pill-ok{background:var(--ok-bg); color:var(--azul-medio);}
  .pill-alerta{background:var(--alerta-bg); color:var(--alerta);}
  .pill-cat{background:var(--cinza-claro); color:var(--grafite);}
  .pill-warn{background:var(--ambar-bg); color:var(--ambar);}
  /* form modal */
  .overlay{
    position:fixed; inset:0; background:rgba(15,42,74,0.35); display:flex; align-items:flex-start;
    justify-content:center; padding:50px 20px; overflow-y:auto; z-index:50;
  }
  .modal{background:var(--branco); border-radius:14px; width:100%; max-width:560px; box-shadow:0 20px 60px rgba(0,0,0,0.25);}
  .modal-head{padding:20px 24px; border-bottom:1px solid var(--cinza-claro); display:flex; justify-content:space-between; align-items:center;}
  .modal-head h3{font-family:'Fraunces',serif; font-size:18px; margin:0; color:var(--azul-escuro);}
  .modal-close{background:none; border:none; cursor:pointer; color:var(--cinza); font-size:20px; line-height:1;}
  .modal-body{padding:22px 24px; display:flex; flex-direction:column; gap:14px; max-height:70vh; overflow-y:auto;}
  .modal-foot{padding:16px 24px; border-top:1px solid var(--cinza-claro); display:flex; justify-content:flex-end; gap:10px;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  label{font-size:12px; font-weight:600; color:var(--grafite);}
  input, select, textarea{
    font-family:'Inter',sans-serif; font-size:13.5px; padding:9px 11px; border:1px solid var(--cinza-claro);
    border-radius:7px; background:var(--branco); color:var(--grafite); outline:none; width:100%;
  }
  input:focus, select:focus, textarea:focus{border-color:var(--azul-medio); box-shadow:0 0 0 3px rgba(29,93,168,0.12);}
  .hint{font-size:11px; color:var(--cinza);}
  .empty{text-align:center; padding:50px 20px; color:var(--cinza);}
  .empty h4{font-family:'Fraunces',serif; color:var(--azul-escuro); margin:10px 0 6px 0; font-size:16px;}
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:12px; flex-wrap:wrap;}
  .search{
    display:flex; align-items:center; gap:8px; background:var(--branco);
    border:1px solid var(--cinza-claro); border-radius:8px; padding:8px 12px; width:260px;
  }
  .search input{border:none; padding:0; flex:1;}
  .search input:focus{box-shadow:none;}
  .subtabs{display:flex; gap:18px; margin-bottom:22px; border-bottom:1px solid var(--cinza-claro); overflow-x:auto;}
  .subtab{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; color:var(--cinza); background:none;
    border:none; padding:10px 2px; cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .subtab:hover{color:var(--azul-escuro);}
  .subtab.active{color:var(--azul-escuro); border-bottom-color:var(--azul-medio);}
  /* ---------- LOGIN ---------- */
  .login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .login-card{background:var(--branco); border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,0.12); border:1px solid var(--cinza-claro); padding:40px 36px; width:100%; max-width:360px;}
  .login-brand{display:flex; align-items:center; gap:10px; margin-bottom:28px;}
  .login-brand .brand-name{color:var(--azul-escuro); font-family:'Fraunces',serif; font-weight:600; font-size:19px;}
  .login-field{margin-bottom:16px; display:flex; flex-direction:column; gap:5px;}
  .login-field input{width:100%;}
  .login-error{background:var(--alerta-bg); color:var(--alerta); font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:16px;}
  .login-btn{width:100%; margin-top:6px; justify-content:center;}
  .login-btn:disabled{opacity:0.6; cursor:default;}
  .login-loading{min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--cinza); font-size:14px;}
  /* ---------- USUÁRIO LOGADO (sidebar) ---------- */
  .sidebar-user{
    margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid rgba(255,255,255,0.12);
    display:flex; flex-direction:column; gap:8px; font-size:12.5px; color:rgba(255,255,255,0.85);
  }
  .sidebar-user-nome{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .sidebar-user-actions{display:flex; gap:8px;}
  .btn-sair{
    background:rgba(255,255,255,0.1); border:none; color:#fff; padding:6px 10px;
    border-radius:6px; font-size:11.5px; cursor:pointer; white-space:nowrap; flex:1;
  }
  .btn-sair:hover{background:rgba(255,255,255,0.2);}
  /* ---------- ADMIN ---------- */
  .perm-matrix{width:100%; border-collapse:collapse; font-size:13px;}
  .perm-matrix th, .perm-matrix td{padding:8px 10px; border-bottom:1px solid var(--cinza-claro); text-align:left;}
  .perm-matrix select{width:100%; padding:6px 8px; font-size:12.5px;}
  .status-dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px;}
  .status-dot.ativo{background:var(--bom);}
  .status-dot.inativo{background:var(--cinza);}
  /* ---------- RESPONSIVO (celular) ---------- */
  @media (max-width:760px){
    .app{flex-direction:column;}
    .sidebar{width:100%; flex-direction:row; align-items:center; justify-content:space-between; padding:12px 16px; gap:12px; overflow-x:auto;}
    .brand{border-bottom:none; padding:0; margin-bottom:0; flex-shrink:0;}
    nav{margin-top:0; flex-direction:row; gap:4px;}
    .nav-item{white-space:nowrap; padding:8px 10px; font-size:13px;}
    .sidebar-footer{display:none;}
    .sidebar-user{margin-bottom:0; padding-bottom:0; border-bottom:none; flex-shrink:0;}
    .main{padding:20px 16px 48px 16px; max-width:100%;}
    .page-header{flex-direction:column; align-items:flex-start; gap:14px;}
    h1{font-size:23px;}
    .btn{width:100%; justify-content:center;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .toolbar{flex-direction:column; align-items:stretch;}
    .search{width:100%;}
    .card{overflow-x:auto; -webkit-overflow-scrolling:touch;}
    .field-row{grid-template-columns:1fr;}
    .overlay{padding:16px 10px;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== SUPABASE =====================
 * ATENÇÃO: este app usa um projeto Supabase PRÓPRIO, separado do banco
 * do AEpecuaria.html. Antes de usar, crie o projeto (veja o passo a
 * passo no topo de combustivel_schema.sql) e substitua as duas
 * constantes abaixo pelos valores de Project Settings > API. */
const db = supabase.createClient(
  'https://SUBSTITUA.supabase.co',
  'SUBSTITUA_PELA_ANON_KEY'
);

/* ===================== HELPERS DE CONVERSÃO ===================== */
// camelCase (usado no JS) <-> snake_case (usado no Postgres), genérico,
// para não precisar de um par rowToX/xToRow escrito à mão por entidade.
function toSnake(s){ return s.replace(/[A-Z]/g, m => '_'+m.toLowerCase()); }
function toCamel(s){ return s.replace(/_([a-z0-9])/g, (_,c)=>c.toUpperCase()); }
function fmt(n, dec=2){ return Number(n||0).toLocaleString('pt-BR', {minimumFractionDigits:dec, maximumFractionDigits:dec}); }
function fmtInt(n){ return Number(n||0).toLocaleString('pt-BR'); }
function fmtData(iso){ return iso ? iso.split('-').reverse().join('/') : '—'; }
function fmtDataHora(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function datetimeLocalDe(d){
  const pad = n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function agoraDatetimeLocal(){ return datetimeLocalDe(new Date()); }
function isoParaDatetimeLocal(iso){ return iso ? datetimeLocalDe(new Date(iso)) : agoraDatetimeLocal(); }

/* ===================== OPÇÕES (catálogos de enum) ===================== */
const OPCOES = {
  ESTADOS: [{value:'TO',label:'Tocantins'},{value:'SP',label:'São Paulo'}],
  TIPOS_PRODUTO: [
    {value:'diesel_s10',label:'Diesel S10'}, {value:'diesel_s500',label:'Diesel S500'},
    {value:'arla32',label:'Arla 32'}, {value:'gasolina',label:'Gasolina'}, {value:'outro',label:'Outro'},
  ],
  FRENTES: [{value:'cana',label:'Cana-de-açúcar'},{value:'graos',label:'Grãos'},{value:'pecuaria',label:'Pecuária'}],
  FRENTES_GERAL: [{value:'cana',label:'Cana-de-açúcar'},{value:'graos',label:'Grãos'},{value:'pecuaria',label:'Pecuária'},{value:'geral',label:'Geral'}],
  TIPOS_TALHAO: [{value:'talhao',label:'Talhão'},{value:'lote_curral',label:'Lote/Curral'}],
  TIPOS_EQUIPAMENTO: [
    {value:'colhedora_cana',label:'Colhedora de Cana'}, {value:'transbordo',label:'Transbordo'},
    {value:'caminhao_canavieiro',label:'Caminhão Canavieiro'}, {value:'colhedora_graos',label:'Colhedora de Grãos'},
    {value:'plantadeira',label:'Plantadeira'}, {value:'pulverizador',label:'Pulverizador'}, {value:'secador',label:'Secador'},
    {value:'trator',label:'Trator'}, {value:'gerador',label:'Gerador'}, {value:'veiculo_apoio',label:'Veículo de Apoio'},
    {value:'moto',label:'Moto'}, {value:'outro',label:'Outro'},
  ],
  TIPOS_MEDIDOR: [{value:'horimetro',label:'Horímetro (horas)'},{value:'hodometro',label:'Hodômetro (km)'},{value:'nenhum',label:'Nenhum'}],
  TIPOS_TANQUE: [{value:'fixo',label:'Tanque fixo'},{value:'comboio',label:'Comboio'}],
  METODOS_MEDICAO: [{value:'regua',label:'Régua'},{value:'sensor',label:'Sensor'},{value:'outro',label:'Outro'}],
};

/* ===================== CADASTROS (motor genérico de CRUD) =====================
 * Cada entidade de cadastro é descrita aqui uma única vez — tabela,
 * campos, tipo de cada campo — e as telas (lista, modal, salvar, editar,
 * excluir) são geradas a partir dessa descrição. Isso evita reescrever a
 * mesma lógica de formulário 11 vezes para 11 cadastros muito parecidos.
 * Fases futuras (estoque, abastecimento) podem reaproveitar o mesmo motor. */
const CADASTROS = {
  fazendas: {
    table:'fazendas', label:'Fazendas', singular:'Fazenda',
    desc:'Unidades produtivas da empresa, com estado e área total.',
    emptyHint:'Cadastre a primeira fazenda para começar.',
    fields:[
      {key:'nome', label:'Nome', type:'text', required:true, placeholder:'Ex: Fazenda Santa Fé'},
      {key:'estado', label:'Estado', type:'select', options:OPCOES.ESTADOS, required:true},
      {key:'areaHa', label:'Área (ha)', type:'number', step:'0.01', suffix:' ha'},
      {key:'ativo', label:'Fazenda ativa', type:'checkbox', default:true, list:false},
    ],
  },
  produtos: {
    table:'produtos', label:'Produtos', singular:'Produto',
    desc:'Combustíveis e insumos controlados no estoque (Diesel S10/S500, Arla 32, Gasolina).',
    fields:[
      {key:'nome', label:'Nome', type:'text', required:true},
      {key:'tipo', label:'Tipo', type:'select', options:OPCOES.TIPOS_PRODUTO, required:true},
      {key:'unidade', label:'Unidade', type:'text', required:true},
      {key:'ativo', label:'Ativo', type:'checkbox', default:true, list:false},
    ],
  },
  culturas: {
    table:'culturas', label:'Culturas', singular:'Cultura',
    desc:'Culturas e a frente de negócio a que pertencem (cana, grãos ou pecuária).',
    fields:[
      {key:'nome', label:'Nome', type:'text', required:true},
      {key:'frente', label:'Frente', type:'select', options:OPCOES.FRENTES, required:true},
      {key:'ativo', label:'Ativa', type:'checkbox', default:true, list:false},
    ],
  },
  operacoes: {
    table:'operacoes', label:'Operações', singular:'Operação',
    desc:'Tipos de atividade de campo usados para ratear o combustível (colheita, plantio, trato, etc.).',
    fields:[
      {key:'nome', label:'Nome', type:'text', required:true},
      {key:'frente', label:'Frente', type:'select', options:OPCOES.FRENTES_GERAL, required:true},
      {key:'ativo', label:'Ativa', type:'checkbox', default:true, list:false},
    ],
  },
  fornecedores: {
    table:'fornecedores', label:'Fornecedores', singular:'Fornecedor',
    desc:'Distribuidoras de combustível e outros fornecedores.',
    fields:[
      {key:'nome', label:'Nome', type:'text', required:true},
      {key:'cnpj', label:'CNPJ', type:'text'},
      {key:'telefone', label:'Telefone', type:'text'},
      {key:'obs', label:'Observações', type:'textarea', list:false},
      {key:'ativo', label:'Ativo', type:'checkbox', default:true, list:false},
    ],
  },
  safras: {
    table:'safras', label:'Safras', singular:'Safra',
    desc:'Ano-safra de uma cultura numa fazenda, usado para ratear o combustível por período.',
    emptyHint:'Cadastre fazenda e cultura antes de criar uma safra.',
    fields:[
      {key:'fazendaId', label:'Fazenda', type:'fk', refEntity:'fazendas', required:true},
      {key:'culturaId', label:'Cultura', type:'fk', refEntity:'culturas', required:true},
      {key:'nome', label:'Safra', type:'text', required:true, placeholder:'Ex: 2024/2025'},
      {key:'dataInicio', label:'Início', type:'date'},
      {key:'dataFim', label:'Fim', type:'date'},
      {key:'ativo', label:'Ativa', type:'checkbox', default:true, list:false},
    ],
  },
  centrosCusto: {
    table:'centros_custo', label:'Centros de Custo', singular:'Centro de Custo',
    desc:'Classificação de rateio para combustível sem talhão/lote específico (transporte, administrativo, gerador).',
    emptyHint:'Cadastre uma fazenda antes de criar um centro de custo.',
    fields:[
      {key:'fazendaId', label:'Fazenda', type:'fk', refEntity:'fazendas', required:true},
      {key:'nome', label:'Nome', type:'text', required:true},
      {key:'frente', label:'Frente', type:'select', options:OPCOES.FRENTES_GERAL, required:true},
      {key:'ativo', label:'Ativo', type:'checkbox', default:true, list:false},
    ],
  },
  talhoesAreas: {
    table:'talhoes_areas', label:'Talhões / Áreas', singular:'Talhão/Área',
    desc:'Talhões de lavoura (com hectares) ou lotes/currais de pecuária, para ratear o combustível abastecido neles.',
    emptyHint:'Cadastre uma fazenda antes de criar um talhão/área.',
    fields:[
      {key:'fazendaId', label:'Fazenda', type:'fk', refEntity:'fazendas', required:true},
      {key:'nome', label:'Nome', type:'text', required:true},
      {key:'tipo', label:'Tipo', type:'select', options:OPCOES.TIPOS_TALHAO, required:true},
      {key:'areaHa', label:'Área (ha)', type:'number', step:'0.01', suffix:' ha'},
      {key:'culturaId', label:'Cultura', type:'fk', refEntity:'culturas'},
      {key:'ativo', label:'Ativo', type:'checkbox', default:true, list:false},
    ],
  },
  equipamentos: {
    table:'equipamentos', label:'Equipamentos', singular:'Equipamento',
    desc:'Máquinas e veículos abastecidos, com o tipo de medidor e o consumo de referência.',
    emptyHint:'Cadastre uma fazenda antes de criar um equipamento.',
    fields:[
      {key:'fazendaId', label:'Fazenda', type:'fk', refEntity:'fazendas', required:true},
      {key:'nome', label:'Nome/Identificação', type:'text', required:true, placeholder:'Ex: Trator 04'},
      {key:'tipo', label:'Tipo', type:'select', options:OPCOES.TIPOS_EQUIPAMENTO, required:true},
      {key:'tipoMedidor', label:'Medidor', type:'select', options:OPCOES.TIPOS_MEDIDOR, required:true},

/* ===================== OFFLINE: CACHE LOCAL E FILA DE SINCRONIZAÇÃO =====================
 * Conectividade no campo é ruim ou inexistente. Duas coisas ficam
 * salvas no aparelho para o app funcionar sem internet:
 *   1) Cache dos cadastros (localStorage) — pra abrir o app já offline
 *      (celular sem sinal) e ainda ter fazenda/tanque/equipamento/etc.
 *      disponíveis para preencher um abastecimento.
 *   2) Fila de abastecimentos pendentes (IndexedDB) — cada abastecimento
 *      registrado offline (ou quando o envio ao Supabase falha) fica
 *      guardado aqui com um client_uuid próprio, e é reenviado via
 *      upsert(on_conflict=client_uuid) assim que a conexão volta, sem
 *      duplicar caso já tenha sido sincronizado antes. */
const CACHE_LOCAL_KEY = 'combustivel_cache_cadastros_v1';
function salvarCacheLocal(){
  try{
    const snapshot = {};
    CADASTRO_KEYS.forEach(k=>{ if(k!=='abastecimentos') snapshot[k] = state[k]; });
    localStorage.setItem(CACHE_LOCAL_KEY, JSON.stringify(snapshot));
  }catch(e){ /* localStorage indisponível ou cheio — segue sem cache offline */ }
}
function carregarCacheLocal(){
  try{
    const raw = localStorage.getItem(CACHE_LOCAL_KEY);
    if(!raw) return;
    const snapshot = JSON.parse(raw);
    Object.keys(snapshot).forEach(k=>{ if(CADASTROS[k]) state[k] = snapshot[k]; });
  }catch(e){ /* cache corrompido — ignora e segue vazio até conseguir carregar do servidor */ }
}

const IDB_NOME = 'combustivel_offline';
const IDB_LOJA = 'fila_abastecimentos';
function idbAbrir(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(IDB_NOME, 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(IDB_LOJA, {keyPath:'clientUuid'}); };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
async function idbSalvar(registro){
  const conexao = await idbAbrir();
  return new Promise((resolve,reject)=>{
    const tx = conexao.transaction(IDB_LOJA,'readwrite');
    tx.objectStore(IDB_LOJA).put(registro);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
async function idbListarTudo(){
  const conexao = await idbAbrir();
  return new Promise((resolve,reject)=>{
    const tx = conexao.transaction(IDB_LOJA,'readonly');
    const req = tx.objectStore(IDB_LOJA).getAll();
    req.onsuccess = ()=>resolve(req.result||[]);
    req.onerror = ()=>reject(req.error);
  });
}
async function idbExcluir(clientUuid){
  const conexao = await idbAbrir();
  return new Promise((resolve,reject)=>{
    const tx = conexao.transaction(IDB_LOJA,'readwrite');
    tx.objectStore(IDB_LOJA).delete(clientUuid);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
async function atualizarFilaNaTela(){
  state.filaAbastecimentos = await idbListarTudo();
  render();
}
// Reenvia a fila local ao Supabase. Erros de validação de verdade (ex:
// leitura de medidor que retrocedeu, capturado pelo trigger do banco)
// ficam marcados no registro (erroSincronizacao) para revisão humana —
// não tentamos "resolver" o conflito sozinhos, só deixamos visível.
async function sincronizarFila(){
  if(!navigator.onLine) return;
  const pendentes = await idbListarTudo();
  if(pendentes.length===0) return;
  state.sincronizando = true; render();
  for(const registro of pendentes){
    const { clientUuid } = registro;
    const linha = { ...construirLinhaAbastecimento(registro), client_uuid: clientUuid };
    const { error } = await db.from('abastecimentos').upsert(linha, {onConflict:'client_uuid'});
    if(!error){
      await idbExcluir(clientUuid);
    } else if(error.code){
      // erro de validação real (não é falta de conexão) — mantém na fila, mas com o motivo visível
      await idbSalvar({...registro, erroSincronizacao: mensagemErroSupabase(error)});
    } else {
      break; // parece falta de conexão no meio do loop — para e tenta de novo depois
    }
  }
  state.sincronizando = false;
  await atualizarFilaNaTela();
  await loadAll();
}

function render(){

  if(!state.authChecked){ root.innerHTML = `<div class="login-loading">Carregando...</div>`; return; }

  if(!state.perfil || !state.perfil.ativo){ root.innerHTML = AguardandoLiberacao(); attachEvents(); return; }

  const grupos = gruposVisiveis();
  const semModulos = grupos.length===0;
  root.innerHTML = `
    <div class="app">
      ${Sidebar()}
      <div class="main">
        ${semModulos ? Empty('Nenhum módulo liberado','Fale com o administrador do sistema para liberar o acesso aos cadastros.') : `
        ${Header()}

  attachEvents();
}

const DOMINIO_LOGIN = 'aeagropecuaria.local';
function normalizeUsuario(s){ return String(s||'').trim().toLowerCase().replace(/[^a-z0-9._-]/g,''); }
function souAdmin(){ return state.perfil?.papel === 'admin'; }
function temPermissao(modulo, nivel){
  if(!state.perfil) return false;
  if(souAdmin()) return true;
  const atual = state.perfil.permissoes?.[modulo];
  if(nivel==='visualizar') return atual==='visualizar' || atual==='editar';
  return atual==='editar';
}

async function loadPerfil(){
  const uid = state.session?.user?.id;
  if(!uid){ state.perfil = null; return; }
  const { data } = await db.from('profiles').select('*').eq('id', uid).single();
  state.perfil = data ? rowToPerfil(data) : null;
}

async function initAuth(){
  carregarCacheLocal(); // mostra os últimos cadastros conhecidos mesmo antes de falar com o servidor (ou offline)
  const { data } = await db.auth.getSession();
  state.session = data.session;
  if(state.session) await loadPerfil();
  state.authChecked = true;
  render();
  if(state.session && state.perfil?.ativo){
    loadAll();
    atualizarFilaNaTela().then(sincronizarFila);
  }

  let primeiroEvento = true;
  db.auth.onAuthStateChange(async (event, newSession)=>{
    if(primeiroEvento){ primeiroEvento = false; return; }
    if(event==='SIGNED_IN' && state.session?.access_token===newSession?.access_token) return;
    state.session = newSession;
    if(newSession){
      await loadPerfil();
      render();
      if(state.perfil?.ativo){
        loadAll();
        atualizarFilaNaTela().then(sincronizarFila);
      }
    } else {
      state.perfil = null;
      render();
    }
  });

  window.addEventListener('online', sincronizarFila);
}

async function fazerLogin(){
  const usuario = normalizeUsuario(state.loginDraft.usuario);
  const senha = state.loginDraft.senha;
  if(!usuario || !senha){ state.loginError = 'Informe usuário e senha.'; render(); return; }
  state.loginLoading = true; state.loginError = ''; render();
  const email = `${usuario}@${DOMINIO_LOGIN}`;
  const { data, error } = await db.auth.signInWithPassword({ email, password: senha });
  state.loginLoading = false;
  if(error){ state.loginError = 'Usuário ou senha inválidos.'; render(); return; }
  state.session = data.session;
  await loadPerfil();
  state.loginDraft = {usuario:'', senha:''};
  render();
  if(state.perfil?.ativo) loadAll();
}
async function fazerLogout(){
  await db.auth.signOut();
  state.session = null; state.perfil = null; state.page = 'fazendas';
  render();
}

/* ===================== PÁGINA GENÉRICA DE CADASTRO ===================== */
function fkNome(entityKey, id){
  if(id===null || id===undefined || id==='') return '—';
  const item = (state[entityKey]||[]).find(x=>String(x.id)===String(id));
  return item ? item.nome : '—';
}
function celulaValor(f, item){
  const val = item[f.key];
  if(f.format) return f.format(val, item);
  if(f.type==='fk') return fkNome(f.refEntity, val);
  if(f.type==='select') return (f.options.find(o=>o.value===val)||{}).label || val || '—';
  if(f.type==='date') return fmtData(val);
  if(f.type==='number') return (val===null||val===undefined||val==='') ? '—' : `${fmt(val, f.dec ?? 2)}${f.suffix||''}`;
  return val || '—';
}
function PageCadastro(key){
  const cfg = CADASTROS[key];
  const podeEditar = temPermissao(cfg.modulo||'cadastros','editar');
  const termo = state.search.toLowerCase();
  const list = (cfg.semBusca ? state[key] : state[key].filter(item => !termo || (item.nome||'').toLowerCase().includes(termo)));
  const colunas = cfg.fields.filter(f=>f.list!==false);
  return `
  <div class="toolbar">
    ${cfg.semBusca ? '' : `<div class="search">${iconSearch()}<input type="text" placeholder="Buscar..." value="${state.search}" data-search="1"/></div>`}
    <span class="hint">${list.length} registro(s)</span>

  </div>
  <div class="card" style="overflow-x:auto;">
    ${list.length===0 ? Empty(`Nenhum(a) ${cfg.singular.toLowerCase()} cadastrado(a)`, cfg.emptyHint||'Cadastre o primeiro registro.') : `
    <table>
      <thead><tr>${colunas.map(f=>`<th>${f.label}</th>`).join('')}${cfg.semStatus?'':'<th>Status</th>'}<th></th></tr></thead>
      <tbody>

          <tr>
            ${colunas.map(f=>`<td>${celulaValor(f,item)}</td>`).join('')}
            ${cfg.semStatus?'':`<td><span class="status-dot ${item.ativo?'ativo':'inativo'}"></span>${item.ativo?'Ativo':'Inativo'}</td>`}
            <td style="display:flex; gap:6px;">

        `).join('')}
      </tbody>

}

/* ===================== ESTOQUE: RESUMO / CONCILIAÇÃO ===================== */
// Saldo teórico = entradas - saídas + ajustes. Saídas por abastecimento
// (Fase 3) já dão baixa real aqui.
function saidasAbastecimento(tanqueId){
  return state.abastecimentos.filter(a=>a.tanqueId===tanqueId).reduce((a,x)=>a+Number(x.volumeLitros||0),0);
}
function saldoTanque(tanqueId){
  const entradas = state.entradasEstoque.filter(e=>e.tanqueId===tanqueId).reduce((a,e)=>a+Number(e.volumeLitros||0),0);
  const ajustes = state.ajustesEstoque.filter(a=>a.tanqueId===tanqueId).reduce((a,x)=>a+Number(x.volumeAjusteLitros||0),0);
  return entradas - saidasAbastecimento(tanqueId) + ajustes;
}
function ultimaMedicao(tanqueId){
  const meds = state.medicoesFisicas.filter(m=>m.tanqueId===tanqueId).sort((a,b)=> b.data.localeCompare(a.data));
  return meds[0] || null;
}
// Custo médio ponderado das entradas por NF deste tanque. Sem dataLimite,
// considera todas as entradas (visão "hoje", usada no Resumo de Estoque).
// Com dataLimite (usado no custeio de abastecimentos, Fase 4), considera
// só as entradas até aquela data — aproxima o preço médio vigente no
// tanque no momento em que o combustível foi de fato consumido.
function custoMedioPonderado(tanqueId, dataLimite){
  const limite = dataLimite ? String(dataLimite).slice(0,10) : null;
  const entradas = state.entradasEstoque.filter(e=>e.tanqueId===tanqueId && (!limite || e.data<=limite));
  const volumeTotal = entradas.reduce((a,e)=>a+Number(e.volumeLitros||0),0);
  if(volumeTotal<=0) return null;
  const valorTotal = entradas.reduce((a,e)=>a+Number(e.valorTotal||0),0);
  return valorTotal / volumeTotal;
}
function PageEstoqueResumo(){
  const tanques = state.tanques.filter(t=>t.ativo!==false);
  if(tanques.length===0){
    return `<div class="card">${Empty('Nenhum tanque ativo','Cadastre um tanque em Frota & Combustível > Tanques para acompanhar o estoque.')}</div>`;
  }
  const linhas = tanques.map(t=>{
    const saldo = saldoTanque(t.id);
    const pct = t.capacidadeLitros>0 ? Math.max(0, Math.min(saldo/t.capacidadeLitros,1)) : 0;
    const med = ultimaMedicao(t.id);
    const diff = med ? saldo - Number(med.volumeMedidoLitros||0) : null;
    const baixo = t.estoqueMinLitros!=null && saldo < Number(t.estoqueMinLitros);
    const custoMedio = custoMedioPonderado(t.id);
    return {t, saldo, pct, med, diff, baixo, custoMedio};
  });
  const valorTotalEstoque = linhas.reduce((a,l)=> a + (l.custoMedio!=null ? l.saldo*l.custoMedio : 0), 0);
  const alertas = linhas.filter(l=>l.baixo).length;
  return `
  <div class="stat-row">
    <div class="stat-card"><div class="stat-label">Volume total em estoque</div><div class="stat-value">${fmtInt(linhas.reduce((a,l)=>a+l.saldo,0))} L</div></div>
    <div class="stat-card"><div class="stat-label">Valor aprox. em estoque</div><div class="stat-value">R$ ${fmt(valorTotalEstoque)}</div></div>
    <div class="stat-card"><div class="stat-label">Tanques cadastrados</div><div class="stat-value">${tanques.length}</div></div>
    <div class="stat-card"><div class="stat-label">Alertas de estoque baixo</div><div class="stat-value ${alertas>0?'alerta':''}">${alertas}</div></div>
  </div>
  <div class="card">
    <table>
      <thead><tr>
        <th>Nível</th><th>Tanque</th><th>Fazenda</th><th>Produto</th><th>Saldo teórico</th>
        <th>Última medição</th><th>Diferença</th><th>Status</th>
      </tr></thead>
      <tbody>
        ${linhas.map(l=>`
          <tr>
            <td><div class="silo-wrap"><div class="silo"><div class="silo-fill ${l.baixo?'alerta':''}" style="height:${Math.round(l.pct*100)}%"></div></div></div></td>
            <td><strong>${l.t.nome}</strong></td>
            <td>${fkNome('fazendas', l.t.fazendaId)}</td>
            <td>${fkNome('produtos', l.t.produtoId)}</td>
            <td class="mono">${fmtInt(l.saldo)} L ${l.t.capacidadeLitros?`<span class="hint">/ ${fmtInt(l.t.capacidadeLitros)} L</span>`:''}</td>
            <td class="mono">${l.med ? `${fmtInt(l.med.volumeMedidoLitros)} L <span class="hint">(${fmtData(l.med.data)})</span>` : '—'}</td>
            <td class="mono">${l.diff===null ? '—' : `${l.diff>0?'+':''}${fmtInt(l.diff)} L`}</td>
            <td>${l.baixo ? '<span class="pill pill-alerta">Estoque baixo</span>' : '<span class="pill pill-ok">Normal</span>'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  </div>`;
}

/* ===================== ABASTECIMENTOS (núcleo do sistema) =====================
 * Tela, modal e validação sob medida (não usa o motor genérico de
 * cadastro) porque abastecimento tem regras próprias: funciona offline
 * (fila local + sincronização), a leitura do medidor só aparece se o
 * equipamento tiver horímetro/hodômetro, e o rateio exige talhão/área
 * OU centro de custo. Reaproveita CADASTROS.abastecimentos.fields só
 * para montar a linha (camelCase -> snake_case) enviada ao Supabase. */
function construirLinhaAbastecimento(draft){
  const linha = {};
  CADASTROS.abastecimentos.fields.forEach(f=>{ linha[toSnake(f.key)] = draft[f.key] ?? null; });
  return linha;
}
function maiorLeituraConhecida(equipamentoId, ignorarEditId){
  const doServidor = state.abastecimentos
    .filter(a=>a.equipamentoId===equipamentoId && a.id!==ignorarEditId)
    .map(a=>Number(a.leituraMedidor)).filter(n=>!isNaN(n));
  const daFila = state.filaAbastecimentos
    .filter(a=>a.equipamentoId===equipamentoId)
    .map(a=>Number(a.leituraMedidor)).filter(n=>!isNaN(n));
  const todas = doServidor.concat(daFila);
  return todas.length ? Math.max(...todas) : null;
}
function statusAbastecimentoPill(a){
  if(a._origem==='servidor') return '<span class="pill pill-ok">Sincronizado</span>';
  if(a.erroSincronizacao) return `<span class="pill pill-alerta" title="${a.erroSincronizacao}">Erro ao sincronizar</span>`;
  return '<span class="pill pill-warn">Pendente</span>';
}

  const pendentes = state.filaAbastecimentos.length;

  const linhasFila = state.filaAbastecimentos.map(a=>({...a, _origem:'fila'}));
  const linhas = [...linhasFila, ...linhasServidor].sort((a,b)=> (b.dataHora||'').localeCompare(a.dataHora||''));

      ${pendentes>0 ? ` · <strong>${pendentes} pendente(s) de sincronização</strong>${comErro>0?` (${comErro} com erro)`:''}` : ''}
      ${(typeof navigator!=='undefined' && navigator.onLine===false) ? ' · <span class="pill pill-warn">Offline</span>' : ''}

      ${pendentes>0 ? `<button class="btn btn-ghost btn-sm" data-sincronizar-fila="1" ${state.sincronizando?'disabled':''}>${state.sincronizando?'Sincronizando...':'Sincronizar agora'}</button>` : ''}
      ${podeEditar ? `<button class="btn btn-primary btn-sm" data-novo-abastecimento="1">+ Novo abastecimento</button>` : ''}
    </div>
  </div>
  <div class="card" style="overflow-x:auto;">
    ${linhas.length===0 ? Empty('Nenhum abastecimento registrado','Registre o primeiro abastecimento — funciona mesmo sem internet.') : `
    <table>
      <thead><tr>
        <th>Data/Hora</th><th>Tanque</th><th>Equipamento</th><th>Operador</th><th>Volume</th><th>Leitura</th><th>Rateio</th><th>Status</th><th></th>
      </tr></thead>
      <tbody>
        ${linhas.map(a=>`
          <tr>
            <td class="mono">${fmtDataHora(a.dataHora)}</td>
            <td>${fkNome('tanques', a.tanqueId)}</td>
            <td>${fkNome('equipamentos', a.equipamentoId)}</td>
            <td>${fkNome('operadores', a.operadorId)}</td>
            <td class="mono">${fmtInt(a.volumeLitros)} L</td>
            <td class="mono">${a.leituraMedidor!=null && a.leituraMedidor!=='' ? fmt(a.leituraMedidor,1) : '—'}</td>
            <td>${a.talhaoAreaId ? fkNome('talhoesAreas', a.talhaoAreaId) : (a.centroCustoId ? fkNome('centrosCusto', a.centroCustoId) : '—')}</td>
            <td>${statusAbastecimentoPill(a)}</td>
            <td style="display:flex; gap:6px;">
              ${a._origem==='servidor' && podeEditar ? `
                <button class="btn-ghost btn-sm" data-edit-abastecimento="${a.id}">Editar</button>
                <button class="btn-danger-ghost" data-del-abastecimento="${a.id}">Excluir</button>

              ${a._origem==='fila' ? `<button class="btn-danger-ghost" data-del-fila="${a.clientUuid}">Remover da fila</button>` : ''}
            </td>
          </tr>
        `).join('')}

async function excluirAbastecimento(id){

  const { error } = await db.from('abastecimentos').delete().eq('id', id);
  if(error){ alert('Não foi possível excluir: ' + mensagemErroSupabase(error)); return; }
  await loadAll();
}
async function excluirDaFila(clientUuid){
  if(!confirm('Remover este abastecimento pendente da fila local? Ele não será enviado.')) return;
  await idbExcluir(clientUuid);
  await atualizarFilaNaTela();
}
async function salvarAbastecimento(){
  const d = editDraft;
  const tanqueId = Number(document.getElementById('f-ab-tanque').value) || null;
  const equipamentoId = Number(document.getElementById('f-ab-equipamento').value) || null;
  const operadorId = Number(document.getElementById('f-ab-operador').value) || null;
  const dataHoraLocal = document.getElementById('f-ab-data-hora').value;
  const volumeLitros = Number(document.getElementById('f-ab-volume').value) || 0;
  const leituraRaw = document.getElementById('f-ab-leitura').value;
  const talhaoAreaId = Number(document.getElementById('f-ab-talhao').value) || null;
  const centroCustoId = Number(document.getElementById('f-ab-centro-custo').value) || null;
  const operacaoId = Number(document.getElementById('f-ab-operacao').value) || null;
  const observacao = document.getElementById('f-ab-observacao').value || null;
  const equipamento = state.equipamentos.find(e=>e.id===equipamentoId);
  const leituraMedidor = leituraRaw!=='' ? Number(leituraRaw) : null;

  // guarda o que já foi digitado no editDraft antes de validar: se der
  // erro, o render() do estado de erro reconstrói o modal a partir do
  // editDraft, e sem isso o formulário voltaria em branco pro usuário.
  Object.assign(d, {
    tanqueId, equipamentoId, operadorId, dataHora: dataHoraLocal,
    volumeLitros, leituraMedidor: leituraRaw, talhaoAreaId, centroCustoId, operacaoId, observacao,
  });

  let erro = '';
  if(!tanqueId) erro = erro || 'Selecione o tanque/comboio de origem.';
  if(!equipamentoId) erro = erro || 'Selecione o equipamento/veículo abastecido.';
  if(!operadorId) erro = erro || 'Selecione o operador.';
  if(!dataHoraLocal) erro = erro || 'Informe a data/hora do abastecimento.';
  if(!volumeLitros || volumeLitros<=0) erro = erro || 'Informe um volume abastecido maior que zero.';
  if(!talhaoAreaId && !centroCustoId) erro = erro || 'Selecione um talhão/área ou um centro de custo para o rateio.';
  if(equipamento && equipamento.tipoMedidor!=='nenhum' && leituraMedidor===null){
    erro = erro || `Informe a leitura do ${equipamento.tipoMedidor==='horimetro'?'horímetro':'hodômetro'} deste equipamento.`;
  }
  if(leituraMedidor!==null){
    const maiorConhecida = maiorLeituraConhecida(equipamentoId, d._editId);
    if(maiorConhecida!==null && leituraMedidor < maiorConhecida){
      erro = erro || `A leitura informada (${fmt(leituraMedidor,1)}) é menor que a última leitura conhecida deste equipamento (${fmt(maiorConhecida,1)}). Confira o valor.`;
    }
  }
  if(erro){ state.abastecimentoError = erro; render(); return; }

  const draft = {
    fazendaId: state.tanques.find(t=>t.id===tanqueId)?.fazendaId || null,
    tanqueId, equipamentoId, operadorId,
    dataHora: new Date(dataHoraLocal).toISOString(),
    volumeLitros, leituraMedidor,
    talhaoAreaId, centroCustoId, operacaoId, observacao,
  };

  state.abastecimentoLoading = true; state.abastecimentoError = ''; render();

  if(d._editId){
    // edição de um registro já sincronizado — sempre online, sem fila
    const { error } = await db.from('abastecimentos').update(construirLinhaAbastecimento(draft)).eq('id', d._editId);
    state.abastecimentoLoading = false;
    if(error){ state.abastecimentoError = mensagemErroSupabase(error); render(); return; }
    state.modal = null; editDraft = null;
    await loadAll();
    return;
  }

  // registro novo — tenta salvar online; se não der (sem sinal ou rede
  // instável), cai para a fila local e sincroniza sozinho depois.
  const clientUuid = crypto.randomUUID();
  if(navigator.onLine){
    try{
      const { error } = await db.from('abastecimentos').insert({ ...construirLinhaAbastecimento(draft), client_uuid: clientUuid });
      if(!error){
        state.abastecimentoLoading = false;
        state.modal = null; editDraft = null;
        await loadAll();
        return;
      }
      if(error.code){
        // erro de validação de verdade (ex: leitura retrocedendo) — não é falta de conexão
        state.abastecimentoLoading = false;
        state.abastecimentoError = mensagemErroSupabase(error);
        render();
        return;
      }
      // sem .code: parece falha de rede — segue para a fila offline abaixo
    }catch(e){ /* falha de rede (fetch) — segue para a fila offline abaixo */ }
  }

  await idbSalvar({ clientUuid, ...draft });
  state.abastecimentoLoading = false;
  state.modal = null; editDraft = null;
  await atualizarFilaNaTela();
  alert('Sem conexão no momento — o abastecimento foi salvo neste aparelho e será sincronizado automaticamente quando a internet voltar.');
}
function atualizarCamposDependentesAbastecimento(){
  const equipEl = document.getElementById('f-ab-equipamento');
  const campo = document.getElementById('campo-leitura-medidor');
  const label = document.getElementById('label-leitura-medidor');
  if(!equipEl || !campo || !label) return;
  const equipamento = state.equipamentos.find(e=>e.id===Number(equipEl.value));
  if(equipamento && equipamento.tipoMedidor!=='nenhum'){
    campo.style.display = '';
    label.textContent = equipamento.tipoMedidor==='horimetro' ? 'Leitura do horímetro (h)' : 'Leitura do hodômetro (km)';
  } else {
    campo.style.display = 'none';
  }
  atualizarAlertaCapacidadeTanque();
}
function atualizarAlertaCapacidadeTanque(){
  const equipEl = document.getElementById('f-ab-equipamento');
  const volumeEl = document.getElementById('f-ab-volume');
  const alertaEl = document.getElementById('alerta-capacidade-tanque');
  if(!equipEl || !volumeEl || !alertaEl) return;
  const equipamento = state.equipamentos.find(e=>e.id===Number(equipEl.value));
  const volume = Number(volumeEl.value) || 0;
  if(equipamento && equipamento.capacidadeTanqueLitros && volume > Number(equipamento.capacidadeTanqueLitros)){
    alertaEl.innerHTML = `<div class="login-error" style="margin:0;">⚠ Volume acima da capacidade do tanque deste equipamento (${fmtInt(equipamento.capacidadeTanqueLitros)} L). Confira antes de salvar.</div>`;
  } else {
    alertaEl.innerHTML = '';
  }
}

/* ===================== RATEIO & INDICADORES DE CONSUMO =====================
 * Telas só de leitura (nenhum CRUD aqui): agregam os abastecimentos já
 * registrados para mostrar custo/volume por frente, talhão, centro de
 * custo e equipamento. O custo de cada abastecimento usa o custo médio
 * ponderado das entradas do tanque ATÉ a data do abastecimento — não a
 * média de hoje — para refletir o preço vigente no momento do consumo.
 * Fica de fora desta fase (sem dado-fonte no sistema ainda): custo por
 * tonelada colhida/produzida (depende de volume de colheita, que só
 * existirá quando os apps de cana/grãos forem criados) e "evolução por
 * safra" (melhor lugar é a Fase de dashboards, com gráficos de verdade).
 */
const FRENTE_LABELS = {cana:'Cana-de-açúcar', graos:'Grãos', pecuaria:'Pecuária', geral:'Geral'};
function labelFrente(f){ return FRENTE_LABELS[f] || f; }
function pillFrente(f){ return f==='geral' ? 'pill-cat' : 'pill-ok'; }
function hojeISO(){ return new Date().toISOString().slice(0,10); }
function primeiroDiaMesISO(){ const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`; }
function custoAbastecimento(a){
  const custoUnit = custoMedioPonderado(a.tanqueId, a.dataHora);
  return custoUnit!=null ? custoUnit * Number(a.volumeLitros||0) : null;
}
function abastecimentosNoPeriodo(){
  const { dataInicio, dataFim } = state.rateioFiltro;
  return state.abastecimentos.filter(a=>{
    const d = String(a.dataHora||'').slice(0,10);
    return (!dataInicio || d>=dataInicio) && (!dataFim || d<=dataFim);
  });
}
function frenteDoAbastecimento(a){
  if(a.talhaoAreaId){
    const talhao = state.talhoesAreas.find(t=>t.id===a.talhaoAreaId);
    const cultura = talhao?.culturaId ? state.culturas.find(c=>c.id===talhao.culturaId) : null;
    return cultura?.frente || 'geral';
  }
  if(a.centroCustoId){
    const cc = state.centrosCusto.find(c=>c.id===a.centroCustoId);
    return cc?.frente || 'geral';
  }
  return 'geral';
}
function agruparPorFrente(lista){
  const grupos = {};
  lista.forEach(a=>{
    const frente = frenteDoAbastecimento(a);
    if(!grupos[frente]) grupos[frente] = {frente, volume:0, custo:0, qtd:0};
    grupos[frente].volume += Number(a.volumeLitros||0);
    grupos[frente].qtd += 1;
    const c = custoAbastecimento(a);
    if(c!=null) grupos[frente].custo += c;
  });
  return Object.values(grupos).sort((a,b)=>b.custo-a.custo);
}
function agruparPorTalhao(lista){
  const grupos = {};
  lista.forEach(a=>{
    if(!a.talhaoAreaId) return;
    if(!grupos[a.talhaoAreaId]) grupos[a.talhaoAreaId] = {talhaoId:a.talhaoAreaId, volume:0, custo:0, qtd:0};
    grupos[a.talhaoAreaId].volume += Number(a.volumeLitros||0);
    grupos[a.talhaoAreaId].qtd += 1;
    const c = custoAbastecimento(a);
    if(c!=null) grupos[a.talhaoAreaId].custo += c;
  });
  return Object.values(grupos).map(g=>{
    const talhao = state.talhoesAreas.find(t=>t.id===g.talhaoId);
    const areaHa = talhao?.areaHa || null;
    return {
      ...g, nome: talhao?.nome || '—',
      areaHa,
      volumePorHa: areaHa ? g.volume/areaHa : null,
      custoPorHa: areaHa ? g.custo/areaHa : null,
    };
  }).sort((a,b)=>b.custo-a.custo);
}
function agruparPorCentroCusto(lista){
  const grupos = {};
  lista.forEach(a=>{
    if(!a.centroCustoId) return;
    if(!grupos[a.centroCustoId]) grupos[a.centroCustoId] = {centroCustoId:a.centroCustoId, volume:0, custo:0, qtd:0};
    grupos[a.centroCustoId].volume += Number(a.volumeLitros||0);
    grupos[a.centroCustoId].qtd += 1;
    const c = custoAbastecimento(a);
    if(c!=null) grupos[a.centroCustoId].custo += c;
  });
  return Object.values(grupos).map(g=>{
    const cc = state.centrosCusto.find(c=>c.id===g.centroCustoId);
    return {...g, nome: cc?.nome || '—', frente: cc?.frente || 'geral'};
  }).sort((a,b)=>b.custo-a.custo);
}
function agruparPorEquipamento(lista){
  const porEquip = {};
  lista.forEach(a=>{
    (porEquip[a.equipamentoId] = porEquip[a.equipamentoId] || []).push(a);
  });
  return Object.entries(porEquip).map(([idStr, registros])=>{
    const equipamentoId = Number(idStr);
    const equipamento = state.equipamentos.find(e=>e.id===equipamentoId);
    const volume = registros.reduce((a,r)=>a+Number(r.volumeLitros||0),0);
    const custo = registros.reduce((a,r)=>{ const c = custoAbastecimento(r); return a+(c||0); }, 0);
    let consumo = null, unidade = '';
    if(equipamento && equipamento.tipoMedidor!=='nenhum'){
      const leituras = registros.map(r=>Number(r.leituraMedidor)).filter(n=>!isNaN(n));
      if(leituras.length>=2){
        const percorrido = Math.max(...leituras) - Math.min(...leituras);
        if(percorrido>0){
          consumo = volume/percorrido;
          unidade = equipamento.tipoMedidor==='horimetro' ? 'L/h' : 'L/km';
        }
      }
    }
    return { equipamentoId, nome: equipamento?.nome||'—', tipo: equipamento?.tipo||'', volume, custo, consumo, unidade, qtd: registros.length };
  }).sort((a,b)=>b.custo-a.custo);
}

  </div>
  <div class="card">
    ${grupos.length===0 ? Empty('Nenhum abastecimento no período','Ajuste o período ou registre abastecimentos na aba Abastecimento.') : `
    <table>

      <tbody>

          <tr>
            <td><span class="pill ${pillFrente(g.frente)}">${labelFrente(g.frente)}</span></td>
            <td class="mono">${fmtInt(g.volume)} L</td>
            <td class="mono">R$ ${fmt(g.custo)}</td>
            <td class="mono">${custoTotal>0 ? fmt(g.custo/custoTotal*100,1) : '0,0'}%</td>

      </tbody>
    </table>`}
  </div>`;
}

/* ===================== MODAL GENÉRICO DE CADASTRO ===================== */
function novoCadastroDraft(key){
  const cfg = CADASTROS[key];
  const draft = {};
  cfg.fields.forEach(f=>{
    if(f.type==='checkbox') draft[f.key] = f.default!==undefined ? f.default : true;
    else if(f.type==='select') draft[f.key] = f.options[0]?.value ?? '';
    else if(f.type==='fk') draft[f.key] = (state[f.refEntity]||[]).find(x=>x.ativo!==false)?.id ?? '';
    else if(f.key==='unidade') draft[f.key] = 'L';
    else draft[f.key] = '';
  });
  return draft;
}
function abrirNovoCadastro(key){
  editDraft = novoCadastroDraft(key);
  state.cadastroError = '';
  state.modal = {type:'cadastro', key};
}
function abrirEditarCadastro(key, id){
  const item = state[key].find(x=>x.id===id);
  if(!item) return;
  editDraft = {...item, _editId:item.id};
  state.cadastroError = '';
  state.modal = {type:'cadastro', key};
}
async function excluirCadastro(key, id){
  const cfg = CADASTROS[key];
  if(!confirm(`Excluir este(a) ${cfg.singular.toLowerCase()}? Essa ação não pode ser desfeita.`)) return;
  const { error } = await db.from(cfg.table).delete().eq('id', id);
  if(error){ alert('Não foi possível excluir: ' + mensagemErroSupabase(error)); return; }
  await loadAll();
}
function mensagemErroSupabase(error){
  if(error?.code==='23505') return 'Já existe um registro com esse nome (talvez nesta fazenda). Use outro nome ou edite o existente.';
  if(error?.code==='23503') return 'Não é possível excluir: existem outros cadastros vinculados a este registro.';
  if(error?.code==='23514') return 'Verifique os valores informados (ex: volume precisa ser maior que zero, ajuste não pode ser zero).';
  return error?.message || 'Erro desconhecido.';
}
function campoHtml(f, d){
  const val = d[f.key] ?? '';
  const id = `f-${f.key}`;
  if(f.type==='checkbox'){
    return `<div class="field"><label><input type="checkbox" id="${id}" ${val?'checked':''} style="width:auto; margin-right:6px;"/> ${f.label}</label></div>`;
  }
  if(f.type==='textarea'){
    return `<div class="field"><label>${f.label}</label><textarea id="${id}" rows="3">${val}</textarea></div>`;
  }
  if(f.type==='select'){
    return `<div class="field"><label>${f.label}</label><select id="${id}">${f.options.map(o=>`<option value="${o.value}" ${val===o.value?'selected':''}>${o.label}</option>`).join('')}</select></div>`;
  }
  if(f.type==='fk'){
    const lista = (state[f.refEntity]||[]).filter(x=>x.ativo!==false);
    return `<div class="field"><label>${f.label}</label>
      <select id="${id}">
        ${f.required?'':'<option value="">—</option>'}
        ${lista.map(o=>`<option value="${o.id}" ${String(val)===String(o.id)?'selected':''}>${o.nome}</option>`).join('')}
      </select>
      ${lista.length===0?`<span class="hint">Cadastre ${CADASTROS[f.refEntity].singular.toLowerCase()} antes.</span>`:''}
    </div>`;
  }
  if(f.type==='date'){
    return `<div class="field"><label>${f.label}</label><input type="date" id="${id}" value="${val}"/></div>`;
  }
  if(f.type==='number'){
    return `<div class="field"><label>${f.label}</label><input type="number" step="${f.step||'1'}" id="${id}" value="${val}"/>${f.hint?`<span class="hint">${f.hint}</span>`:''}</div>`;
  }
  return `<div class="field"><label>${f.label}</label><input type="text" id="${id}" value="${val}" ${f.placeholder?`placeholder="${f.placeholder}"`:''}/></div>`;
}
function ModalCadastro(){
  const key = state.modal.key;
  const cfg = CADASTROS[key];
  const d = editDraft;
  return `
  <div class="overlay" data-close-overlay="1">
    <div class="modal" data-stop="1">
      <div class="modal-head"><h3>${d._editId?'Editar':'Novo(a)'} ${cfg.singular}</h3><button class="modal-close" data-close="1">&times;</button></div>
      <div class="modal-body">
        ${state.cadastroError ? `<div class="login-error">${state.cadastroError}</div>` : ''}
        ${cfg.fields.map(f=>campoHtml(f, d)).join('')}
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close="1">Cancelar</button>
        <button class="btn btn-primary" data-save-cadastro="${key}" ${state.cadastroLoading?'disabled':''}>${state.cadastroLoading?'Salvando...':'Salvar'}</button>
      </div>
    </div>
  </div>`;
}
function lerCampoDOM(f){
  const el = document.getElementById(`f-${f.key}`);
  if(!el) return undefined;
  return f.type==='checkbox' ? el.checked : el.value;
}
async function salvarCadastro(key){
  const cfg = CADASTROS[key];
  const row = {};
  let erro = '';
  cfg.fields.forEach(f=>{
    const raw = lerCampoDOM(f);
    if(f.required && (raw===''||raw===undefined||raw===null)) erro = erro || `Preencha o campo "${f.label}".`;
    let val = raw;
    if(f.type==='number') val = (raw===''||raw===undefined||raw===null) ? null : Number(raw);
    if(f.type==='fk') val = raw ? Number(raw) : null;
    if(f.type==='date') val = raw || null;
    if(f.type==='checkbox') val = !!raw;
    row[toSnake(f.key)] = (val===''? null : val);
  });
  if(erro){ state.cadastroError = erro; render(); return; }
  state.cadastroLoading = true; state.cadastroError = ''; render();
  let error;
  if(editDraft._editId){
    ({error} = await db.from(cfg.table).update(row).eq('id', editDraft._editId));
  } else {
    ({error} = await db.from(cfg.table).insert(row));
  }
  state.cadastroLoading = false;
  if(error){ state.cadastroError = mensagemErroSupabase(error); render(); return; }
  state.modal = null; editDraft = null;
  await loadAll();
}

/* ===================== ADMINISTRAÇÃO: USUÁRIOS ===================== */
const MODULOS_PERMISSAO = [
  ['cadastros','Cadastros'],
  ['estoque','Estoque'],
  ['abastecimento','Abastecimento'],
  ['rateio','Rateio & Indicadores'],
];
const PAPEL_LABELS = {admin:'Administrador', gestor:'Gestor', encarregado:'Encarregado', operador:'Operador'};
function papelPill(papel){
  const label = PAPEL_LABELS[papel] || papel;
  const classe = papel==='admin' ? 'pill-cat' : (papel==='gestor' ? 'pill-warn' : 'pill-ok');
  return `<span class="pill ${classe}">${label}</span>`;
}
function PageAdminUsuarios(){
  return `

  </div>
  <div class="card" style="overflow-x:auto;">
    ${state.perfis.length===0 ? Empty('Nenhum usuário cadastrado','Crie contas de acesso para as pessoas da sua equipe.') : `

}

  return `
  <div class="overlay" data-close-overlay="1">
    <div class="modal" data-stop="1">
      <div class="modal-head"><h3>Novo usuário</h3><button class="modal-close" data-close="1">&times;</button></div>
      <div class="modal-body">
        ${state.usuarioError ? `<div class="login-error">${state.usuarioError}</div>` : ''}
        <div class="field"><label>Nome completo</label><input id="f-nomeusuario" value="${d.nome}" placeholder="Ex: João Silva" autocomplete="off"/></div>
        <div class="field"><label>Usuário (login)</label><input id="f-usuario" value="${d.usuario}" placeholder="Ex: joao.silva" autocomplete="off"/><span class="hint">Sem espaços ou acentos. É o que a pessoa vai digitar para entrar.</span></div>
        <div class="field"><label>Senha</label><input id="f-senhausuario" type="password" value="${d.senha}" autocomplete="new-password"/><span class="hint">Mínimo 6 caracteres. Pode ser trocada depois pela pessoa.</span></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close="1">Cancelar</button>
        <button class="btn btn-primary" data-criar-usuario="1" ${state.usuarioLoading?'disabled':''}>${state.usuarioLoading?'Criando...':'Criar usuário'}</button>
      </div>
    </div>
  </div>`;
}
function ModalPermissoes(){
  const d = editDraft;
  return `
  <div class="overlay" data-close-overlay="1">
    <div class="modal" data-stop="1">
      <div class="modal-head"><h3>Editar acesso — ${d.nome}</h3><button class="modal-close" data-close="1">&times;</button></div>
      <div class="modal-body">
        <div class="field"><label>Usuário</label><input value="${d.usuario}" disabled/></div>
        <div class="field"><label>Perfil</label>
          <select id="f-papelusuario">
            <option value="operador" ${d.papel==='operador'?'selected':''}>Operador</option>
            <option value="encarregado" ${d.papel==='encarregado'?'selected':''}>Encarregado</option>
            <option value="gestor" ${d.papel==='gestor'?'selected':''}>Gestor</option>
            <option value="admin" ${d.papel==='admin'?'selected':''}>Administrador</option>
          </select>
        </div>
        <div class="field"><label><input type="checkbox" id="f-ativousuario" ${d.ativo?'checked':''} style="width:auto; margin-right:6px;"/> Conta ativa</label></div>
        <p class="hint">Administrador tem acesso total a todos os módulos — a tabela abaixo vale para os demais perfis.</p>
        <table class="perm-matrix">

                    <option value="nenhum" ${(!d.permissoes[key] || d.permissoes[key]==='nenhum')?'selected':''}>Nenhum</option>
                    <option value="visualizar" ${d.permissoes[key]==='visualizar'?'selected':''}>Visualizar</option>
                    <option value="editar" ${d.permissoes[key]==='editar'?'selected':''}>Editar</option>
                  </select>

              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close="1">Cancelar</button>
        <button class="btn btn-primary" data-save="permissoes">Salvar</button>

function ModalTrocarSenha(){
  const d = editDraft;
  return `
  <div class="overlay" data-close-overlay="1">
    <div class="modal" data-stop="1">
      <div class="modal-head"><h3>Trocar senha</h3><button class="modal-close" data-close="1">&times;</button></div>
      <div class="modal-body">
        <div class="field"><label>Senha atual</label><input id="f-senhaatual" type="password" autocomplete="current-password" value="${d.senhaAtual}"/></div>
        <div class="field"><label>Nova senha</label><input id="f-novasenha" type="password" autocomplete="new-password" value="${d.novaSenha}"/></div>
        <div class="field"><label>Confirmar nova senha</label><input id="f-confirmarsenha" type="password" autocomplete="new-password" value="${d.confirmarSenha}"/></div>

      </div>
      <div class="modal-foot">

        <button class="btn btn-primary" data-save="trocarSenha">Salvar nova senha</button>
      </div>

}
function Modal(){
  if(state.modal.type==='cadastro') return ModalCadastro();
  if(state.modal.type==='abastecimento') return ModalAbastecimento();
  if(state.modal.type==='usuario') return ModalUsuario();
  if(state.modal.type==='permissoes') return ModalPermissoes();
  if(state.modal.type==='trocarSenha') return ModalTrocarSenha();
  return '';
}

/* ===================== EVENTOS ===================== */
function attachEvents(){
  const loginForm = document.querySelector('[data-login-form]');
  if(loginForm){
    loginForm.onsubmit = (e)=>{ e.preventDefault(); fazerLogin(); };
    const uEl = document.querySelector('[data-login-usuario]');
    const sEl = document.querySelector('[data-login-senha]');
    if(uEl) uEl.oninput = (e)=>{ state.loginDraft.usuario = e.target.value; };
    if(sEl) sEl.oninput = (e)=>{ state.loginDraft.senha = e.target.value; };
  }
  document.querySelectorAll('[data-logout]').forEach(el=>{ el.onclick = ()=> fazerLogout(); });
  document.querySelectorAll('[data-trocar-senha-abrir]').forEach(el=>{
    el.onclick = ()=>{ editDraft = {senhaAtual:'', novaSenha:'', confirmarSenha:''}; state.modal = {type:'trocarSenha'}; render(); };
  });
  document.querySelectorAll('[data-novo-usuario]').forEach(el=>{
    el.onclick = ()=>{ editDraft = {nome:'', usuario:'', senha:''}; state.usuarioError=''; state.modal = {type:'usuario'}; render(); };
  });
  document.querySelectorAll('[data-editar-usuario]').forEach(el=>{
    el.onclick = ()=>{
      const perfil = state.perfis.find(p=>p.id===el.dataset.editarUsuario);
      editDraft = {_perfilId: perfil.id, nome: perfil.nome, usuario: perfil.usuario, papel: perfil.papel, ativo: perfil.ativo, permissoes: {...perfil.permissoes}};
      state.modal = {type:'permissoes'}; render();
    };
  });
  const criarUsuarioBtn = document.querySelector('[data-criar-usuario]');
  if(criarUsuarioBtn){
    criarUsuarioBtn.onclick = async ()=>{
      const nome = document.getElementById('f-nomeusuario').value.trim();
      const usuario = document.getElementById('f-usuario').value.trim();
      const senha = document.getElementById('f-senhausuario').value;
      if(!nome || !usuario || !senha){ state.usuarioError = 'Preencha nome, usuário e senha.'; render(); return; }
      state.usuarioLoading = true; state.usuarioError = ''; render();
      const { data, error } = await db.functions.invoke('criar-usuario-combustivel', { body: { nome, usuario, senha } });
      state.usuarioLoading = false;
      if(error || data?.error){
        let msg = data?.error || error?.message || 'Falha ao criar usuário.';
        if(error?.context && typeof error.context.json === 'function'){
          try { const corpo = await error.context.json(); if(corpo?.error) msg = corpo.error; } catch(e){}
        }
        state.usuarioError = msg; render(); return;
      }
      state.modal = null; editDraft = null;
      await loadAll();
    };
  }
  const searchEl = document.querySelector('[data-search]');
  if(searchEl){
    searchEl.oninput = (e)=>{
      state.search = e.target.value; render();
      const s = document.querySelector('[data-search]');
      s.focus(); s.setSelectionRange(s.value.length, s.value.length);
    };
  }
  document.querySelectorAll('[data-nav-group]').forEach(el=>{
    el.onclick = ()=>{
      const group = GROUPS[el.dataset.navGroup];
      if(!group.pages.some(p=>p.key===state.page)) state.page = group.pages[0].key;
      render();
    };
  });
  document.querySelectorAll('[data-subnav]').forEach(el=>{
    el.onclick = ()=>{ state.page = el.dataset.subnav; render(); };
  });
  document.querySelectorAll('[data-novo-cadastro]').forEach(el=>{
    el.onclick = ()=>{ abrirNovoCadastro(el.dataset.novoCadastro); render(); };
  });
  document.querySelectorAll('[data-edit-cadastro]').forEach(el=>{
    el.onclick = ()=>{
      const [key, idStr] = el.dataset.editCadastro.split(':');
      abrirEditarCadastro(key, Number(idStr));
      render();
    };
  });
  document.querySelectorAll('[data-del-cadastro]').forEach(el=>{
    el.onclick = async ()=>{
      const [key, idStr] = el.dataset.delCadastro.split(':');
      await excluirCadastro(key, Number(idStr));
    };
  });
  const saveCadastroBtn = document.querySelector('[data-save-cadastro]');
  if(saveCadastroBtn){
    saveCadastroBtn.onclick = ()=> salvarCadastro(saveCadastroBtn.dataset.saveCadastro);
  }
  document.querySelectorAll('[data-novo-abastecimento]').forEach(el=>{
    el.onclick = ()=>{ abrirNovoAbastecimento(); render(); };
  });
  document.querySelectorAll('[data-edit-abastecimento]').forEach(el=>{
    el.onclick = ()=>{ abrirEditarAbastecimento(Number(el.dataset.editAbastecimento)); render(); };
  });
  document.querySelectorAll('[data-del-abastecimento]').forEach(el=>{
    el.onclick = async ()=>{ await excluirAbastecimento(Number(el.dataset.delAbastecimento)); };
  });
  document.querySelectorAll('[data-del-fila]').forEach(el=>{
    el.onclick = async ()=>{ await excluirDaFila(el.dataset.delFila); };
  });
  document.querySelectorAll('[data-sincronizar-fila]').forEach(el=>{
    el.onclick = ()=> sincronizarFila();
  });
  const saveAbastecimentoBtn = document.querySelector('[data-save-abastecimento]');
  if(saveAbastecimentoBtn){
    saveAbastecimentoBtn.onclick = ()=> salvarAbastecimento();
  }
  document.querySelectorAll('[data-ab-equipamento-change]').forEach(el=>{
    el.onchange = ()=> atualizarCamposDependentesAbastecimento();
  });
  document.querySelectorAll('[data-ab-volume-change]').forEach(el=>{
    el.oninput = ()=> atualizarAlertaCapacidadeTanque();
  });
  document.querySelectorAll('[data-ab-tanque-change]').forEach(el=>{
    el.onchange = (e)=>{
      const tanque = state.tanques.find(t=>t.id===Number(e.target.value));
      const hintEl = e.target.parentElement.querySelector('.hint');
      if(tanque && hintEl) hintEl.textContent = `${tanque.tipo==='comboio'?'Comboio (abastecimento móvel em campo)':'Tanque fixo'} · ${fkNome('produtos', tanque.produtoId)}`;
    };
  });
  document.querySelectorAll('[data-rateio-periodo]').forEach(el=>{
    el.onchange = ()=>{
      state.rateioFiltro.dataInicio = document.getElementById('f-rateio-inicio').value;
      state.rateioFiltro.dataFim = document.getElementById('f-rateio-fim').value;
      render();
    };
  });
  document.querySelectorAll('[data-close], [data-close-overlay]').forEach(el=>{
    el.onclick = (e)=>{ if(e.target.dataset.stop) return; state.modal = null; editDraft = null; render(); };
  });
  const stopEl = document.querySelector('[data-stop]');
  if(stopEl) stopEl.onclick = (e)=> e.stopPropagation();

  // ações que não passam pelo motor genérico de cadastro (permissões e troca de senha)
  const saveBtn = document.querySelector('[data-save]');
  if(saveBtn){
    saveBtn.onclick = async ()=>{
      const type = saveBtn.dataset.save;
      let error = null;
      if(type==='permissoes'){
        const papel = document.getElementById('f-papelusuario').value;
        const ativo = document.getElementById('f-ativousuario').checked;
        const permissoes = {};
        document.querySelectorAll('[data-perm-modulo]').forEach(sel=>{ permissoes[sel.dataset.permModulo] = sel.value; });
        ({error} = await db.from('profiles').update({papel, ativo, permissoes}).eq('id', editDraft._perfilId));
      } else if(type==='trocarSenha'){
        const senhaAtual = document.getElementById('f-senhaatual').value;
        const novaSenha = document.getElementById('f-novasenha').value;
        const confirmarSenha = document.getElementById('f-confirmarsenha').value;
        if(!senhaAtual || !novaSenha || !confirmarSenha){ alert('Preencha todos os campos.'); return; }
        if(novaSenha.length<6){ alert('A nova senha precisa ter pelo menos 6 caracteres.'); return; }
        if(novaSenha!==confirmarSenha){ alert('A confirmação não bate com a nova senha.'); return; }
        const email = `${state.perfil.usuario}@${DOMINIO_LOGIN}`;
        const { error: erroSenhaAtual } = await db.auth.signInWithPassword({ email, password: senhaAtual });
        if(erroSenhaAtual){ alert('Senha atual incorreta.'); return; }
        ({error} = await db.auth.updateUser({ password: novaSenha }));
        if(error){ alert('Não foi possível trocar a senha: ' + error.message); return; }
        state.modal = null; editDraft = null;
        alert('Senha alterada com sucesso.');
        render();
        return;
      }
      if(error){ alert('Não foi possível salvar: ' + error.message); return; }
      state.modal = null; editDraft = null;
      await loadAll();
    };
  }
}

initAuth();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw_combustivel.js'));
}
</script>
