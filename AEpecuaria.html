<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AE Nutrição — Gestão de Confinamento</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0F2A4A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde-escuro:#0F2A4A;
    --verde-medio:#1D5DA8;
    --verde-claro:#9DC0E8;
    --grafite:#1E2A38;
    --cinza:#65758A;
    --cinza-claro:#DEE6F0;
    --cinza-bg:#F2F5FA;
    --branco:#FFFFFF;
    --trigo:#C98A2B;
    --alerta:#B3462F;
    --alerta-bg:#F6E7E2;
    --ok-bg:#E5EEF9;
    --radius:10px;
    --shadow:0 1px 2px rgba(15,42,74,0.06), 0 4px 12px rgba(15,42,74,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--cinza-bg);
    color:var(--grafite);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    display:flex;
    min-height:100vh;
  }
  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:230px;
    flex-shrink:0;
    background:var(--verde-escuro);
    color:var(--branco);
    display:flex;
    flex-direction:column;
    padding:24px 16px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 8px 24px 8px;
    margin-bottom:8px;
    border-bottom:1px solid rgba(255,255,255,0.12);
  }
  .brand-mark{
    width:32px;height:32px;flex-shrink:0;
  }
  .brand-name{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:19px;
    letter-spacing:0.2px;
  }
  .brand-sub{
    font-size:10px;
    color:var(--verde-claro);
    letter-spacing:1.2px;
    text-transform:uppercase;
    margin-top:-2px;
  }
  nav{margin-top:18px; display:flex; flex-direction:column; gap:4px;}
  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    font-weight:500;
    color:rgba(255,255,255,0.72);
    transition:background 0.15s, color 0.15s;
    border:none;
    background:none;
    width:100%;
    text-align:left;
  }
  .nav-item:hover{background:rgba(255,255,255,0.06); color:var(--branco);}
  .nav-item.active{background:var(--verde-medio); color:var(--branco);}
  .nav-item svg{flex-shrink:0;}
  .sidebar-footer{
    margin-top:auto;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,0.12);
    font-size:11px;
    color:rgba(255,255,255,0.45);
    line-height:1.5;
  }
  /* ---------- MAIN ---------- */
  .main{
    flex:1;
    padding:32px 40px 60px 40px;
    max-width:1180px;
  }
  .page-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:28px;
  }
  .eyebrow{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.4px;
    color:var(--verde-medio);
    font-weight:600;
    margin:0 0 4px 0;
  }
  h1{
    font-family:'Fraunces',serif;
    font-size:28px;
    font-weight:600;
    margin:0;
    color:var(--verde-escuro);
  }
  .page-desc{color:var(--cinza); font-size:13.5px; margin-top:6px; max-width:520px;}
  .btn{
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    font-weight:600;
    padding:10px 18px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    transition:filter 0.15s, transform 0.1s;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--verde-escuro); color:var(--branco);}
  .btn-primary:hover{filter:brightness(1.15);}
  .btn-ghost{background:transparent; color:var(--verde-escuro); border:1px solid var(--cinza-claro);}
  .btn-ghost:hover{background:var(--branco);}
  .btn-danger-ghost{background:transparent; color:var(--alerta); border:1px solid var(--cinza-claro); padding:6px 10px; font-size:12px;}
  .btn-danger-ghost:hover{background:var(--alerta-bg);}
  .btn-sm{padding:6px 12px; font-size:12.5px;}

  .card{
    background:var(--branco);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    border:1px solid var(--cinza-claro);
  }
  .card-pad{padding:22px 24px;}
  .stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px;}
  .stat-card{
    background:var(--branco);
    border:1px solid var(--cinza-claro);
    border-radius:var(--radius);
    padding:16px 18px;
  }
  .stat-label{font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--cinza); font-weight:600;}
  .stat-value{
    font-family:'IBM Plex Mono',monospace;
    font-size:22px;
    font-weight:600;
    color:var(--verde-escuro);
    margin-top:6px;
  }
  .stat-value.alerta{color:var(--alerta);}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{
    text-align:left;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--cinza);
    font-weight:600;
    padding:10px 14px;
    border-bottom:1px solid var(--cinza-claro);
    white-space:nowrap;
  }
  td{
    padding:12px 14px;
    border-bottom:1px solid var(--cinza-claro);
    color:var(--grafite);
    vertical-align:middle;
  }
  tr:last-child td{border-bottom:none;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .pill{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    padding:3px 9px;
    border-radius:20px;
  }
  .pill-ok{background:var(--ok-bg); color:var(--verde-medio);}
  .pill-alerta{background:var(--alerta-bg); color:var(--alerta);}
  .pill-cat{background:var(--cinza-claro); color:var(--grafite);}

  /* silo gauge */
  .silo-wrap{display:flex; align-items:center; gap:8px;}
  .silo{
    width:14px; height:30px;
    border:1.5px solid var(--verde-escuro);
    border-radius:3px;
    position:relative;
    overflow:hidden;
    background:var(--cinza-claro);
    flex-shrink:0;
  }
  .silo-fill{
    position:absolute; bottom:0; left:0; right:0;
    background:var(--verde-medio);
  }
  .silo-fill.alerta{background:var(--alerta);}

  /* form modal */
  .overlay{
    position:fixed; inset:0; background:rgba(31,61,46,0.35);
    display:flex; align-items:flex-start; justify-content:center;
    padding:50px 20px; overflow-y:auto; z-index:50;
  }
  .modal{
    background:var(--branco); border-radius:14px; width:100%; max-width:560px;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-head{
    padding:20px 24px; border-bottom:1px solid var(--cinza-claro);
    display:flex; justify-content:space-between; align-items:center;
  }
  .modal-head h3{font-family:'Fraunces',serif; font-size:18px; margin:0; color:var(--verde-escuro);}
  .modal-close{background:none;border:none;cursor:pointer;color:var(--cinza);font-size:20px; line-height:1;}
  .modal-body{padding:22px 24px; display:flex; flex-direction:column; gap:14px; max-height:70vh; overflow-y:auto;}
  .modal-foot{padding:16px 24px; border-top:1px solid var(--cinza-claro); display:flex; justify-content:flex-end; gap:10px;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  label{font-size:12px; font-weight:600; color:var(--grafite);}
  input, select, textarea{
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    padding:9px 11px;
    border:1px solid var(--cinza-claro);
    border-radius:7px;
    background:var(--branco);
    color:var(--grafite);
    outline:none;
  }
  input:focus, select:focus, textarea:focus{border-color:var(--verde-medio); box-shadow:0 0 0 3px rgba(61,107,79,0.12);}
  .hint{font-size:11px; color:var(--cinza);}
  .composicao-row{
    display:grid; grid-template-columns: 1fr 90px 32px; gap:8px; align-items:center;
  }
  .total-bar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; border-radius:8px; background:var(--cinza-bg); font-size:13px;
  }
  .total-bar.ok{color:var(--verde-medio); font-weight:600;}
  .total-bar.warn{color:var(--trigo); font-weight:600;}

  .empty{
    text-align:center; padding:50px 20px; color:var(--cinza);
  }
  .empty h4{font-family:'Fraunces',serif; color:var(--verde-escuro); margin:10px 0 6px 0; font-size:16px;}
  .diet-card{
    border:1px solid var(--cinza-claro); border-radius:var(--radius); margin-bottom:14px; overflow:hidden;
  }
  .diet-head{
    padding:16px 20px; display:flex; justify-content:space-between; align-items:center;
    cursor:pointer; background:var(--branco);
  }
  .diet-head:hover{background:var(--cinza-bg);}
  .diet-title{font-family:'Fraunces',serif; font-weight:600; font-size:15.5px; color:var(--verde-escuro);}
  .diet-sub{font-size:12px; color:var(--cinza); margin-top:2px;}
  .diet-metrics{display:flex; gap:22px;}
  .diet-metric{text-align:right;}
  .diet-metric .v{font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--verde-escuro); font-size:14px;}
  .diet-metric .l{font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:var(--cinza);}
  .diet-body{padding:0 20px 18px 20px; border-top:1px solid var(--cinza-claro); background:var(--cinza-bg);}
  .chev{transition:transform 0.15s;}
  .chev.open{transform:rotate(180deg);}
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:12px;}
  .search{
    display:flex; align-items:center; gap:8px; background:var(--branco);
    border:1px solid var(--cinza-claro); border-radius:8px; padding:8px 12px; width:260px;
  }
  .search input{border:none; padding:0; flex:1;}
  .search input:focus{box-shadow:none;}

  /* ---------- RESPONSIVO (celular) ---------- */
  @media (max-width:760px){
    .app{flex-direction:column;}
    .sidebar{
      width:100%; flex-direction:row; align-items:center; justify-content:space-between;
      padding:12px 16px; gap:12px; overflow-x:auto;
    }
    .brand{border-bottom:none; padding:0; margin-bottom:0; flex-shrink:0;}
    .brand-sub{display:none;}
    nav{margin-top:0; flex-direction:row; gap:4px;}
    .nav-item{white-space:nowrap; padding:8px 10px; font-size:13px;}
    .sidebar-footer{display:none;}
    .main{padding:20px 16px 48px 16px; max-width:100%;}
    .page-header{flex-direction:column; align-items:flex-start; gap:14px;}
    h1{font-size:23px;}
    .btn{width:100%; justify-content:center;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .toolbar{flex-direction:column; align-items:stretch;}
    .search{width:100%;}
    .card{overflow-x:auto; -webkit-overflow-scrolling:touch;}
    .field-row{grid-template-columns:1fr;}
    .composicao-row{grid-template-columns:1fr 68px 28px; gap:6px;}
    .overlay{padding:16px 10px;}
    .diet-metrics{flex-wrap:wrap; gap:10px 16px; justify-content:flex-end;}
    .diet-head{flex-direction:column; align-items:flex-start; gap:10px;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== SUPABASE ===================== */
const db = supabase.createClient(
  'https://leojfqlbdtlriemdgnyw.supabase.co',
  'sb_publishable_IYD9cnj_7tlul7K5zs5YHg_kv5YvzjB'
);

function rowToIngrediente(r){ return {id:r.id, nome:r.nome, categoria:r.categoria, fornecedor:r.fornecedor, unidade:r.unidade, ms:r.ms, pb:r.pb, ndt:r.ndt, precoKg:r.preco_kg, estoqueMin:r.estoque_min, obs:r.obs||''}; }
function ingredienteToRow(i){ return {nome:i.nome, categoria:i.categoria, fornecedor:i.fornecedor, unidade:i.unidade, ms:i.ms, pb:i.pb, ndt:i.ndt, preco_kg:i.precoKg, estoque_min:i.estoqueMin, obs:i.obs||''}; }
function rowToMovimento(r){ return {id:r.id, data:r.data, ingredienteId:r.ingrediente_id, tipo:r.tipo, quantidade:r.quantidade}; }
function movimentoToRow(m){ return {data:m.data, ingrediente_id:m.ingredienteId, tipo:m.tipo, quantidade:m.quantidade}; }
function rowToDieta(r){ return {id:r.id, nome:r.nome, categoriaAnimal:r.categoria_animal, kgAnimalDia:r.kg_animal_dia, itens:r.itens||[]}; }
function dietaToRow(d){ return {nome:d.nome, categoria_animal:d.categoriaAnimal, kg_animal_dia:d.kgAnimalDia, itens:d.itens}; }
function rowToLote(r){ return {id:r.id, nome:r.nome, numeroAnimais:r.numero_animais, dataInicio:r.data_inicio, dataFim:r.data_fim}; }
function loteToRow(l){ return {nome:l.nome, numero_animais:l.numeroAnimais, data_inicio:l.dataInicio, data_fim:l.dataFim||null}; }
function rowToSaidaRacao(r){ return {id:r.id, data:r.data, dietaId:r.dieta_id, loteId:r.lote_id, quantidadeKg:r.quantidade_kg}; }

async function loadAll(){
  const [ing, mov, diet, lot, sr] = await Promise.all([
    db.from('ingredientes').select('*').order('id'),
    db.from('movimentos').select('*').order('id'),
    db.from('dietas').select('*').order('id'),
    db.from('lotes').select('*').order('id'),
    db.from('saidas_racao').select('*').order('id'),
  ]);
  state.ingredientes = (ing.data||[]).map(rowToIngrediente);
  state.movimentos = (mov.data||[]).map(rowToMovimento);
  state.dietas = (diet.data||[]).map(rowToDieta);
  state.lotes = (lot.data||[]).map(rowToLote);
  state.saidasRacao = (sr.data||[]).map(rowToSaidaRacao);
  if(state.openDietId===null && state.dietas[0]) state.openDietId = state.dietas[0].id;
  render();
}

/* ===================== ESTADO ===================== */
const state = {
  page: 'ingredientes',
  ingredientes: [],
  movimentos: [],
  dietas: [],
  lotes: [],
  saidasRacao: [],
  modal: null, // {type:'ingrediente'|'movimento'|'dieta'|'lote'|'saidaRacao', data: {...}}
  openDietId: null,
  search: '',
};

let editDraft = null; // temp form state while modal open

function render(){
  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="app">
      ${Sidebar()}
      <div class="main">
        ${Header()}
        ${state.page==='ingredientes' ? PageIngredientes() : ''}
        ${state.page==='estoque' ? PageEstoque() : ''}
        ${state.page==='dietas' ? PageDietas() : ''}
        ${state.page==='lotes' ? PageLotes() : ''}
        ${state.page==='racao' ? PageSaidaRacao() : ''}
      </div>
    </div>
    ${state.modal ? Modal() : ''}
  `;
  attachEvents();
}

/* ===================== HELPERS ===================== */
function fmt(n, dec=2){ return Number(n||0).toLocaleString('pt-BR', {minimumFractionDigits:dec, maximumFractionDigits:dec}); }
function fmtInt(n){ return Number(n||0).toLocaleString('pt-BR'); }
function getIng(id){ return state.ingredientes.find(i=>i.id===Number(id)); }

function saldoIngrediente(id){
  let saldo = 0;
  state.movimentos.filter(m=>m.ingredienteId===id).forEach(m=>{
    saldo += m.tipo==='entrada' ? m.quantidade : -m.quantidade;
  });
  return saldo;
}

/* ===================== SIDEBAR ===================== */
function Sidebar(){
  const items = [
    {key:'ingredientes', label:'Ingredientes', icon:iconLeaf()},
    {key:'estoque', label:'Estoque', icon:iconSilo()},
    {key:'dietas', label:'Formulação de Dietas', icon:iconBowl()},
    {key:'lotes', label:'Lotes', icon:iconLote()},
    {key:'racao', label:'Saída de Ração', icon:iconRacao()},
  ];
  return `
  <div class="sidebar">
    <div class="brand">
      ${brandMark()}
      <div>
        <div class="brand-name">AE Nutrição</div>
        <div class="brand-sub">Gestão de confinamento</div>
      </div>
    </div>
    <nav>
      ${items.map(it=>`
        <button class="nav-item ${state.page===it.key?'active':''}" data-nav="${it.key}">
          ${it.icon} ${it.label}
        </button>
      `).join('')}
    </nav>
    <div class="sidebar-footer">
      MVP · dados salvos<br/>na nuvem (Supabase).
    </div>
  </div>`;
}
function brandMark(){
  return `<svg class="brand-mark" viewBox="0 0 32 32" fill="none">
    <rect x="4" y="12" width="8" height="16" rx="1.5" fill="#9DC0E8"/>
    <rect x="14" y="6" width="8" height="22" rx="1.5" fill="#C98A2B"/>
    <rect x="24" y="16" width="4" height="12" rx="1.5" fill="#9DC0E8"/>
  </svg>`;
}
function iconLeaf(){ return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 21c0-9 6-16 15-16-1 9-8 15-15 16Z"/><path d="M5 21c2-4 5-7 9-9"/></svg>`; }
function iconSilo(){ return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3h8l2 5v13H6V8Z"/><path d="M6 8h12"/><path d="M10 21v-6h4v6"/></svg>`; }
function iconBowl(){ return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18a9 6 0 0 1-18 0Z"/><path d="M8 12V7a4 4 0 0 1 8 0v5"/></svg>`; }
function iconLote(){ return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 10 12 4l9 6"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>`; }
function iconRacao(){ return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 4v12"/><path d="m7 12 5 5 5-5"/><path d="M4 21h16"/></svg>`; }

/* ===================== HEADER ===================== */
function Header(){
  const titles = {
    ingredientes:{eyebrow:'Cadastro', title:'Ingredientes', desc:'Composição nutricional, fornecedor e preço de cada insumo da fazenda.'},
    estoque:{eyebrow:'Movimentação', title:'Estoque', desc:'Saldo atual por ingrediente, calculado a partir das entradas e saídas registradas.'},
    dietas:{eyebrow:'Motor nutricional', title:'Formulação de Dietas', desc:'Combine ingredientes por percentual e veja MS, PB, NDT e custo calculados automaticamente.'},
    lotes:{eyebrow:'Confinamento', title:'Lotes', desc:'Cadastro dos lotes/currais de animais, com número de cabeças e período de início e encerramento.'},
    racao:{eyebrow:'Movimentação', title:'Saída de Ração', desc:'Registre a ração feita e distribuída a partir de uma dieta — o estoque de cada ingrediente é descontado automaticamente.'},
  };
  const t = titles[state.page];
  const actionLabel = state.page==='ingredientes' ? '+ Novo ingrediente'
    : state.page==='estoque' ? '+ Nova movimentação'
    : state.page==='dietas' ? '+ Nova dieta'
    : state.page==='lotes' ? '+ Novo lote'
    : '+ Nova saída de ração';
  return `
  <div class="page-header">
    <div>
      <p class="eyebrow">${t.eyebrow}</p>
      <h1>${t.title}</h1>
      <p class="page-desc">${t.desc}</p>
    </div>
    <button class="btn btn-primary" data-action="new">${actionLabel}</button>
  </div>`;
}

/* ===================== PÁGINA: INGREDIENTES ===================== */
function PageIngredientes(){
  const list = state.ingredientes.filter(i=> i.nome.toLowerCase().includes(state.search.toLowerCase()) );
  return `
  <div class="toolbar">
    <div class="search">
      ${iconSearch()}
      <input type="text" placeholder="Buscar ingrediente..." value="${state.search}" data-search="1"/>
    </div>
    <span class="hint">${list.length} ingrediente(s) cadastrado(s)</span>
  </div>
  <div class="card">
    ${list.length===0 ? Empty('Nenhum ingrediente encontrado','Cadastre insumos para usá-los nas dietas.') : `
    <table>
      <thead><tr>
        <th>Ingrediente</th><th>Categoria</th><th>Fornecedor</th>
        <th>MS%</th><th>PB%</th><th>NDT%</th><th>Preço/kg</th><th></th>
      </tr></thead>
      <tbody>
        ${list.map(i=>`
          <tr>
            <td><strong>${i.nome}</strong></td>
            <td><span class="pill pill-cat">${i.categoria}</span></td>
            <td>${i.fornecedor||'—'}</td>

/* ===================== PÁGINA: DIETAS ===================== */
function calcDieta(d){
  let ms=0, pb=0, ndt=0, custoKg=0, pctTotal=0;
  d.itens.forEach(it=>{
    const ing = getIng(it.ingredienteId);
    if(!ing) return;
    const frac = it.pct/100;
    ms += ing.ms*frac;
    pb += ing.pb*frac;
    ndt += ing.ndt*frac;
    custoKg += ing.precoKg*frac;
    pctTotal += it.pct;
  });
  return {ms, pb, ndt, custoKg, pctTotal, custoAnimalDia: custoKg*d.kgAnimalDia};
}

/* ===================== EVENTOS ===================== */
function attachEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick = ()=>{ state.page = el.dataset.nav; render(); };
  });
  const searchEl = document.querySelector('[data-search]');
  if(searchEl){
    searchEl.oninput = (e)=>{ state.search = e.target.value; render();
      // refocus + cursor at end after re-render
      const s = document.querySelector('[data-search]');
      s.focus(); s.setSelectionRange(s.value.length, s.value.length);
    };
  }
  const newBtn = document.querySelector('[data-action="new"]');
  if(newBtn){
    newBtn.onclick = ()=>{
      if(state.page==='ingredientes'){
        editDraft = {nome:'', categoria:'Energético', fornecedor:'', unidade:'kg', ms:'', pb:'', ndt:'', precoKg:'', estoqueMin:''};
        state.modal = {type:'ingrediente'};
      } else if(state.page==='estoque'){
        editDraft = {ingredienteId: state.ingredientes[0]?.id||'', tipo:'entrada', data:new Date().toISOString().slice(0,10), quantidade:''};
        state.modal = {type:'movimento'};
      } else if(state.page==='dietas'){
        editDraft = {nome:'', categoriaAnimal:'', kgAnimalDia:9, itens:[{ingredienteId:state.ingredientes[0]?.id||'', pct:''}]};
        state.modal = {type:'dieta'};
      } else if(state.page==='lotes'){
        editDraft = {nome:'', numeroAnimais:'', dataInicio:new Date().toISOString().slice(0,10), dataFim:''};
        state.modal = {type:'lote'};
      } else if(state.page==='racao'){
        if(state.dietas.length===0 || state.lotes.length===0){
          alert('Cadastre ao menos uma dieta e um lote antes de registrar uma saída de ração.');
          return;
        }
        editDraft = {dietaId: state.dietas[0]?.id||'', loteId: state.lotes[0]?.id||'', data:new Date().toISOString().slice(0,10), quantidadeKg:''};
        state.modal = {type:'saidaRacao'};
      }
      render();
    };
  }
  document.querySelectorAll('[data-edit-ing]').forEach(el=>{
    el.onclick = ()=>{
      const ing = getIng(el.dataset.editIng);
      editDraft = {...ing, _editId: ing.id};
      state.modal = {type:'ingrediente'};
      render();
    };
  });
  document.querySelectorAll('[data-del-ing]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delIng);
      await db.from('ingredientes').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-edit-mov]').forEach(el=>{
    el.onclick = ()=>{
      const mov = state.movimentos.find(m=>m.id===Number(el.dataset.editMov));
      editDraft = {...mov, _editId: mov.id};
      state.modal = {type:'movimento'};
      render();
    };
  });
  document.querySelectorAll('[data-del-mov]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delMov);
      await db.from('movimentos').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-del-diet]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delDiet);
      await db.from('dietas').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-edit-diet]').forEach(el=>{
    el.onclick = ()=>{
      const dieta = state.dietas.find(x=>x.id===Number(el.dataset.editDiet));
      editDraft = {...dieta, itens: dieta.itens.map(it=>({...it})), _editId: dieta.id};
      state.modal = {type:'dieta'};
      render();
    };
  });
  document.querySelectorAll('[data-edit-lote]').forEach(el=>{
    el.onclick = ()=>{
      const lote = state.lotes.find(l=>l.id===Number(el.dataset.editLote));
      editDraft = {...lote, dataFim: lote.dataFim||'', _editId: lote.id};
      state.modal = {type:'lote'};
      render();
    };
  });
  document.querySelectorAll('[data-del-lote]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delLote);
      await db.from('lotes').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-edit-racao]').forEach(el=>{
    el.onclick = ()=>{
      const s = state.saidasRacao.find(x=>x.id===Number(el.dataset.editRacao));
      editDraft = {...s, _editId: s.id};
      state.modal = {type:'saidaRacao'};
      render();
    };
  });
  document.querySelectorAll('[data-del-racao]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delRacao);
      await db.from('saidas_racao').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-toggle-diet]').forEach(el=>{
    el.onclick = ()=>{
      const id = Number(el.dataset.toggleDiet);
      state.openDietId = state.openDietId===id ? null : id;
      render();
    };
  });

  // modal generic close
  document.querySelectorAll('[data-close], [data-close-overlay]').forEach(el=>{
    el.onclick = (e)=>{
      if(e.target.dataset.stop) return;
      state.modal = null; editDraft=null; render();
    };
  });
  const stopEl = document.querySelector('[data-stop]');
  if(stopEl) stopEl.onclick = (e)=> e.stopPropagation();

  // dieta item add/remove/change
  document.querySelectorAll('[data-item-add]').forEach(el=>{
    el.onclick = ()=>{ editDraft.itens.push({ingredienteId:state.ingredientes[0]?.id||'', pct:''}); render(); };
  });
  document.querySelectorAll('[data-item-del]').forEach(el=>{
    el.onclick = ()=>{ editDraft.itens.splice(Number(el.dataset.itemDel),1); render(); };
  });
  document.querySelectorAll('[data-item-ing]').forEach(el=>{
    el.onchange = (e)=>{ editDraft.itens[Number(el.dataset.itemIng)].ingredienteId = Number(e.target.value); };
  });
  document.querySelectorAll('[data-item-pct]').forEach(el=>{
    el.oninput = (e)=>{ editDraft.itens[Number(el.dataset.itemPct)].pct = e.target.value; };
  });

  // save handlers
  const saveBtn = document.querySelector('[data-save]');
  if(saveBtn){
    saveBtn.onclick = async ()=>{
      const type = saveBtn.dataset.save;
      let error = null;
      if(type==='ingrediente'){
        const campos = {
          nome: document.getElementById('f-nome').value || 'Sem nome',
          categoria: document.getElementById('f-categoria').value,
          fornecedor: document.getElementById('f-fornecedor').value,
          unidade: document.getElementById('f-unidade').value,
          ms: Number(document.getElementById('f-ms').value)||0,
          pb: Number(document.getElementById('f-pb').value)||0,
          ndt: Number(document.getElementById('f-ndt').value)||0,
          precoKg: Number(document.getElementById('f-preco').value)||0,
          estoqueMin: Number(document.getElementById('f-min').value)||0,
        };
        const row = ingredienteToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('ingredientes').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('ingredientes').insert(row));
        }
      } else if(type==='movimento'){
        const campos = {
          data: document.getElementById('f-data').value,
          ingredienteId: Number(document.getElementById('f-ing').value),
          tipo: document.getElementById('f-tipo').value,
          quantidade: Number(document.getElementById('f-qtd').value)||0,
        };
        const row = movimentoToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('movimentos').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('movimentos').insert(row));
        }
      } else if(type==='dieta'){
        const campos = {
          nome: document.getElementById('f-nome').value || 'Sem nome',
          categoriaAnimal: document.getElementById('f-categoria').value,
          kgAnimalDia: Number(document.getElementById('f-kganimal').value)||0,
          itens: editDraft.itens.map(it=>({ingredienteId:Number(it.ingredienteId), pct:Number(it.pct)||0})),
        };
        const row = dietaToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('dietas').update(row).eq('id', editDraft._editId));
          state.openDietId = editDraft._editId;
        } else {
          const res = await db.from('dietas').insert(row).select().single();
          error = res.error;
          if(res.data) state.openDietId = res.data.id;
        }
      } else if(type==='lote'){
        const campos = {
          nome: document.getElementById('f-nome').value || 'Sem nome',
          numeroAnimais: Number(document.getElementById('f-numanimais').value)||0,
          dataInicio: document.getElementById('f-datainicio').value,
          dataFim: document.getElementById('f-datafim').value || null,
        };
        const row = loteToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('lotes').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('lotes').insert(row));
        }
      } else if(type==='saidaRacao'){
        const dietaId = Number(document.getElementById('f-dieta').value);
        const loteId = Number(document.getElementById('f-lote').value);
        const data = document.getElementById('f-data').value;
        const quantidadeKg = Number(document.getElementById('f-qtdracao').value)||0;
        const dieta = state.dietas.find(x=>x.id===dietaId);
        const row = {data, dieta_id: dietaId, lote_id: loteId, quantidade_kg: quantidadeKg};
        let saidaId = editDraft._editId;
        if(saidaId){
          ({error} = await db.from('saidas_racao').update(row).eq('id', saidaId));
          if(!error) await db.from('movimentos').delete().eq('saida_racao_id', saidaId);
        } else {
          const res = await db.from('saidas_racao').insert(row).select().single();
          error = res.error;
          if(res.data) saidaId = res.data.id;
        }
        if(!error && dieta){
          const movs = dieta.itens.filter(it=>it.ingredienteId).map(it=>({
            data, ingrediente_id: it.ingredienteId, tipo: 'saida',
            quantidade: quantidadeKg*it.pct/100, saida_racao_id: saidaId,
          }));
          if(movs.length){
            ({error} = await db.from('movimentos').insert(movs));
          }
        }
      }
      if(error){
        alert('Não foi possível salvar: ' + error.message);
        return;
      }
      state.modal = null; editDraft = null;
      await loadAll();
    };
  }
}

loadAll();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
