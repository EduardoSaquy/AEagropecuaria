<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AE Nutrição — Gestão de Confinamento</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0F2A4A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde-escuro:#0F2A4A;
    --verde-medio:#1D5DA8;
    --verde-claro:#9DC0E8;
    --grafite:#1E2A38;
    --cinza:#65758A;
    --cinza-claro:#DEE6F0;
    --cinza-bg:#F2F5FA;
    --branco:#FFFFFF;
    --trigo:#C98A2B;
    --alerta:#B3462F;
    --alerta-bg:#F6E7E2;
    --ok-bg:#E5EEF9;
    --radius:10px;
    --shadow:0 1px 2px rgba(15,42,74,0.06), 0 4px 12px rgba(15,42,74,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--cinza-bg);
    color:var(--grafite);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    display:flex;
    min-height:100vh;
  }
  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:230px;
    flex-shrink:0;
    background:var(--verde-escuro);
    color:var(--branco);
    display:flex;
    flex-direction:column;
    padding:24px 16px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 8px 24px 8px;
    margin-bottom:8px;
    border-bottom:1px solid rgba(255,255,255,0.12);
  }
  .brand-mark{
    width:32px;height:32px;flex-shrink:0;
  }
  .brand-name{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:19px;
    letter-spacing:0.2px;
  }
  .brand-sub{
    font-size:10px;
    color:var(--verde-claro);
    letter-spacing:1.2px;
    text-transform:uppercase;
    margin-top:-2px;
  }
  nav{margin-top:18px; display:flex; flex-direction:column; gap:4px;}
  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    font-weight:500;
    color:rgba(255,255,255,0.72);
    transition:background 0.15s, color 0.15s;
    border:none;
    background:none;
    width:100%;
    text-align:left;
  }
  .nav-item:hover{background:rgba(255,255,255,0.06); color:var(--branco);}
  .nav-item.active{background:var(--verde-medio); color:var(--branco);}
  .nav-item svg{flex-shrink:0;}
  .sidebar-footer{
    margin-top:auto;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,0.12);
    font-size:11px;
    color:rgba(255,255,255,0.45);
    line-height:1.5;
  }
  /* ---------- MAIN ---------- */
  .main{
    flex:1;
    padding:32px 40px 60px 40px;
    max-width:1180px;
  }
  .page-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:28px;
  }
  .eyebrow{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.4px;
    color:var(--verde-medio);
    font-weight:600;
    margin:0 0 4px 0;
  }
  h1{
    font-family:'Fraunces',serif;
    font-size:28px;
    font-weight:600;
    margin:0;
    color:var(--verde-escuro);
  }
  .page-desc{color:var(--cinza); font-size:13.5px; margin-top:6px; max-width:520px;}
  .btn{
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    font-weight:600;
    padding:10px 18px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    transition:filter 0.15s, transform 0.1s;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--verde-escuro); color:var(--branco);}
  .btn-primary:hover{filter:brightness(1.15);}
  .btn-ghost{background:transparent; color:var(--verde-escuro); border:1px solid var(--cinza-claro);}
  .btn-ghost:hover{background:var(--branco);}
  .btn-danger-ghost{background:transparent; color:var(--alerta); border:1px solid var(--cinza-claro); padding:6px 10px; font-size:12px;}
  .btn-danger-ghost:hover{background:var(--alerta-bg);}
  .btn-sm{padding:6px 12px; font-size:12.5px;}

  .card{
    background:var(--branco);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    border:1px solid var(--cinza-claro);
  }
  .card-pad{padding:22px 24px;}
  .stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px;}
  .stat-card{
    background:var(--branco);
    border:1px solid var(--cinza-claro);
    border-radius:var(--radius);
    padding:16px 18px;
  }
  .stat-label{font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--cinza); font-weight:600;}
  .stat-value{
    font-family:'IBM Plex Mono',monospace;
    font-size:22px;
    font-weight:600;
    color:var(--verde-escuro);
    margin-top:6px;
  }
  .stat-value.alerta{color:var(--alerta);}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{
    text-align:left;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--cinza);
    font-weight:600;
    padding:10px 14px;
    border-bottom:1px solid var(--cinza-claro);
    white-space:nowrap;
  }
  td{
    padding:12px 14px;
    border-bottom:1px solid var(--cinza-claro);
    color:var(--grafite);
    vertical-align:middle;
  }
  tr:last-child td{border-bottom:none;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .pill{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    padding:3px 9px;
    border-radius:20px;
  }
  .pill-ok{background:var(--ok-bg); color:var(--verde-medio);}
  .pill-alerta{background:var(--alerta-bg); color:var(--alerta);}
  .pill-cat{background:var(--cinza-claro); color:var(--grafite);}
  .pill-warn{background:#F5E9D7; color:var(--trigo);}

  /* silo gauge */
  .silo-wrap{display:flex; align-items:center; gap:8px;}
  .silo{
    width:14px; height:30px;
    border:1.5px solid var(--verde-escuro);
    border-radius:3px;
    position:relative;
    overflow:hidden;
    background:var(--cinza-claro);
    flex-shrink:0;
  }
  .silo-fill{
    position:absolute; bottom:0; left:0; right:0;
    background:var(--verde-medio);
  }
  .silo-fill.alerta{background:var(--alerta);}

  /* form modal */
  .overlay{
    position:fixed; inset:0; background:rgba(31,61,46,0.35);
    display:flex; align-items:flex-start; justify-content:center;
    padding:50px 20px; overflow-y:auto; z-index:50;
  }
  .modal{
    background:var(--branco); border-radius:14px; width:100%; max-width:560px;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-head{
    padding:20px 24px; border-bottom:1px solid var(--cinza-claro);
    display:flex; justify-content:space-between; align-items:center;
  }
  .modal-head h3{font-family:'Fraunces',serif; font-size:18px; margin:0; color:var(--verde-escuro);}
  .modal-close{background:none;border:none;cursor:pointer;color:var(--cinza);font-size:20px; line-height:1;}
  .modal-body{padding:22px 24px; display:flex; flex-direction:column; gap:14px; max-height:70vh; overflow-y:auto;}
  .modal-foot{padding:16px 24px; border-top:1px solid var(--cinza-claro); display:flex; justify-content:flex-end; gap:10px;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  label{font-size:12px; font-weight:600; color:var(--grafite);}
  input, select, textarea{
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    padding:9px 11px;
    border:1px solid var(--cinza-claro);
    border-radius:7px;
    background:var(--branco);
    color:var(--grafite);
    outline:none;
  }
  input:focus, select:focus, textarea:focus{border-color:var(--verde-medio); box-shadow:0 0 0 3px rgba(61,107,79,0.12);}
  .hint{font-size:11px; color:var(--cinza);}
  .composicao-row{
    display:grid; grid-template-columns: 1fr 90px 32px; gap:8px; align-items:center;
  }
  .total-bar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; border-radius:8px; background:var(--cinza-bg); font-size:13px;
  }
  .total-bar.ok{color:var(--verde-medio); font-weight:600;}
  .total-bar.warn{color:var(--trigo); font-weight:600;}

  .empty{
    text-align:center; padding:50px 20px; color:var(--cinza);
  }
  .empty h4{font-family:'Fraunces',serif; color:var(--verde-escuro); margin:10px 0 6px 0; font-size:16px;}
  .diet-card{
    border:1px solid var(--cinza-claro); border-radius:var(--radius); margin-bottom:14px; overflow:hidden;
  }
  .diet-head{
    padding:16px 20px; display:flex; justify-content:space-between; align-items:center;
    cursor:pointer; background:var(--branco);
  }
  .diet-head:hover{background:var(--cinza-bg);}
  .diet-title{font-family:'Fraunces',serif; font-weight:600; font-size:15.5px; color:var(--verde-escuro);}
  .diet-sub{font-size:12px; color:var(--cinza); margin-top:2px;}
  .diet-metrics{display:flex; gap:22px;}
  .diet-metric{text-align:right;}
  .diet-metric .v{font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--verde-escuro); font-size:14px;}
  .diet-metric .l{font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:var(--cinza);}
  .diet-body{padding:0 20px 18px 20px; border-top:1px solid var(--cinza-claro); background:var(--cinza-bg);}
  .chev{transition:transform 0.15s;}
  .chev.open{transform:rotate(180deg);}
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:12px;}
  .search{
    display:flex; align-items:center; gap:8px; background:var(--branco);
    border:1px solid var(--cinza-claro); border-radius:8px; padding:8px 12px; width:260px;
  }
  .search input{border:none; padding:0; flex:1;}
  .search input:focus{box-shadow:none;}

  /* sub-abas dentro de um grupo (ex: Ingredientes / Estoque) */
  .subtabs{display:flex; gap:18px; margin-bottom:22px; border-bottom:1px solid var(--cinza-claro); overflow-x:auto;}
  .subtab{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; color:var(--cinza);
    background:none; border:none; padding:10px 2px; cursor:pointer; white-space:nowrap;
    border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .subtab:hover{color:var(--verde-escuro);}
  .subtab.active{color:var(--verde-escuro); border-bottom-color:var(--verde-medio);}

  /* botão flutuante de ação rápida */
  .fab-wrap{position:fixed; bottom:28px; right:28px; z-index:60; display:flex; flex-direction:column; align-items:flex-end; gap:10px;}
  .fab-btn{
    width:56px; height:56px; border-radius:50%; border:none; cursor:pointer;
    background:var(--verde-escuro); color:#fff; font-size:26px; line-height:1;
    box-shadow:0 6px 18px rgba(15,42,74,0.28); transition:filter 0.15s, transform 0.1s;
  }
  .fab-btn:hover{filter:brightness(1.15);}
  .fab-btn:active{transform:scale(0.95);}
  .fab-menu{
    display:flex; flex-direction:column; gap:6px; background:var(--branco);
    border:1px solid var(--cinza-claro); border-radius:12px; padding:10px; box-shadow:var(--shadow);
  }
  .fab-menu-item{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; text-align:left;
    padding:10px 14px; border-radius:8px; border:none; background:none; cursor:pointer;
    color:var(--verde-escuro); white-space:nowrap;
  }
  .fab-menu-item:hover{background:var(--cinza-bg);}

  /* seletor de nota da leitura de cocho */
  .nota-picker{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .nota-btn{
    display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:12px 6px; border-radius:8px; border:1.5px solid var(--cinza-claro); background:var(--branco);
    cursor:pointer; font-family:'Inter',sans-serif;
  }
  .nota-btn .n{font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:600; color:var(--verde-escuro);}
  .nota-btn .l{font-size:10.5px; color:var(--cinza); text-align:center; line-height:1.3;}
  .nota-btn.active{border-color:var(--verde-medio); background:var(--ok-bg);}

  /* ---------- RESPONSIVO (celular) ---------- */
  @media (max-width:760px){
    .app{flex-direction:column;}
    .sidebar{
      width:100%; flex-direction:row; align-items:center; justify-content:space-between;
      padding:12px 16px; gap:12px; overflow-x:auto;
    }
    .brand{border-bottom:none; padding:0; margin-bottom:0; flex-shrink:0;}
    .brand-sub{display:none;}
    nav{margin-top:0; flex-direction:row; gap:4px;}
    .nav-item{white-space:nowrap; padding:8px 10px; font-size:13px;}
    .sidebar-footer{display:none;}
    .main{padding:20px 16px 48px 16px; max-width:100%;}
    .page-header{flex-direction:column; align-items:flex-start; gap:14px;}
    h1{font-size:23px;}
    .btn{width:100%; justify-content:center;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .toolbar{flex-direction:column; align-items:stretch;}
    .search{width:100%;}
    .card{overflow-x:auto; -webkit-overflow-scrolling:touch;}
    .field-row{grid-template-columns:1fr;}
    .composicao-row{grid-template-columns:1fr 68px 28px; gap:6px;}
    .overlay{padding:16px 10px;}
    .diet-metrics{flex-wrap:wrap; gap:10px 16px; justify-content:flex-end;}
    .diet-head{flex-direction:column; align-items:flex-start; gap:10px;}
    .fab-wrap{bottom:18px; right:18px;}
    .fab-btn{width:50px; height:50px; font-size:24px;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== SUPABASE ===================== */
const db = supabase.createClient(
  'https://leojfqlbdtlriemdgnyw.supabase.co',
  'sb_publishable_IYD9cnj_7tlul7K5zs5YHg_kv5YvzjB'
);

function rowToIngrediente(r){ return {id:r.id, nome:r.nome, categoria:r.categoria, fornecedor:r.fornecedor, unidade:r.unidade, ms:r.ms, pb:r.pb, ndt:r.ndt, precoKg:r.preco_kg, estoqueMin:r.estoque_min, obs:r.obs||''}; }
function ingredienteToRow(i){ return {nome:i.nome, categoria:i.categoria, fornecedor:i.fornecedor, unidade:i.unidade, ms:i.ms, pb:i.pb, ndt:i.ndt, preco_kg:i.precoKg, estoque_min:i.estoqueMin, obs:i.obs||''}; }
function rowToMovimento(r){ return {id:r.id, data:r.data, ingredienteId:r.ingrediente_id, tipo:r.tipo, quantidade:r.quantidade}; }
function movimentoToRow(m){ return {data:m.data, ingrediente_id:m.ingredienteId, tipo:m.tipo, quantidade:m.quantidade}; }
function rowToDieta(r){ return {id:r.id, nome:r.nome, categoriaAnimal:r.categoria_animal, kgAnimalDia:r.kg_animal_dia, itens:r.itens||[]}; }
function dietaToRow(d){ return {nome:d.nome, categoria_animal:d.categoriaAnimal, kg_animal_dia:d.kgAnimalDia, itens:d.itens}; }
function rowToLote(r){ return {id:r.id, nome:r.nome, numeroAnimais:r.numero_animais, dataInicio:r.data_inicio, dataFim:r.data_fim}; }
function loteToRow(l){ return {nome:l.nome, numero_animais:l.numeroAnimais, data_inicio:l.dataInicio, data_fim:l.dataFim||null}; }
function rowToSaidaRacao(r){ return {id:r.id, data:r.data, dietaId:r.dieta_id, loteId:r.lote_id, quantidadeKg:r.quantidade_kg}; }
function rowToLeituraCocho(r){ return {id:r.id, data:r.data, loteId:r.lote_id, nota:r.nota, observacao:r.observacao||''}; }
function leituraCochoToRow(l){ return {data:l.data, lote_id:l.loteId, nota:l.nota, observacao:l.observacao||''}; }
function rowToPasto(r){ return {id:r.id, data:r.data, loteId:r.lote_id, ingredienteId:r.ingrediente_id, quantidade:r.quantidade}; }
function rowToCustoFixo(r){ return {id:r.id, nome:r.nome, categoria:r.categoria, valorMensal:r.valor_mensal}; }
function custoFixoToRow(c){ return {nome:c.nome, categoria:c.categoria, valor_mensal:c.valorMensal}; }

async function loadAll(){
  const [ing, mov, diet, lot, sr, lc, pt, cf] = await Promise.all([
    db.from('ingredientes').select('*').order('id'),
    db.from('movimentos').select('*').order('id'),
    db.from('dietas').select('*').order('id'),
    db.from('lotes').select('*').order('id'),
    db.from('saidas_racao').select('*').order('id'),
    db.from('leituras_cocho').select('*').order('id'),
    db.from('pasto').select('*').order('id'),
    db.from('custos_fixos').select('*').order('id'),
  ]);
  state.ingredientes = (ing.data||[]).map(rowToIngrediente);
  state.movimentos = (mov.data||[]).map(rowToMovimento);
  state.dietas = (diet.data||[]).map(rowToDieta);
  state.lotes = (lot.data||[]).map(rowToLote);
  state.saidasRacao = (sr.data||[]).map(rowToSaidaRacao);
  state.leiturasCocho = (lc.data||[]).map(rowToLeituraCocho);
  state.pasto = (pt.data||[]).map(rowToPasto);
  state.custosFixos = (cf.data||[]).map(rowToCustoFixo);
  if(state.openDietId===null && state.dietas[0]) state.openDietId = state.dietas[0].id;
  render();
}

/* ===================== ESTADO ===================== */
const state = {
  page: 'estoque',
  ingredientes: [],
  movimentos: [],
  dietas: [],
  lotes: [],
  saidasRacao: [],
  leiturasCocho: [],
  pasto: [],
  custosFixos: [],
  modal: null, // {type:'ingrediente'|'movimento'|'dieta'|'lote'|'saidaRacao'|'cocho'|'pasto'|'custoFixo', data: {...}}
  openDietId: null,
  search: '',
  fabOpen: false,
};

let editDraft = null; // temp form state while modal open

function render(){
  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="app">
      ${Sidebar()}
      <div class="main">
        ${Header()}
        ${SubTabs()}
        ${state.page==='ingredientes' ? PageIngredientes() : ''}
        ${state.page==='estoque' ? PageEstoque() : ''}
        ${state.page==='dietas' ? PageDietas() : ''}
        ${state.page==='lotes' ? PageLotes() : ''}
        ${state.page==='racao' ? PageSaidaRacao() : ''}
        ${state.page==='cocho' ? PageCocho() : ''}
        ${state.page==='pasto' ? PagePasto() : ''}
        ${state.page==='financeiro' ? PageFinanceiro() : ''}
      </div>
    </div>
    ${state.modal ? Modal() : ''}
    ${FabMenu()}
  `;
  attachEvents();
}

/* ===================== HELPERS ===================== */
function fmt(n, dec=2){ return Number(n||0).toLocaleString('pt-BR', {minimumFractionDigits:dec, maximumFractionDigits:dec}); }
function fmtInt(n){ return Number(n||0).toLocaleString('pt-BR'); }
function getIng(id){ return state.ingredientes.find(i=>i.id===Number(id)); }

// "Preço por kg" é sempre por quilo; quantidades guardadas em "ton" precisam
// ser convertidas para kg antes de multiplicar pelo preço.
function qtdEmKg(qtd, unidade){ return unidade==='ton' ? Number(qtd||0)*1000 : Number(qtd||0); }
function kgParaUnidade(qtdKg, unidade){ return unidade==='ton' ? qtdKg/1000 : qtdKg; }

function saldoIngrediente(id){
  let saldo = 0;
  state.movimentos.filter(m=>m.ingredienteId===id).forEach(m=>{
    saldo += m.tipo==='entrada' ? m.quantidade : -m.quantidade;
  });
  return saldo;
}

/* ===================== NAVEGAÇÃO (grupos + sub-abas) ===================== */
const GROUPS = {
  insumos: {label:'Insumos', icon:iconLeaf(), pages:[
    {key:'estoque', label:'Estoque'},
    {key:'ingredientes', label:'Ingredientes'},
  ]},
  dietas: {label:'Formulação de Dietas', icon:iconBowl(), pages:[
    {key:'dietas', label:'Formulação de Dietas'},
  ]},
  confinamento: {label:'Confinamento', icon:iconLote(), pages:[
    {key:'lotes', label:'Lotes'},
    {key:'racao', label:'Saída de Ração'},
    {key:'cocho', label:'Leitura de Cocho'},
  ]},
  pasto: {label:'Pasto', icon:iconPasto(), pages:[
    {key:'pasto', label:'Pasto'},
  ]},

/* ===================== PÁGINA: DIETAS ===================== */
function calcDieta(d){
  let ms=0, pb=0, ndt=0, custoKg=0, pctTotal=0;
  d.itens.forEach(it=>{
    const ing = getIng(it.ingredienteId);
    if(!ing) return;
    const frac = it.pct/100;
    ms += ing.ms*frac;
    pb += ing.pb*frac;
    ndt += ing.ndt*frac;
    custoKg += ing.precoKg*frac;
    pctTotal += it.pct;
  });
  return {ms, pb, ndt, custoKg, pctTotal, custoAnimalDia: custoKg*d.kgAnimalDia};
}

/* ===================== PÁGINA: FINANCEIRO ===================== */
function custoSaidaRacao(s){
  const dieta = state.dietas.find(d=>d.id===s.dietaId);
  return dieta ? calcDieta(dieta).custoKg * s.quantidadeKg : 0;
}
function hojeStr(){ return new Date().toISOString().slice(0,10); }
function mesAtualStr(){ return new Date().toISOString().slice(0,7); }
function PageFinanceiro(){
  const hoje = hojeStr();
  const mes = mesAtualStr();

  const racaoHoje = state.saidasRacao.filter(s=>s.data===hoje).reduce((a,s)=>a+custoSaidaRacao(s),0);
  const pastoHoje = state.pasto.filter(p=>p.data===hoje).reduce((a,p)=>a+custoPasto(p),0);
  const custoHoje = racaoHoje + pastoHoje;

  const racaoMes = state.saidasRacao.filter(s=>s.data.startsWith(mes)).reduce((a,s)=>a+custoSaidaRacao(s),0);
  const pastoMes = state.pasto.filter(p=>p.data.startsWith(mes)).reduce((a,p)=>a+custoPasto(p),0);
  const variavelMes = racaoMes + pastoMes;
  const fixosMes = state.custosFixos.reduce((a,c)=>a+Number(c.valorMensal||0),0);
  const totalMes = variavelMes + fixosMes;

  const totalAnimais = state.lotes.filter(l=>!l.dataFim).reduce((a,l)=>a+Number(l.numeroAnimais||0),0);
  const custoPorAnimalHoje = totalAnimais>0 ? custoHoje/totalAnimais : 0;

  return `
  <div class="stat-row">
    <div class="stat-card"><div class="stat-label">Custo de ração + pasto hoje</div><div class="stat-value">R$ ${fmt(custoHoje)}</div></div>
    <div class="stat-card"><div class="stat-label">Custo/animal hoje</div><div class="stat-value">R$ ${fmt(custoPorAnimalHoje,2)}</div></div>
    <div class="stat-card"><div class="stat-label">Custo variável no mês</div><div class="stat-value">R$ ${fmt(variavelMes)}</div></div>
    <div class="stat-card"><div class="stat-label">Custos fixos no mês</div><div class="stat-value">R$ ${fmt(fixosMes)}</div></div>
  </div>

  <div class="card" style="margin-bottom:22px;">
    <div class="card-pad" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
      <div>
        <div class="stat-label">Total do mês (variável + fixo)</div>
        <div class="stat-value" style="font-size:26px;">R$ ${fmt(totalMes)}</div>
      </div>
      <span class="hint">${fmtInt(totalAnimais)} animais em lotes ativos</span>
    </div>
  </div>

  <p class="eyebrow" style="margin-bottom:10px;">Custos fixos cadastrados</p>
  <div class="card">
    ${state.custosFixos.length===0 ? Empty('Nenhum custo fixo cadastrado','Cadastre despesas mensais fixas, como mão de obra, energia e manutenção.') : `
    <table>
      <thead><tr><th>Nome</th><th>Categoria</th><th>Valor mensal</th><th></th></tr></thead>
      <tbody>
        ${state.custosFixos.map(c=>`
          <tr>
            <td><strong>${c.nome}</strong></td>
            <td>${c.categoria || '—'}</td>
            <td class="mono">R$ ${fmt(c.valorMensal)}</td>
            <td style="display:flex; gap:6px;">
              <button class="btn-ghost btn-sm" data-edit-custofixo="${c.id}">Editar</button>
              <button class="btn-danger-ghost" data-del-custofixo="${c.id}">Excluir</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>`}
  </div>`;
}

/* ===================== EVENTOS ===================== */
function attachEvents(){
  const searchEl = document.querySelector('[data-search]');
  if(searchEl){
    searchEl.oninput = (e)=>{ state.search = e.target.value; render();
      // refocus + cursor at end after re-render
      const s = document.querySelector('[data-search]');
      s.focus(); s.setSelectionRange(s.value.length, s.value.length);
    };
  }
  document.querySelectorAll('[data-nav-group]').forEach(el=>{
    el.onclick = ()=>{
      const group = GROUPS[el.dataset.navGroup];
      if(!group.pages.some(p=>p.key===state.page)) state.page = group.pages[0].key;
      render();
    };
  });
  document.querySelectorAll('[data-subnav]').forEach(el=>{
    el.onclick = ()=>{ state.page = el.dataset.subnav; render(); };
  });
  const fabToggle = document.querySelector('[data-fab-toggle]');
  if(fabToggle){
    fabToggle.onclick = ()=>{ state.fabOpen = !state.fabOpen; render(); };
  }
  document.querySelectorAll('[data-fab-action]').forEach(el=>{
    el.onclick = ()=>{
      openNewModal(el.dataset.fabAction);
      state.fabOpen = false;
      render();
    };
  });
  document.querySelectorAll('[data-edit-ing]').forEach(el=>{
    el.onclick = ()=>{
      const ing = getIng(el.dataset.editIng);
      editDraft = {...ing, _editId: ing.id};
      state.modal = {type:'ingrediente'};
      render();
    };
  });
  document.querySelectorAll('[data-del-ing]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delIng);
      await db.from('ingredientes').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-edit-mov]').forEach(el=>{
    el.onclick = ()=>{
      const mov = state.movimentos.find(m=>m.id===Number(el.dataset.editMov));
      editDraft = {...mov, _editId: mov.id};
      state.modal = {type:'movimento'};
      render();
    };
  });
  document.querySelectorAll('[data-del-mov]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delMov);
      await db.from('movimentos').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-del-diet]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delDiet);
      await db.from('dietas').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-edit-diet]').forEach(el=>{
    el.onclick = ()=>{
      const dieta = state.dietas.find(x=>x.id===Number(el.dataset.editDiet));
      editDraft = {...dieta, itens: dieta.itens.map(it=>({...it})), _editId: dieta.id};
      state.modal = {type:'dieta'};
      render();
    };
  });
  document.querySelectorAll('[data-edit-lote]').forEach(el=>{
    el.onclick = ()=>{
      const lote = state.lotes.find(l=>l.id===Number(el.dataset.editLote));
      editDraft = {...lote, dataFim: lote.dataFim||'', _editId: lote.id};
      state.modal = {type:'lote'};
      render();
    };
  });
  document.querySelectorAll('[data-del-lote]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delLote);
      await db.from('lotes').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-edit-racao]').forEach(el=>{
    el.onclick = ()=>{
      const s = state.saidasRacao.find(x=>x.id===Number(el.dataset.editRacao));
      editDraft = {...s, _editId: s.id};
      state.modal = {type:'saidaRacao'};
      render();
    };
  });
  document.querySelectorAll('[data-del-racao]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delRacao);
      await db.from('saidas_racao').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-edit-cocho]').forEach(el=>{
    el.onclick = ()=>{
      const c = state.leiturasCocho.find(x=>x.id===Number(el.dataset.editCocho));
      editDraft = {...c, _editId: c.id};
      state.modal = {type:'cocho'};
      render();
    };
  });
  document.querySelectorAll('[data-del-cocho]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delCocho);
      await db.from('leituras_cocho').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-nota-pick]').forEach(el=>{
    el.onclick = ()=>{ editDraft.nota = Number(el.dataset.notaPick); render(); };
  });
  document.querySelectorAll('[data-edit-pasto]').forEach(el=>{
    el.onclick = ()=>{
      const p = state.pasto.find(x=>x.id===Number(el.dataset.editPasto));
      editDraft = {...p, _editId: p.id};
      state.modal = {type:'pasto'};
      render();
    };
  });
  document.querySelectorAll('[data-del-pasto]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delPasto);
      await db.from('pasto').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-edit-custofixo]').forEach(el=>{
    el.onclick = ()=>{
      const c = state.custosFixos.find(x=>x.id===Number(el.dataset.editCustofixo));
      editDraft = {...c, _editId: c.id};
      state.modal = {type:'custoFixo'};
      render();
    };
  });
  document.querySelectorAll('[data-del-custofixo]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delCustofixo);
      await db.from('custos_fixos').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-toggle-diet]').forEach(el=>{
    el.onclick = ()=>{
      const id = Number(el.dataset.toggleDiet);
      state.openDietId = state.openDietId===id ? null : id;
      render();
    };
  });

  // modal generic close
  document.querySelectorAll('[data-close], [data-close-overlay]').forEach(el=>{
    el.onclick = (e)=>{
      if(e.target.dataset.stop) return;
      state.modal = null; editDraft=null; render();
    };
  });
  const stopEl = document.querySelector('[data-stop]');
  if(stopEl) stopEl.onclick = (e)=> e.stopPropagation();

  // dieta item add/remove/change
  document.querySelectorAll('[data-item-add]').forEach(el=>{
    el.onclick = ()=>{ editDraft.itens.push({ingredienteId:state.ingredientes[0]?.id||'', pct:''}); render(); };
  });
  document.querySelectorAll('[data-item-del]').forEach(el=>{
    el.onclick = ()=>{ editDraft.itens.splice(Number(el.dataset.itemDel),1); render(); };
  });
  document.querySelectorAll('[data-item-ing]').forEach(el=>{
    el.onchange = (e)=>{ editDraft.itens[Number(el.dataset.itemIng)].ingredienteId = Number(e.target.value); };
  });
  document.querySelectorAll('[data-item-pct]').forEach(el=>{
    el.oninput = (e)=>{ editDraft.itens[Number(el.dataset.itemPct)].pct = e.target.value; };
  });

  // save handlers
  const saveBtn = document.querySelector('[data-save]');
  if(saveBtn){
    saveBtn.onclick = async ()=>{
      const type = saveBtn.dataset.save;
      let error = null;
      if(type==='ingrediente'){
        const campos = {
          nome: document.getElementById('f-nome').value || 'Sem nome',
          categoria: document.getElementById('f-categoria').value,
          fornecedor: document.getElementById('f-fornecedor').value,
          unidade: document.getElementById('f-unidade').value,
          ms: Number(document.getElementById('f-ms').value)||0,
          pb: Number(document.getElementById('f-pb').value)||0,
          ndt: Number(document.getElementById('f-ndt').value)||0,
          precoKg: Number(document.getElementById('f-preco').value)||0,
          estoqueMin: Number(document.getElementById('f-min').value)||0,
        };
        const row = ingredienteToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('ingredientes').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('ingredientes').insert(row));
        }
      } else if(type==='movimento'){
        const campos = {
          data: document.getElementById('f-data').value,
          ingredienteId: Number(document.getElementById('f-ing').value),
          tipo: document.getElementById('f-tipo').value,
          quantidade: Number(document.getElementById('f-qtd').value)||0,
        };
        const row = movimentoToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('movimentos').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('movimentos').insert(row));
        }
      } else if(type==='dieta'){
        const campos = {
          nome: document.getElementById('f-nome').value || 'Sem nome',
          categoriaAnimal: document.getElementById('f-categoria').value,
          kgAnimalDia: Number(document.getElementById('f-kganimal').value)||0,
          itens: editDraft.itens.map(it=>({ingredienteId:Number(it.ingredienteId), pct:Number(it.pct)||0})),
        };
        const row = dietaToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('dietas').update(row).eq('id', editDraft._editId));
          state.openDietId = editDraft._editId;
        } else {
          const res = await db.from('dietas').insert(row).select().single();
          error = res.error;
          if(res.data) state.openDietId = res.data.id;
        }
      } else if(type==='lote'){
        const campos = {
          nome: document.getElementById('f-nome').value || 'Sem nome',
          numeroAnimais: Number(document.getElementById('f-numanimais').value)||0,
          dataInicio: document.getElementById('f-datainicio').value,
          dataFim: document.getElementById('f-datafim').value || null,
        };
        const row = loteToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('lotes').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('lotes').insert(row));
        }
      } else if(type==='saidaRacao'){
        const dietaId = Number(document.getElementById('f-dieta').value);
        const loteId = Number(document.getElementById('f-lote').value);
        const data = document.getElementById('f-data').value;
        const quantidadeKg = Number(document.getElementById('f-qtdracao').value)||0;
        const dieta = state.dietas.find(x=>x.id===dietaId);
        const row = {data, dieta_id: dietaId, lote_id: loteId, quantidade_kg: quantidadeKg};
        let saidaId = editDraft._editId;
        if(saidaId){
          ({error} = await db.from('saidas_racao').update(row).eq('id', saidaId));
          if(!error) await db.from('movimentos').delete().eq('saida_racao_id', saidaId);
        } else {
          const res = await db.from('saidas_racao').insert(row).select().single();
          error = res.error;
          if(res.data) saidaId = res.data.id;
        }
        if(!error && dieta){
          const movs = dieta.itens.filter(it=>it.ingredienteId).map(it=>{
            const ing = getIng(it.ingredienteId);
            const consumoKg = quantidadeKg*it.pct/100;
            return {
              data, ingrediente_id: it.ingredienteId, tipo: 'saida',
              quantidade: kgParaUnidade(consumoKg, ing?.unidade), saida_racao_id: saidaId,
            };
          });
          if(movs.length){
            ({error} = await db.from('movimentos').insert(movs));
          }
        }
      } else if(type==='cocho'){
        const campos = {
          loteId: Number(document.getElementById('f-lote').value),
          data: document.getElementById('f-data').value,
          nota: Number(editDraft.nota)||2,
          observacao: document.getElementById('f-obs').value,
        };
        const row = leituraCochoToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('leituras_cocho').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('leituras_cocho').insert(row));
        }
      } else if(type==='pasto'){
        const loteId = Number(document.getElementById('f-lote').value);
        const ingredienteId = Number(document.getElementById('f-ing').value);
        const data = document.getElementById('f-data').value;
        const quantidade = Number(document.getElementById('f-qtdpasto').value)||0;
        const row = {data, lote_id: loteId, ingrediente_id: ingredienteId, quantidade};
        let pastoId = editDraft._editId;
        if(pastoId){
          ({error} = await db.from('pasto').update(row).eq('id', pastoId));
          if(!error) await db.from('movimentos').delete().eq('pasto_id', pastoId);
        } else {
          const res = await db.from('pasto').insert(row).select().single();
          error = res.error;
          if(res.data) pastoId = res.data.id;
        }
        if(!error){
          ({error} = await db.from('movimentos').insert({
            data, ingrediente_id: ingredienteId, tipo: 'saida', quantidade, pasto_id: pastoId,
          }));
        }
      } else if(type==='custoFixo'){
        const campos = {
          nome: document.getElementById('f-nome').value || 'Sem nome',
          categoria: document.getElementById('f-categoria').value,
          valorMensal: Number(document.getElementById('f-valormensal').value)||0,
        };
        const row = custoFixoToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('custos_fixos').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('custos_fixos').insert(row));
        }
      }
      if(error){
        alert('Não foi possível salvar: ' + error.message);
        return;
      }
      state.modal = null; editDraft = null;
      await loadAll();
    };
  }
}

loadAll();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
