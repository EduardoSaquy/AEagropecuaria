// Detalhe de uma fatia dos gráficos de Resultados: lista despesa por
// despesa o que compõe aquele valor, com botão de editar cada uma (reabre
// o cadastro de Despesas — dá pra trocar o centro de custo ou a área dali
// mesmo, sem precisar ir em Financeiro procurar o lançamento).
function ModalDetalheGrafico(){
  const {panelId, idx} = state.modal;
  const entry = (state.paineisResultadosDados[panelId]||[])[idx];
  if(!entry){
    return `<div class="overlay" data-close-overlay="1"><div class="modal" data-stop="1">
      <div class="modal-head"><h3>Detalhe</h3><button class="modal-close" data-close="1">&times;</button></div>
      <div class="modal-body"><p class="hint">Esse gráfico foi atualizado — feche e clique na fatia de novo.</p></div>
      <div class="modal-foot"><button class="btn btn-ghost" data-close="1">Fechar</button></div>
    </div></div>`;
  }
  const ehPorArea = panelId==='area' || panelId==='area-ano';
  const itens = [...(entry.itens||[])].sort((a,b)=>b.valor-a.valor);
  return `
  <div class="overlay" data-close-overlay="1">
    <div class="modal" data-stop="1">
      <div class="modal-head"><h3>${entry.nome}</h3><button class="modal-close" data-close="1">&times;</button></div>
      <div class="modal-body">
        <p class="hint" style="margin-bottom:14px;">R$ ${fmt(entry.valor)} (${fmt(entry.pct,1)}% do total)${ehPorArea ? ' — valor já rateado pra essa área; uma despesa "Geral" aparece aqui só com a fatia que cabe a essa área, não o valor cheio.' : ''}</p>
        ${itens.length===0 ? `<p class="hint">Sem despesas cadastradas detalhadas pra essa fatia.</p>` : `
        <table>
          <thead><tr><th>Despesa</th><th>Mês</th><th>Valor${ehPorArea ? ' (nessa área)' : ''}</th><th></th></tr></thead>
          <tbody>
            ${itens.map(it=>`
              <tr>
                <td><strong>${it.nome}</strong></td>
                <td>${it.mes ? `<span class="pill pill-cat">${mesLabel(it.mes)}</span>` : `<span class="pill pill-ok">Recorrente</span>`}</td>
                <td class="mono">R$ ${fmt(it.valor)}</td>
                <td>${temPermissao('financeiro','editar') && it.id ? `<button class="btn-ghost btn-sm" data-edit-custofixo="${it.id}">Editar</button>` : ''}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`}
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close="1">Fechar</button>
      </div>
    </div>
  </div>`;
}

function attachEvents(){
  const loginForm = document.querySelector('[data-login-form]');

  function sincronizarCamposDieta(){
    const nomeEl = document.getElementById('f-nome');
    const categoriaEl = document.getElementById('f-categoria');
    const kgEl = document.getElementById('f-kganimal');
    const tipoEl = document.getElementById('f-tipodieta');

  // busca de Ingredientes/Despesas; sem setSelectionRange aqui porque esses
  // campos são type="number", que não suporta seleção de texto).
  function refazVendaInput(id, campo){
    const el = document.getElementById(id);
    if(!el) return;
    el.oninput = (e)=>{
      editDraft[campo] = e.target.value;
      render();
      const s = document.getElementById(id);

  }
  const loteVendaEl = document.getElementById('f-lotevenda');
  if(loteVendaEl) loteVendaEl.onchange = (e)=>{ editDraft.loteId = Number(e.target.value); render(); };
  const tipoVendaEl = document.getElementById('f-tipovenda');
  if(tipoVendaEl) tipoVendaEl.onchange = (e)=>{ editDraft.tipoVenda = e.target.value; render(); };
  refazVendaInput('f-qtdvenda', 'quantidade');
  refazVendaInput('f-pesovenda', 'pesoMedioKg');
  refazVendaInput('f-valorarrobavenda', 'valorArroba');
  refazVendaInput('f-valorporanimalvenda', 'valorPorAnimal');
  refazVendaInput('f-valorkgvenda', 'valorKg');

  // save handlers
  const saveBtn = document.querySelector('[data-save]');
  if(saveBtn){
    saveBtn.onclick = async ()=>{
      const type = saveBtn.dataset.save;
      let error = null;
      if(type==='ingrediente'){
        // o campo de preço só existe no formulário pra quem pode ver valores
        // (souAdmin) — sem ele, preserva o preço que já estava salvo.
        const precoInput = document.getElementById('f-preco');
        const campos = {
          nome: document.getElementById('f-nome').value || 'Sem nome',
          categoria: document.getElementById('f-categoria').value,
          fornecedor: document.getElementById('f-fornecedor').value,
          unidade: document.getElementById('f-unidade').value,
          ms: Number(document.getElementById('f-ms').value)||0,
          pb: Number(document.getElementById('f-pb').value)||0,
          ndt: Number(document.getElementById('f-ndt').value)||0,
          precoKg: precoInput ? Number(precoInput.value)||0 : Number(editDraft.precoKg)||0,
          estoqueMin: Number(document.getElementById('f-min').value)||0,
        };
        const row = ingredienteToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('ingredientes').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('ingredientes').insert(row));
        }
      } else if(type==='movimento'){
        const tipoMov = document.getElementById('f-tipo').value;
        const precoEntradaEl = document.getElementById('f-precoentrada');
        const campos = {
          data: document.getElementById('f-data').value,
          ingredienteId: Number(document.getElementById('f-ing').value),
          tipo: tipoMov,
          quantidade: Number(document.getElementById('f-qtd').value)||0,
          precoKg: (tipoMov==='entrada' && precoEntradaEl && precoEntradaEl.value) ? Number(precoEntradaEl.value) : null,
        };
        const row = movimentoToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('movimentos').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('movimentos').insert(row));
          // Uma entrada com preço informado recalcula o preço/kg do ingrediente
          // pela média ponderada entre o estoque que já tinha (antes dessa
          // entrada) e o que está entrando — só numa entrada nova, nunca ao
          // editar um lançamento existente.
          if(!error && campos.tipo==='entrada' && campos.precoKg){
            const ing = getIng(campos.ingredienteId);
            if(ing){
              const saldoAtualKg = qtdEmKg(saldoIngrediente(campos.ingredienteId), ing.unidade);
              const qtdEntradaKg = qtdEmKg(campos.quantidade, ing.unidade);
              const precoAtual = Number(ing.precoKg)||0;
              const precoPonderado = saldoAtualKg>0
                ? (saldoAtualKg*precoAtual + qtdEntradaKg*campos.precoKg) / (saldoAtualKg+qtdEntradaKg)
                : campos.precoKg;
              await db.from('ingredientes').update({preco_kg: precoPonderado}).eq('id', campos.ingredienteId);
            }

  // painel de resultados: hover sincronizado entre gráfico e legenda
  const tooltip = document.getElementById('painel-tooltip');
  const clearHovers = ()=>{
    document.querySelectorAll('.donut-slice.hover, .legenda-row.hover').forEach(el=>el.classList.remove('hover'));
  };
  document.querySelectorAll('[data-slice-idx]').forEach(el=>{
    const idx = el.dataset.sliceIdx;
    el.addEventListener('pointerenter', ()=>{
      clearHovers();
      el.classList.add('hover');
      const row = document.querySelector(`[data-legenda-idx="${idx}"]`);
      if(row) row.classList.add('hover');
      if(tooltip){
        tooltip.innerHTML = `<div class="v">R$ ${el.dataset.tipValor}</div><div class="l">${el.dataset.tipNome} · ${el.dataset.tipPct}%</div>`;
        tooltip.style.display = 'block';
      }
    });
    el.addEventListener('pointermove', (e)=>{
      if(tooltip){ tooltip.style.left = (e.clientX+14)+'px'; tooltip.style.top = (e.clientY+14)+'px'; }
    });
    el.addEventListener('pointerleave', ()=>{
      clearHovers();
      if(tooltip) tooltip.style.display = 'none';
    });
    el.addEventListener('focus', ()=>{
      clearHovers();
      el.classList.add('hover');
      const row = document.querySelector(`[data-legenda-idx="${idx}"]`);
      if(row) row.classList.add('hover');
    });
    el.addEventListener('blur', clearHovers);
  });
  document.querySelectorAll('[data-legenda-idx]').forEach(el=>{
    const idx = el.dataset.legendaIdx;
    el.addEventListener('pointerenter', ()=>{
      clearHovers();
      el.classList.add('hover');
      const slice = document.querySelector(`[data-slice-idx="${idx}"]`);
      if(slice) slice.classList.add('hover');
    });
    el.addEventListener('pointerleave', clearHovers);
  });

  // A chave é "painelId-idx" — o painelId em si pode ter hífen (ex:
  // "area-ano"), então separamos só no último hífen (o idx nunca tem).
  const abrirDetalheFatia = (chave)=>{
    const idx = Number(chave.slice(chave.lastIndexOf('-')+1));
    const panelId = chave.slice(0, chave.lastIndexOf('-'));
    const entry = (state.paineisResultadosDados[panelId]||[])[idx];
    if(!entry) return;
    state.modal = {type:'detalheGrafico', panelId, idx};
    render();
  };
  document.querySelectorAll('[data-slice-idx]').forEach(el=>{
    el.addEventListener('click', ()=>abrirDetalheFatia(el.dataset.sliceIdx));
    el.addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); abrirDetalheFatia(el.dataset.sliceIdx); } });
  });
  document.querySelectorAll('[data-legenda-idx]').forEach(el=>{
    el.addEventListener('click', ()=>abrirDetalheFatia(el.dataset.legendaIdx));
  });
}

initAuth();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js'));
}

// tenta sincronizar a fila offline assim que o navegador avisar que voltou
// a conexão, e periodicamente como reforço (o evento 'online' nem sempre
// dispara de forma confiável em todo dispositivo/navegador).
window.addEventListener('online', tentarSincronizarFila);
setInterval(tentarSincronizarFila, 30000);
// se sobrou algo pendente de uma sessão anterior (app fechado antes de
// sincronizar), tenta assim que o app abre de novo.
setTimeout(tentarSincronizarFila, 3000);
</script>
