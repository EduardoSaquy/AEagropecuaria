<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AE Pecuária</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0F2A4A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde-escuro:#0F2A4A;
    --verde-medio:#1D5DA8;
    --verde-claro:#9DC0E8;
    --grafite:#1E2A38;
    --cinza:#65758A;
    --cinza-claro:#DEE6F0;
    --cinza-bg:#F2F5FA;
    --branco:#FFFFFF;
    --trigo:#C98A2B;
    --alerta:#B3462F;
    --alerta-bg:#F6E7E2;
    --ok-bg:#E5EEF9;
    --bom:#0C7A43;
    --bom-bg:#E3F1E8;
    --radius:10px;
    --shadow:0 1px 2px rgba(15,42,74,0.06), 0 4px 12px rgba(15,42,74,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--cinza-bg);
    color:var(--grafite);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    display:flex;
    min-height:100vh;
  }
  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:230px;
    flex-shrink:0;
    background:var(--verde-escuro);
    color:var(--branco);
    display:flex;
    flex-direction:column;
    padding:24px 16px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 8px 24px 8px;
    margin-bottom:8px;
    border-bottom:1px solid rgba(255,255,255,0.12);
  }
  .brand-mark{
    width:32px;height:32px;flex-shrink:0;
  }
  .brand-name{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:19px;
    letter-spacing:0.2px;
  }
  nav{margin-top:18px; display:flex; flex-direction:column; gap:4px;}
  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    font-weight:500;
    color:rgba(255,255,255,0.72);
    transition:background 0.15s, color 0.15s;
    border:none;
    background:none;
    width:100%;
    text-align:left;
  }
  .nav-item:hover{background:rgba(255,255,255,0.06); color:var(--branco);}
  .nav-item.active{background:var(--verde-medio); color:var(--branco);}
  .nav-item svg{flex-shrink:0;}
  .sidebar-footer{
    margin-top:auto;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,0.12);
    font-size:11px;
    color:rgba(255,255,255,0.45);
    line-height:1.5;
  }
  /* ---------- MAIN ---------- */
  .main{
    flex:1;
    padding:32px 40px 60px 40px;
    max-width:1180px;
  }
  .page-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:28px;
  }
  .eyebrow{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.4px;
    color:var(--verde-medio);
    font-weight:600;
    margin:0 0 4px 0;
  }
  h1{
    font-family:'Fraunces',serif;
    font-size:28px;
    font-weight:600;
    margin:0;
    color:var(--verde-escuro);
  }
  .page-desc{color:var(--cinza); font-size:13.5px; margin-top:6px; max-width:520px;}
  .btn{
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    font-weight:600;
    padding:10px 18px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    transition:filter 0.15s, transform 0.1s;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--verde-escuro); color:var(--branco);}
  .btn-primary:hover{filter:brightness(1.15);}
  .btn-ghost{background:transparent; color:var(--verde-escuro); border:1px solid var(--cinza-claro);}
  .btn-ghost:hover{background:var(--branco);}
  .btn-danger-ghost{background:transparent; color:var(--alerta); border:1px solid var(--cinza-claro); padding:6px 10px; font-size:12px;}
  .btn-danger-ghost:hover{background:var(--alerta-bg);}
  .btn-sm{padding:6px 12px; font-size:12.5px;}

  .card{
    background:var(--branco);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    border:1px solid var(--cinza-claro);
  }
  .card-pad{padding:22px 24px;}
  .stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px;}
  .stat-card{
    background:var(--branco);
    border:1px solid var(--cinza-claro);
    border-radius:var(--radius);
    padding:16px 18px;
  }
  .stat-label{font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--cinza); font-weight:600;}
  .stat-value{
    font-family:'IBM Plex Mono',monospace;
    font-size:22px;
    font-weight:600;
    color:var(--verde-escuro);
    margin-top:6px;
  }
  .stat-value.alerta{color:var(--alerta);}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{
    text-align:left;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--cinza);
    font-weight:600;
    padding:10px 14px;
    border-bottom:1px solid var(--cinza-claro);
    white-space:nowrap;
  }
  td{
    padding:12px 14px;
    border-bottom:1px solid var(--cinza-claro);
    color:var(--grafite);
    vertical-align:middle;
  }
  tr:last-child td{border-bottom:none;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .pill{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    padding:3px 9px;
    border-radius:20px;
  }
  .pill-ok{background:var(--ok-bg); color:var(--verde-medio);}
  .pill-alerta{background:var(--alerta-bg); color:var(--alerta);}
  .pill-cat{background:var(--cinza-claro); color:var(--grafite);}
  .pill-warn{background:#F5E9D7; color:var(--trigo);}

  /* silo gauge */
  .silo-wrap{display:flex; align-items:center; gap:8px;}
  .silo{
    width:14px; height:30px;
    border:1.5px solid var(--verde-escuro);
    border-radius:3px;
    position:relative;
    overflow:hidden;
    background:var(--cinza-claro);
    flex-shrink:0;
  }
  .silo-fill{
    position:absolute; bottom:0; left:0; right:0;
    background:var(--verde-medio);
  }
  .silo-fill.alerta{background:var(--alerta);}

  /* form modal */
  .overlay{
    position:fixed; inset:0; background:rgba(31,61,46,0.35);
    display:flex; align-items:flex-start; justify-content:center;
    padding:50px 20px; overflow-y:auto; z-index:50;
  }
  .modal{
    background:var(--branco); border-radius:14px; width:100%; max-width:560px;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-head{
    padding:20px 24px; border-bottom:1px solid var(--cinza-claro);
    display:flex; justify-content:space-between; align-items:center;
  }
  .modal-head h3{font-family:'Fraunces',serif; font-size:18px; margin:0; color:var(--verde-escuro);}
  .modal-close{background:none;border:none;cursor:pointer;color:var(--cinza);font-size:20px; line-height:1;}
  .modal-body{padding:22px 24px; display:flex; flex-direction:column; gap:14px; max-height:70vh; overflow-y:auto;}
  .modal-foot{padding:16px 24px; border-top:1px solid var(--cinza-claro); display:flex; justify-content:flex-end; gap:10px;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  label{font-size:12px; font-weight:600; color:var(--grafite);}
  input, select, textarea{
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    padding:9px 11px;
    border:1px solid var(--cinza-claro);
    border-radius:7px;
    background:var(--branco);
    color:var(--grafite);
    outline:none;
  }
  input:focus, select:focus, textarea:focus{border-color:var(--verde-medio); box-shadow:0 0 0 3px rgba(61,107,79,0.12);}
  .hint{font-size:11px; color:var(--cinza);}
  .composicao-row{
    display:grid; grid-template-columns: 1fr 90px 32px; gap:8px; align-items:center;
  }
  .total-bar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; border-radius:8px; background:var(--cinza-bg); font-size:13px;
  }
  .total-bar.ok{color:var(--verde-medio); font-weight:600;}
  .total-bar.warn{color:var(--trigo); font-weight:600;}

  .empty{
    text-align:center; padding:50px 20px; color:var(--cinza);
  }
  .empty h4{font-family:'Fraunces',serif; color:var(--verde-escuro); margin:10px 0 6px 0; font-size:16px;}
  .diet-card{
    border:1px solid var(--cinza-claro); border-radius:var(--radius); margin-bottom:14px; overflow:hidden;
  }
  .diet-head{
    padding:16px 20px; display:flex; justify-content:space-between; align-items:center;
    cursor:pointer; background:var(--branco);
  }
  .diet-head:hover{background:var(--cinza-bg);}
  .diet-title{font-family:'Fraunces',serif; font-weight:600; font-size:15.5px; color:var(--verde-escuro);}
  .diet-sub{font-size:12px; color:var(--cinza); margin-top:2px;}
  .diet-metrics{display:flex; gap:22px;}
  .diet-metric{text-align:right;}
  .diet-metric .v{font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--verde-escuro); font-size:14px;}
  .diet-metric .l{font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:var(--cinza);}
  .diet-body{padding:0 20px 18px 20px; border-top:1px solid var(--cinza-claro); background:var(--cinza-bg);}
  .chev{transition:transform 0.15s;}
  .chev.open{transform:rotate(180deg);}
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:12px;}
  .search{
    display:flex; align-items:center; gap:8px; background:var(--branco);
    border:1px solid var(--cinza-claro); border-radius:8px; padding:8px 12px; width:260px;
  }
  .search input{border:none; padding:0; flex:1;}
  .search input:focus{box-shadow:none;}

  /* sub-abas dentro de um grupo (ex: Ingredientes / Estoque) */
  .subtabs{display:flex; gap:18px; margin-bottom:22px; border-bottom:1px solid var(--cinza-claro); overflow-x:auto;}
  .subtab{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; color:var(--cinza);
    background:none; border:none; padding:10px 2px; cursor:pointer; white-space:nowrap;
    border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .subtab:hover{color:var(--verde-escuro);}
  .subtab.active{color:var(--verde-escuro); border-bottom-color:var(--verde-medio);}

  /* botão flutuante de ação rápida */
  .fab-wrap{position:fixed; bottom:28px; right:28px; z-index:60; display:flex; flex-direction:column; align-items:flex-end; gap:10px;}
  .fab-btn{
    width:56px; height:56px; border-radius:50%; border:none; cursor:pointer;
    background:var(--verde-escuro); color:#fff; font-size:26px; line-height:1;
    box-shadow:0 6px 18px rgba(15,42,74,0.28); transition:filter 0.15s, transform 0.1s;
  }
  .fab-btn:hover{filter:brightness(1.15);}
  .fab-btn:active{transform:scale(0.95);}
  .fab-menu{
    display:flex; flex-direction:column; gap:6px; background:var(--branco);
    border:1px solid var(--cinza-claro); border-radius:12px; padding:10px; box-shadow:var(--shadow);
  }
  .fab-menu-item{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; text-align:left;
    padding:10px 14px; border-radius:8px; border:none; background:none; cursor:pointer;
    color:var(--verde-escuro); white-space:nowrap;
  }
  .fab-menu-item:hover{background:var(--cinza-bg);}

  /* seletor de nota da leitura de cocho */
  .nota-picker{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .nota-btn{
    display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:12px 6px; border-radius:8px; border:1.5px solid var(--cinza-claro); background:var(--branco);
    cursor:pointer; font-family:'Inter',sans-serif;
  }
  .nota-btn .n{font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:600; color:var(--verde-escuro);}
  .nota-btn .l{font-size:10.5px; color:var(--cinza); text-align:center; line-height:1.3;}
  .nota-btn.active{border-color:var(--verde-medio); background:var(--ok-bg);}

  /* painel de resultados (gráfico de rosca + legenda) */
  .painel-resultados{display:flex; gap:32px; align-items:center; flex-wrap:wrap;}
  .donut-wrap{flex-shrink:0;}
  .donut-svg{display:block;}
  .donut-slice{cursor:pointer; transition:opacity 0.15s;}
  .donut-slice:hover, .donut-slice.hover{opacity:0.82;}
  .donut-slice:focus{outline:2px solid var(--verde-medio); outline-offset:2px;}
  .donut-label{font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; fill:#fff; pointer-events:none;}
  .donut-center-value{font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:600; fill:var(--verde-escuro);}
  .donut-center-label{font-family:'Inter',sans-serif; font-size:10px; fill:var(--cinza); text-transform:uppercase; letter-spacing:0.5px;}
  .painel-legenda{flex:1; min-width:260px; display:flex; flex-direction:column; gap:2px;}
  .legenda-row{
    display:grid; grid-template-columns:12px 1fr auto auto; align-items:center; gap:10px;
    padding:7px 8px; border-radius:6px; cursor:pointer;
  }
  .legenda-row:hover, .legenda-row.hover{background:var(--cinza-bg);}
  .legenda-swatch{width:12px; height:12px; border-radius:3px;}
  .legenda-nome{font-size:13px; color:var(--grafite);}
  .legenda-valor{font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--grafite); font-variant-numeric:tabular-nums;}
  .legenda-pct{font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--cinza); min-width:48px; text-align:right; font-variant-numeric:tabular-nums;}
  .painel-tooltip{
    position:fixed; pointer-events:none; z-index:80; display:none; max-width:220px;
    background:var(--verde-escuro); color:#fff; padding:8px 12px; border-radius:8px;
    font-size:12.5px; box-shadow:0 6px 18px rgba(0,0,0,0.25);
  }
  .painel-tooltip .v{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:14px;}
  .painel-tooltip .l{font-size:11px; color:rgba(255,255,255,0.75); margin-top:2px;}

  /* ---------- DEMONSTRATIVO DESPESA x RECEITA ---------- */
  .demonstrativo-bars{display:flex; flex-direction:column; gap:14px; margin-bottom:18px;}
  .demo-bar-row{display:grid; grid-template-columns:70px 1fr 120px; align-items:center; gap:12px;}
  .demo-bar-label{font-size:12px; font-weight:600; color:var(--cinza); text-transform:uppercase; letter-spacing:0.5px;}
  .demo-bar-track{background:var(--cinza-claro); border-radius:20px; height:14px; overflow:hidden;}
  .demo-bar-fill{height:100%; border-radius:20px; transition:width 0.3s;}
  .demo-bar-despesa{background:var(--cinza);}
  .demo-bar-receita{background:var(--bom);}
  .demo-bar-valor{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--grafite); text-align:right; font-variant-numeric:tabular-nums;}
  .demo-resultado{
    display:flex; align-items:center; gap:10px; padding:14px 18px; border-radius:var(--radius);
  }
  .demo-resultado-ok{background:var(--bom-bg); color:var(--bom);}
  .demo-resultado-critico{background:var(--alerta-bg); color:var(--alerta);}
  .demo-resultado-icone{font-size:16px; line-height:1;}
  .demo-resultado-label{font-size:13px; font-weight:600; flex:1;}
  .demo-resultado-valor{font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:700;}

  /* ---------- RESPONSIVO (celular) ---------- */
  @media (max-width:760px){
    .app{flex-direction:column;}
    .sidebar{
      width:100%; flex-direction:row; align-items:center; justify-content:space-between;
      padding:12px 16px; gap:12px; overflow-x:auto;
    }
    .brand{border-bottom:none; padding:0; margin-bottom:0; flex-shrink:0;}
    nav{margin-top:0; flex-direction:row; gap:4px;}
    .nav-item{white-space:nowrap; padding:8px 10px; font-size:13px;}
    .sidebar-footer{display:none;}
    .main{padding:20px 16px 48px 16px; max-width:100%;}
    .page-header{flex-direction:column; align-items:flex-start; gap:14px;}
    h1{font-size:23px;}
    .btn{width:100%; justify-content:center;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .toolbar{flex-direction:column; align-items:stretch;}
    .search{width:100%;}
    .card{overflow-x:auto; -webkit-overflow-scrolling:touch;}
    .field-row{grid-template-columns:1fr;}
    .composicao-row{grid-template-columns:1fr 68px 28px; gap:6px;}
    .overlay{padding:16px 10px;}
    .diet-metrics{flex-wrap:wrap; gap:10px 16px; justify-content:flex-end;}
    .diet-head{flex-direction:column; align-items:flex-start; gap:10px;}
    .fab-wrap{bottom:18px; right:18px;}
    .fab-btn{width:50px; height:50px; font-size:24px;}
    .painel-resultados{flex-direction:column; align-items:stretch;}
    .donut-wrap{align-self:center;}
    .demo-bar-row{grid-template-columns:1fr; gap:4px;}
    .demo-bar-valor{text-align:left;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== SUPABASE ===================== */
const db = supabase.createClient(
  'https://leojfqlbdtlriemdgnyw.supabase.co',
  'sb_publishable_IYD9cnj_7tlul7K5zs5YHg_kv5YvzjB'
);

function rowToIngrediente(r){ return {id:r.id, nome:r.nome, categoria:r.categoria, fornecedor:r.fornecedor, unidade:r.unidade, ms:r.ms, pb:r.pb, ndt:r.ndt, precoKg:r.preco_kg, estoqueMin:r.estoque_min, obs:r.obs||''}; }
function ingredienteToRow(i){ return {nome:i.nome, categoria:i.categoria, fornecedor:i.fornecedor, unidade:i.unidade, ms:i.ms, pb:i.pb, ndt:i.ndt, preco_kg:i.precoKg, estoque_min:i.estoqueMin, obs:i.obs||''}; }
function rowToMovimento(r){ return {id:r.id, data:r.data, ingredienteId:r.ingrediente_id, tipo:r.tipo, quantidade:r.quantidade}; }
function movimentoToRow(m){ return {data:m.data, ingrediente_id:m.ingredienteId, tipo:m.tipo, quantidade:m.quantidade}; }
function rowToDieta(r){ return {id:r.id, nome:r.nome, categoriaAnimal:r.categoria_animal, kgAnimalDia:r.kg_animal_dia, itens:r.itens||[], tipo:r.tipo||'confinamento'}; }
function dietaToRow(d){ return {nome:d.nome, categoria_animal:d.categoriaAnimal, kg_animal_dia:d.kgAnimalDia, itens:d.itens, tipo:d.tipo||'confinamento'}; }
function rowToLote(r){ return {id:r.id, nome:r.nome, numeroAnimais:r.numero_animais, dataInicio:r.data_inicio, dataFim:r.data_fim}; }
function loteToRow(l){ return {nome:l.nome, numero_animais:l.numeroAnimais, data_inicio:l.dataInicio, data_fim:l.dataFim||null}; }
function rowToSaidaRacao(r){ return {id:r.id, data:r.data, dietaId:r.dieta_id, loteId:r.lote_id, quantidadeKg:r.quantidade_kg}; }
function rowToLeituraCocho(r){ return {id:r.id, data:r.data, loteId:r.lote_id, nota:r.nota, observacao:r.observacao||''}; }
function leituraCochoToRow(l){ return {data:l.data, lote_id:l.loteId, nota:l.nota, observacao:l.observacao||''}; }
function rowToPasto(r){ return {id:r.id, data:r.data, loteId:r.lote_id, dietaId:r.dieta_id, quantidade:r.quantidade}; }
function rowToReproducaoCusto(r){ return {id:r.id, data:r.data, loteId:r.lote_id, item:r.item, custo:r.custo}; }
function reproducaoCustoToRow(r){ return {data:r.data, lote_id:r.loteId, item:r.item, custo:r.custo}; }
function rowToCustoFixo(r){ return {id:r.id, nome:r.nome, categoria:r.categoria, valorMensal:r.valor_mensal}; }
function custoFixoToRow(c){ return {nome:c.nome, categoria:c.categoria, valor_mensal:c.valorMensal}; }
function rowToReceita(r){ return {id:r.id, data:r.data, loteId:r.lote_id, descricao:r.descricao, arrobas:r.arrobas, valor:r.valor}; }
function receitaToRow(r){ return {data:r.data, lote_id:r.loteId||null, descricao:r.descricao, arrobas:r.arrobas||null, valor:r.valor}; }
function rowToPrecoArroba(r){ return {id:r.id, data:r.data, valor:r.valor}; }

function rowToInvestimento(r){ return {id:r.id, nome:r.nome, categoria:r.categoria, valor:r.valor, data:r.data}; }
function investimentoToRow(i){ return {nome:i.nome, categoria:i.categoria, valor:i.valor, data:i.data}; }

async function loadAll(){
  const [ing, mov, diet, lot, sr, lc, pt, rc, cf, inv, rec, pa, cfg] = await Promise.all([
    db.from('ingredientes').select('*').order('id'),
    db.from('movimentos').select('*').order('id'),
    db.from('dietas').select('*').order('id'),
    db.from('lotes').select('*').order('id'),
    db.from('saidas_racao').select('*').order('id'),
    db.from('leituras_cocho').select('*').order('id'),
    db.from('pasto').select('*').order('id'),
    db.from('reproducao_custos').select('*').order('id'),
    db.from('custos_fixos').select('*').order('id'),
    db.from('investimentos').select('*').order('id'),
    db.from('receitas').select('*').order('id'),
    db.from('precos_arroba').select('*').order('id'),
    db.from('config_financeiro').select('*').eq('id', 1),
  ]);
  state.ingredientes = (ing.data||[]).map(rowToIngrediente);
  state.movimentos = (mov.data||[]).map(rowToMovimento);
  state.dietas = (diet.data||[]).map(rowToDieta);
  state.lotes = (lot.data||[]).map(rowToLote);
  state.saidasRacao = (sr.data||[]).map(rowToSaidaRacao);
  state.leiturasCocho = (lc.data||[]).map(rowToLeituraCocho);
  state.pasto = (pt.data||[]).map(rowToPasto);
  state.reproducao = (rc.data||[]).map(rowToReproducaoCusto);
  state.custosFixos = (cf.data||[]).map(rowToCustoFixo);
  state.investimentos = (inv.data||[]).map(rowToInvestimento);
  state.receitas = (rec.data||[]).map(rowToReceita);
  state.precosArroba = (pa.data||[]).map(rowToPrecoArroba);
  state.metaMargemPct = (cfg.data||[])[0]?.meta_margem_pct ?? null;
  if(state.openDietId===null && state.dietas[0]) state.openDietId = state.dietas[0].id;
  render();
}

/* ===================== HELPERS ===================== */
function fmt(n, dec=2){ return Number(n||0).toLocaleString('pt-BR', {minimumFractionDigits:dec, maximumFractionDigits:dec}); }
function fmtInt(n){ return Number(n||0).toLocaleString('pt-BR'); }
function getIng(id){ return state.ingredientes.find(i=>i.id===Number(id)); }

// Lote é considerado de Confinamento se "confinamento" aparece no nome; os demais são de Pasto.
function loteTipo(lote){
  if(/reprodu/i.test(lote.nome)) return 'reproducao';
  if(/confinamento/i.test(lote.nome)) return 'confinamento';
  return 'pasto';
}

// "Preço por kg" é sempre por quilo; quantidades guardadas em "ton" precisam
// ser convertidas para kg antes de multiplicar pelo preço.
function qtdEmKg(qtd, unidade){ return unidade==='ton' ? Number(qtd||0)*1000 : Number(qtd||0); }
function kgParaUnidade(qtdKg, unidade){ return unidade==='ton' ? qtdKg/1000 : qtdKg; }

function saldoIngrediente(id){
  let saldo = 0;
  state.movimentos.filter(m=>m.ingredienteId===id).forEach(m=>{
    saldo += m.tipo==='entrada' ? m.quantidade : -m.quantidade;
  });
  return saldo;
}

function openNewModal(type){
  if(type==='ingrediente'){
    editDraft = {nome:'', categoria:'Energético', fornecedor:'', unidade:'kg', ms:'', pb:'', ndt:'', precoKg:'', estoqueMin:''};
    state.modal = {type:'ingrediente'};
  } else if(type==='movimento'){
    editDraft = {ingredienteId: state.ingredientes[0]?.id||'', tipo:'entrada', data:new Date().toISOString().slice(0,10), quantidade:''};
    state.modal = {type:'movimento'};
  } else if(type==='dieta'){
    editDraft = {nome:'', tipo:'confinamento', categoriaAnimal:'', kgAnimalDia:9, itens:[{ingredienteId:state.ingredientes[0]?.id||'', pct:''}]};
    state.modal = {type:'dieta'};
  } else if(type==='lote'){
    editDraft = {nome:'', numeroAnimais:'', dataInicio:new Date().toISOString().slice(0,10), dataFim:''};
    state.modal = {type:'lote'};
  } else if(type==='saidaRacao'){
    const dietasConf = state.dietas.filter(x=>x.tipo!=='pasto');
    const lotesConf = state.lotes.filter(l=>loteTipo(l)==='confinamento');
    if(dietasConf.length===0 || lotesConf.length===0){
      alert('Cadastre ao menos uma dieta de Confinamento e um lote com "confinamento" no nome antes de registrar uma saída de ração.');
      return false;
    }
    editDraft = {dietaId: dietasConf[0]?.id||'', loteId: lotesConf[0]?.id||'', data:new Date().toISOString().slice(0,10), quantidadeKg:''};
    state.modal = {type:'saidaRacao'};
  } else if(type==='saidaRacaoCria'){
    const dietasConf = state.dietas.filter(x=>x.tipo!=='pasto');
    const lotesCria = state.lotes.filter(l=>loteTipo(l)==='reproducao');
    if(dietasConf.length===0 || lotesCria.length===0){
      alert('Cadastre ao menos uma dieta de Confinamento e um lote com "reprodução" no nome antes de registrar uma saída de ração para a Cria.');
      return false;
    }
    editDraft = {dietaId: dietasConf[0]?.id||'', loteId: lotesCria[0]?.id||'', data:new Date().toISOString().slice(0,10), quantidadeKg:''};
    state.modal = {type:'saidaRacaoCria'};
  } else if(type==='cocho'){
    if(state.lotes.length===0){
      alert('Cadastre ao menos um lote antes de registrar uma leitura de cocho.');
      return false;
    }
    editDraft = {loteId: state.lotes[0]?.id||'', data:new Date().toISOString().slice(0,10), nota:2, observacao:''};
    state.modal = {type:'cocho'};
  } else if(type==='pasto'){
    const dietasPasto = state.dietas.filter(x=>x.tipo==='pasto');
    const lotesPasto = state.lotes.filter(l=>loteTipo(l)==='pasto');
    if(lotesPasto.length===0 || dietasPasto.length===0){
      alert('Cadastre ao menos um lote sem "confinamento" no nome e uma dieta de Pasto antes de registrar uma reposição de pasto.');
      return false;
    }
    editDraft = {loteId: lotesPasto[0]?.id||'', dietaId: dietasPasto[0]?.id||'', data:new Date().toISOString().slice(0,10), quantidade:''};
    state.modal = {type:'pasto'};
  } else if(type==='reproducaoCusto'){
    const lotesReprod = state.lotes.filter(l=>loteTipo(l)==='reproducao');
    if(lotesReprod.length===0){
      alert('Cadastre ao menos um lote com "reprodução" no nome (ex: Vaca Reprodução) antes de registrar um lançamento de reprodução.');
      return false;
    }
    editDraft = {loteId: lotesReprod[0]?.id||'', data:new Date().toISOString().slice(0,10), item:'', custo:''};
    state.modal = {type:'reproducaoCusto'};
  } else if(type==='custoFixo'){
    editDraft = {nome:'', categoria:'', valorMensal:''};
    state.modal = {type:'custoFixo'};
  } else if(type==='investimento'){
    editDraft = {nome:'', categoria:'', valor:'', data:new Date().toISOString().slice(0,10)};
    state.modal = {type:'investimento'};
  } else if(type==='receita'){
    editDraft = {loteId:'', descricao:'', arrobas:'', valor:'', data:new Date().toISOString().slice(0,10)};
    state.modal = {type:'receita'};
  } else if(type==='precoArroba'){
    const hoje = new Date().toISOString().slice(0,10);

  } else if(type==='metaMargem'){
    editDraft = {valor: state.metaMargemPct ?? ''};
    state.modal = {type:'metaMargem'};
  }
  return true;

/* ===================== PÁGINA: ESTOQUE ===================== */
function PageEstoque(){
  const rows = state.ingredientes.map(i=>{
    const saldo = saldoIngrediente(i.id);
    const valor = qtdEmKg(saldo, i.unidade) * i.precoKg;
    const pctMin = i.estoqueMin>0 ? Math.min(saldo/(i.estoqueMin*2),1) : 1;
    const baixo = saldo < i.estoqueMin;
    return {i, saldo, valor, pctMin, baixo};
  });
  const valorTotal = rows.reduce((a,r)=>a+r.valor,0);
  const alertas = rows.filter(r=>r.baixo).length;

/* ===================== PÁGINA: DIETAS ===================== */
function calcDieta(d){
  let ms=0, pb=0, ndt=0, custoKg=0, pctTotal=0;
  d.itens.forEach(it=>{
    const ing = getIng(it.ingredienteId);
    if(!ing) return;
    const frac = it.pct/100;
    ms += ing.ms*frac;
    pb += ing.pb*frac;
    ndt += ing.ndt*frac;
    custoKg += ing.precoKg*frac;
    pctTotal += it.pct;
  });
  return {ms, pb, ndt, custoKg, pctTotal, custoAnimalDia: custoKg*d.kgAnimalDia};
}

function hojeStr(){ return new Date().toISOString().slice(0,10); }
function mesAtualStr(){ return new Date().toISOString().slice(0,7); }

/* paleta categórica validada (fixa, nunca ciclada) */
const SERIES_COLORS = ['#2a78d6','#008300','#e87ba4','#eda100','#1baf7a','#eb6834','#4a3aa7','#e34948'];

// A cor segue sempre a mesma categoria (nunca a posição no ranking do mês),
// para não trocar de cor quando um custo cresce/encolhe em relação aos outros.
// São dois gráficos com jobs diferentes — não fazem sentido misturados no
// mesmo painel: um compara as áreas de produção (Confinamento/Pasto/Cria),
// o outro compara os centros de custo fixo (Pessoal, Manutenção etc.).
const AREAS_PRODUCAO = ['Confinamento','Pasto','Cria'];
function coresPorArea(){
  const mapa = {};
  AREAS_PRODUCAO.forEach((nome,idx)=>{ mapa[nome] = SERIES_COLORS[idx]; });
  return mapa;
}
// No painel global, Confinamento/Pasto/Cria têm cor fixa reservada (mesma dos
// outros gráficos); as categorias de custo fixo (texto livre) recebem uma cor
// por ordem alfabética nos slots restantes, sem repetir cor entre elas.
// Centros de custo fixo têm cor própria (ordem alfabética) — não precisam
// reservar slots para Confinamento/Pasto/Cria porque esse gráfico não mistura
// os dois eixos (área x centro de custo): cada real do custo fixo pertence a
// exatamente uma categoria aqui, sem sobrepor com o gráfico de área.
function coresPorCentroCusto(nomes){
  const mapa = {};
  const unicos = [...new Set(nomes)].sort();
  unicos.forEach((nome,idx)=>{ mapa[nome] = SERIES_COLORS[idx % SERIES_COLORS.length]; });
  return mapa;
}

// Cada área (Confinamento/Pasto/Cria) já vem com o custo fixo diluído por
// cabeça somado (mesmo critério do Por Curral), então as 3 fatias juntas
// somam 100% do custo total do mês — sem precisar repetir os centros de
// custo fixo como fatias à parte.
function composicaoPorArea(confMes, pastoMes, criaMes){
  const grupos = {};
  if(confMes>0) grupos['Confinamento'] = confMes;
  if(pastoMes>0) grupos['Pasto'] = pastoMes;
  if(criaMes>0) grupos['Cria'] = criaMes;
  let entries = Object.entries(grupos).map(([nome,valor])=>({nome,valor}));
  entries.sort((a,b)=>b.valor-a.valor);
  const cores = coresPorArea();
  const total = entries.reduce((a,e)=>a+e.valor,0);
  return entries.map(e=>({...e, pct: total>0 ? e.valor/total*100 : 0, cor: cores[e.nome]}));
}

// Painel global: todas as categorias juntas (Confinamento/Pasto/Cria +
// cada centro de custo fixo), como fatia de 100% do custo total do mês.
// Puro centro de custo fixo — não mistura com as áreas, porque essa fatia já
// foi diluída dentro de cada área no gráfico "por área" acima.
function composicaoCentrosCusto(custosFixos){
  const grupos = {};
  custosFixos.forEach(c=>{
    const cat = (c.categoria||'').trim() || 'Outros';
    grupos[cat] = (grupos[cat]||0) + Number(c.valorMensal||0);
  });
  let entries = Object.entries(grupos).map(([nome,valor])=>({nome,valor})).filter(e=>e.valor>0);
  entries.sort((a,b)=>b.valor-a.valor);
  if(entries.length>8){
    const principais = entries.slice(0,7);
    const restoValor = entries.slice(7).reduce((a,e)=>a+e.valor,0);
    entries = [...principais, {nome:'Outros', valor:restoValor}];
  }
  const cores = coresPorCentroCusto(entries.map(e=>e.nome));
  const total = entries.reduce((a,e)=>a+e.valor,0);
  return entries.map(e=>({...e, pct: total>0 ? e.valor/total*100 : 0, cor: cores[e.nome]}));
}

function polarXY(cx, cy, r, ang){ return [cx + r*Math.sin(ang), cy - r*Math.cos(ang)]; }
function donutSlicePath(cx, cy, rOut, rIn, a0, a1){
  const largeArc = (a1-a0) > Math.PI ? 1 : 0;
  const [x0,y0] = polarXY(cx,cy,rOut,a0);
  const [x1,y1] = polarXY(cx,cy,rOut,a1);
  const [x2,y2] = polarXY(cx,cy,rIn,a1);
  const [x3,y3] = polarXY(cx,cy,rIn,a0);
  return `M ${x0} ${y0} A ${rOut} ${rOut} 0 ${largeArc} 1 ${x1} ${y1} L ${x2} ${y2} A ${rIn} ${rIn} 0 ${largeArc} 0 ${x3} ${y3} Z`;
}

function PainelResultados(entries, totalMes, panelId, eyebrow, titulo, vazioMsg){
  if(entries.length===0){
    return `<div class="card" style="margin-bottom:22px;">${Empty('Sem custos no mês para compor o gráfico', vazioMsg)}</div>`;
  }
  const cx=110, cy=110, rOut=100, rIn=64;
  const gap = entries.length>1 ? 0.025 : 0;
  let angle = 0;
  const slices = entries.map((e,idx)=>{
    const frac = e.valor/totalMes;
    const sweep = frac*Math.PI*2;
    const a0 = angle + gap/2;
    const a1 = angle + sweep - gap/2;
    angle += sweep;
    const path = donutSlicePath(cx,cy,rOut,rIn,a0,a1);
    const midAngle = (a0+a1)/2;
    const [lx,ly] = polarXY(cx,cy,(rOut+rIn)/2,midAngle);
    const showLabel = e.pct>=6;
    return `
      <path class="donut-slice" data-slice-idx="${panelId}-${idx}" data-tip-nome="${e.nome}" data-tip-valor="${fmt(e.valor)}" data-tip-pct="${fmt(e.pct,1)}"
        d="${path}" fill="${e.cor}" tabindex="0" role="img" aria-label="${e.nome}: R$ ${fmt(e.valor)}, ${fmt(e.pct,1)}% do mês"></path>
      ${showLabel ? `<text class="donut-label" x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle">${fmt(e.pct,0)}%</text>` : ''}
    `;
  }).join('');

  const legenda = entries.map((e,idx)=>`
    <div class="legenda-row" data-legenda-idx="${panelId}-${idx}">
      <span class="legenda-swatch" style="background:${e.cor}"></span>
      <span class="legenda-nome">${e.nome}</span>
      <span class="legenda-valor">R$ ${fmt(e.valor)}</span>
      <span class="legenda-pct">${fmt(e.pct,1)}%</span>
    </div>
  `).join('');

  return `
  <div class="card" style="margin-bottom:22px;">
    <div class="card-pad">
      <p class="eyebrow" style="margin:0 0 4px;">${eyebrow}</p>
      <h3 style="font-family:'Fraunces',serif; font-size:16px; color:var(--verde-escuro); margin:0 0 16px;">${titulo}</h3>
      <div class="painel-resultados">
        <div class="donut-wrap">
          <svg class="donut-svg" viewBox="0 0 220 220" width="220" height="220">
            ${slices}
            <text class="donut-center-value" x="110" y="104" text-anchor="middle">R$ ${fmt(totalMes,0)}</text>
            <text class="donut-center-label" x="110" y="123" text-anchor="middle">no mês</text>
          </svg>
        </div>
        <div class="painel-legenda">${legenda}</div>

// Saída de Ração é uma tabela só, compartilhada entre lotes de Confinamento e
// de Cria; para separar os dois no painel de resultados, é preciso checar o
// tipo do lote de destino de cada lançamento.
function racaoLoteTipo(s){ const lote = state.lotes.find(l=>l.id===s.loteId); return lote ? loteTipo(lote) : null; }

function precoArrobaAtual(){
  if(state.precosArroba.length===0) return null;
  return [...state.precosArroba].sort((a,b)=> b.data.localeCompare(a.data) || b.id-a.id)[0];
}

const NOMES_MES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function custoVariavelDoMes(mesStr){
  const racao = state.saidasRacao.filter(s=>s.data.startsWith(mesStr)).reduce((a,s)=>a+custoSaidaRacao(s),0);
  const pasto = state.pasto.filter(p=>p.data.startsWith(mesStr)).reduce((a,p)=>a+custoPasto(p),0);
  const reproducao = state.reproducao.filter(r=>r.data.startsWith(mesStr)).reduce((a,r)=>a+custoReproducao(r),0);
  return racao + pasto + reproducao;
}
function receitaDoMes(mesStr){
  return state.receitas.filter(r=>r.data.startsWith(mesStr)).reduce((a,r)=>a+Number(r.valor||0),0);
}

// Custo fixo não tem histórico por mês no app (só o valor mensal atual),
// então o mesmo total é aplicado a todos os meses do ano ao montar o
// comparativo — é uma aproximação, avisada na tela.
function comparativoMensal(fixosMes){
  const hoje = new Date();
  const ano = hoje.getFullYear();
  const mesAtual = hoje.getMonth();
  const meses = [];
  for(let m=0; m<=mesAtual; m++){
    const mesStr = `${ano}-${String(m+1).padStart(2,'0')}`;
    const despesa = custoVariavelDoMes(mesStr) + fixosMes;
    const receita = receitaDoMes(mesStr);
    meses.push({mesStr, label: `${NOMES_MES[m]}/${ano}`, despesa, receita, resultado: receita-despesa});
  }
  return meses;
}
function comparativoAnual(meses){
  const despesa = meses.reduce((a,m)=>a+m.despesa,0);
  const receita = meses.reduce((a,m)=>a+m.receita,0);
  return {despesa, receita, resultado: receita-despesa};
}

function dadosFinanceiro(){
  const hoje = hojeStr();
  const mes = mesAtualStr();

  const racaoConfHoje = state.saidasRacao.filter(s=>s.data===hoje && racaoLoteTipo(s)==='confinamento').reduce((a,s)=>a+custoSaidaRacao(s),0);
  const racaoCriaHoje = state.saidasRacao.filter(s=>s.data===hoje && racaoLoteTipo(s)==='reproducao').reduce((a,s)=>a+custoSaidaRacao(s),0);
  const racaoHoje = racaoConfHoje + racaoCriaHoje;
  const pastoHoje = state.pasto.filter(p=>p.data===hoje).reduce((a,p)=>a+custoPasto(p),0);
  const reproducaoHoje = state.reproducao.filter(r=>r.data===hoje).reduce((a,r)=>a+custoReproducao(r),0);
  const criaHoje = racaoCriaHoje + reproducaoHoje;
  const custoHoje = racaoHoje + pastoHoje + reproducaoHoje;

  const racaoConfMes = state.saidasRacao.filter(s=>s.data.startsWith(mes) && racaoLoteTipo(s)==='confinamento').reduce((a,s)=>a+custoSaidaRacao(s),0);
  const racaoCriaMes = state.saidasRacao.filter(s=>s.data.startsWith(mes) && racaoLoteTipo(s)==='reproducao').reduce((a,s)=>a+custoSaidaRacao(s),0);
  const racaoMes = racaoConfMes + racaoCriaMes;
  const pastoMes = state.pasto.filter(p=>p.data.startsWith(mes)).reduce((a,p)=>a+custoPasto(p),0);
  const reproducaoMes = state.reproducao.filter(r=>r.data.startsWith(mes)).reduce((a,r)=>a+custoReproducao(r),0);
  const criaMes = racaoCriaMes + reproducaoMes;
  const variavelMes = racaoMes + pastoMes + reproducaoMes;
  const fixosMes = state.custosFixos.reduce((a,c)=>a+Number(c.valorMensal||0),0);
  const totalMes = variavelMes + fixosMes;

  const lotesAtivos = state.lotes.filter(l=>!l.dataFim);
  const totalAnimais = lotesAtivos.reduce((a,l)=>a+Number(l.numeroAnimais||0),0);
  const custoPorAnimalHoje = totalAnimais>0 ? custoHoje/totalAnimais : 0;

  const fixoDiario = fixosMes/30;
  const custoTotalPorAnimalDia = totalAnimais>0 ? (custoHoje+fixoDiario)/totalAnimais : 0;
  const custoTotalPorAnimalMes = totalAnimais>0 ? totalMes/totalAnimais : 0;

  // Custo fixo (mão de obra, energia etc.) diluído por área, na proporção do
  // número de animais de cada uma — mesmo critério já usado em Por Curral.
  const animaisPorTipo = tipo => lotesAtivos.filter(l=>loteTipo(l)===tipo).reduce((a,l)=>a+Number(l.numeroAnimais||0),0);
  const animaisConfinamento = animaisPorTipo('confinamento');
  const animaisPasto = animaisPorTipo('pasto');
  const animaisCria = animaisPorTipo('reproducao');
  const fixoConfinamento = totalAnimais>0 ? fixosMes*(animaisConfinamento/totalAnimais) : 0;
  const fixoPasto = totalAnimais>0 ? fixosMes*(animaisPasto/totalAnimais) : 0;
  const fixoCria = totalAnimais>0 ? fixosMes*(animaisCria/totalAnimais) : 0;
  const custoTotalConfinamentoMes = racaoConfMes + fixoConfinamento;
  const custoTotalPastoMes = pastoMes + fixoPasto;
  const custoTotalCriaMes = criaMes + fixoCria;

  const valorEstoque = state.ingredientes.reduce((a,i)=>{
    const saldo = saldoIngrediente(i.id);
    return a + qtdEmKg(saldo, i.unidade)*i.precoKg;
  }, 0);

  const receitaMes = state.receitas.filter(r=>r.data.startsWith(mes)).reduce((a,r)=>a+Number(r.valor||0),0);
  const resultadoMes = receitaMes - totalMes;
  const margemAtualPct = receitaMes>0 ? (resultadoMes/receitaMes*100) : null;

  return {hoje, mes, racaoConfHoje, racaoCriaHoje, racaoHoje, pastoHoje, reproducaoHoje, criaHoje, custoHoje,
    racaoConfMes, racaoCriaMes, racaoMes, pastoMes, reproducaoMes, criaMes, variavelMes, fixosMes, totalMes,
    custoTotalConfinamentoMes, custoTotalPastoMes, custoTotalCriaMes, receitaMes, resultadoMes, margemAtualPct,
    totalAnimais, custoPorAnimalHoje, custoTotalPorAnimalDia, custoTotalPorAnimalMes, valorEstoque};
}

function PageFinanceiroCurral(){
  const d = dadosFinanceiro();

  const custosPorLote = state.lotes.filter(l=>!l.dataFim).map(l=>{
    const racao = state.saidasRacao.filter(s=>s.data===d.hoje && s.loteId===l.id).reduce((a,s)=>a+custoSaidaRacao(s),0);
    const pasto = state.pasto.filter(p=>p.data===d.hoje && p.loteId===l.id).reduce((a,p)=>a+custoPasto(p),0);
    const reproducao = state.reproducao.filter(r=>r.data===d.hoje && r.loteId===l.id).reduce((a,r)=>a+custoReproducao(r),0);
    const total = racao + pasto + reproducao;
    const porAnimal = l.numeroAnimais>0 ? total/l.numeroAnimais : 0;
    return {lote:l, racao, pasto, reproducao, total, porAnimal};
  }).sort((a,b)=> b.total-a.total);

  const custosMesPorLote = state.lotes.filter(l=>!l.dataFim).map(l=>{
    const racao = state.saidasRacao.filter(s=>s.data.startsWith(d.mes) && s.loteId===l.id).reduce((a,s)=>a+custoSaidaRacao(s),0);
    const pasto = state.pasto.filter(p=>p.data.startsWith(d.mes) && p.loteId===l.id).reduce((a,p)=>a+custoPasto(p),0);
    const reproducao = state.reproducao.filter(r=>r.data.startsWith(d.mes) && r.loteId===l.id).reduce((a,r)=>a+custoReproducao(r),0);
    const variavel = racao + pasto + reproducao;
    const fixoAlocado = d.totalAnimais>0 ? d.fixosMes*(Number(l.numeroAnimais||0)/d.totalAnimais) : 0;

    const porAnimal = l.numeroAnimais>0 ? total/l.numeroAnimais : 0;
    return {lote:l, racao, pasto, reproducao, fixoAlocado, total, porAnimal};
  }).sort((a,b)=> b.total-a.total);

  return `

      <tbody>
        ${custosPorLote.map(r=>`
          <tr>
            <td><strong>${r.lote.nome}</strong></td>
            <td class="mono">${fmtInt(r.lote.numeroAnimais)}</td>
            <td class="mono">R$ ${fmt(r.racao)}</td>
            <td class="mono">R$ ${fmt(r.pasto)}</td>
            <td class="mono">R$ ${fmt(r.reproducao)}</td>
            <td class="mono">R$ ${fmt(r.total)}</td>
            <td class="mono">R$ ${fmt(r.porAnimal,2)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`}
  </div>

  <p class="eyebrow" style="margin-bottom:10px;">Custo total do mês por curral (ração + pasto + cria + fatia do custo fixo)</p>
  <div class="card" style="margin-bottom:22px;">
    ${custosMesPorLote.length===0 ? Empty('Nenhum lote ativo','Cadastre lotes em Confinamento, Pasto ou Cria para ver o custo total do mês de cada um aqui.') : `
    <table>
      <thead><tr><th>Curral</th><th>Nº animais</th><th>Ração+Pasto+Cria no mês</th><th>Custo fixo alocado</th><th>Total no mês</th><th>Custo/animal no mês</th></tr></thead>
      <tbody>
        ${custosMesPorLote.map(r=>`
          <tr>
            <td><strong>${r.lote.nome}</strong></td>
            <td class="mono">${fmtInt(r.lote.numeroAnimais)}</td>

function attachEvents(){
  const searchEl = document.querySelector('[data-search]');
  if(searchEl){
    searchEl.oninput = (e)=>{ state.search = e.target.value; render();
      // refocus + cursor at end after re-render
      const s = document.querySelector('[data-search]');
      s.focus(); s.setSelectionRange(s.value.length, s.value.length);
    };
  }
  document.querySelectorAll('[data-nav-group]').forEach(el=>{
    el.onclick = ()=>{
      const group = GROUPS[el.dataset.navGroup];
      if(!group.pages.some(p=>p.key===state.page)) state.page = group.pages[0].key;
      render();
    };
  });
  document.querySelectorAll('[data-subnav]').forEach(el=>{
    el.onclick = ()=>{ state.page = el.dataset.subnav; render(); };

  const fabToggle = document.querySelector('[data-fab-toggle]');

  document.querySelectorAll('[data-edit-investimento]').forEach(el=>{

      render();
    };
  });
  document.querySelectorAll('[data-del-investimento]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delInvestimento);
      await db.from('investimentos').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-edit-receita]').forEach(el=>{
    el.onclick = ()=>{
      const r = state.receitas.find(x=>x.id===Number(el.dataset.editReceita));
      editDraft = {...r, _editId: r.id};
      state.modal = {type:'receita'};
      render();
    };
  });
  document.querySelectorAll('[data-del-receita]').forEach(el=>{
    el.onclick = async ()=>{
      const id = Number(el.dataset.delReceita);
      await db.from('receitas').delete().eq('id', id);
      await loadAll();
    };
  });
  document.querySelectorAll('[data-toggle-diet]').forEach(el=>{
    el.onclick = ()=>{
      const id = Number(el.dataset.toggleDiet);
      state.openDietId = state.openDietId===id ? null : id;
      render();
    };
  });

  // modal generic close
  document.querySelectorAll('[data-close], [data-close-overlay]').forEach(el=>{
    el.onclick = (e)=>{
      if(e.target.dataset.stop) return;
      state.modal = null; editDraft=null; render();
    };
  });
  const stopEl = document.querySelector('[data-stop]');
  if(stopEl) stopEl.onclick = (e)=> e.stopPropagation();

  // dieta item add/remove/change
  document.querySelectorAll('[data-item-add]').forEach(el=>{
    el.onclick = ()=>{ editDraft.itens.push({ingredienteId:state.ingredientes[0]?.id||'', pct:''}); render(); };
  });
  document.querySelectorAll('[data-item-del]').forEach(el=>{
    el.onclick = ()=>{ editDraft.itens.splice(Number(el.dataset.itemDel),1); render(); };
  });
  document.querySelectorAll('[data-item-ing]').forEach(el=>{
    el.onchange = (e)=>{ editDraft.itens[Number(el.dataset.itemIng)].ingredienteId = Number(e.target.value); };
  });
  document.querySelectorAll('[data-item-pct]').forEach(el=>{
    el.oninput = (e)=>{ editDraft.itens[Number(el.dataset.itemPct)].pct = e.target.value; };
  });

  // save handlers
  const saveBtn = document.querySelector('[data-save]');
  if(saveBtn){
    saveBtn.onclick = async ()=>{
      const type = saveBtn.dataset.save;
      let error = null;
      if(type==='ingrediente'){
        const campos = {
          nome: document.getElementById('f-nome').value || 'Sem nome',
          categoria: document.getElementById('f-categoria').value,
          fornecedor: document.getElementById('f-fornecedor').value,
          unidade: document.getElementById('f-unidade').value,
          ms: Number(document.getElementById('f-ms').value)||0,
          pb: Number(document.getElementById('f-pb').value)||0,
          ndt: Number(document.getElementById('f-ndt').value)||0,
          precoKg: Number(document.getElementById('f-preco').value)||0,
          estoqueMin: Number(document.getElementById('f-min').value)||0,
        };
        const row = ingredienteToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('ingredientes').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('ingredientes').insert(row));
        }
      } else if(type==='movimento'){
        const campos = {
          data: document.getElementById('f-data').value,
          ingredienteId: Number(document.getElementById('f-ing').value),
          tipo: document.getElementById('f-tipo').value,
          quantidade: Number(document.getElementById('f-qtd').value)||0,
        };
        const row = movimentoToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('movimentos').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('movimentos').insert(row));
        }
      } else if(type==='dieta'){
        const campos = {
          nome: document.getElementById('f-nome').value || 'Sem nome',
          tipo: document.getElementById('f-tipodieta').value,
          categoriaAnimal: document.getElementById('f-categoria').value,
          kgAnimalDia: Number(document.getElementById('f-kganimal').value)||0,
          itens: editDraft.itens.map(it=>({ingredienteId:Number(it.ingredienteId), pct:Number(it.pct)||0})),
        };
        const row = dietaToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('dietas').update(row).eq('id', editDraft._editId));
          state.openDietId = editDraft._editId;
        } else {
          const res = await db.from('dietas').insert(row).select().single();
          error = res.error;
          if(res.data) state.openDietId = res.data.id;
        }
      } else if(type==='lote'){
        const campos = {
          nome: document.getElementById('f-nome').value || 'Sem nome',
          numeroAnimais: Number(document.getElementById('f-numanimais').value)||0,
          dataInicio: document.getElementById('f-datainicio').value,
          dataFim: document.getElementById('f-datafim').value || null,
        };
        const row = loteToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('lotes').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('lotes').insert(row));
        }
      } else if(type==='saidaRacao' || type==='saidaRacaoCria'){
        const dietaId = Number(document.getElementById('f-dieta').value);
        const loteId = Number(document.getElementById('f-lote').value);
        const data = document.getElementById('f-data').value;
        const quantidadeKg = Number(document.getElementById('f-qtdracao').value)||0;
        const dieta = state.dietas.find(x=>x.id===dietaId);
        const row = {data, dieta_id: dietaId, lote_id: loteId, quantidade_kg: quantidadeKg};
        let saidaId = editDraft._editId;
        if(saidaId){
          ({error} = await db.from('saidas_racao').update(row).eq('id', saidaId));
          if(!error) await db.from('movimentos').delete().eq('saida_racao_id', saidaId);
        } else {
          const res = await db.from('saidas_racao').insert(row).select().single();
          error = res.error;
          if(res.data) saidaId = res.data.id;
        }
        if(!error && dieta){
          const movs = dieta.itens.filter(it=>it.ingredienteId).map(it=>{
            const ing = getIng(it.ingredienteId);
            const consumoKg = quantidadeKg*it.pct/100;
            return {
              data, ingrediente_id: it.ingredienteId, tipo: 'saida',
              quantidade: kgParaUnidade(consumoKg, ing?.unidade), saida_racao_id: saidaId,
            };
          });
          if(movs.length){
            ({error} = await db.from('movimentos').insert(movs));
          }
        }
      } else if(type==='cocho'){
        const campos = {
          loteId: Number(document.getElementById('f-lote').value),
          data: document.getElementById('f-data').value,
          nota: Number(editDraft.nota)||2,
          observacao: document.getElementById('f-obs').value,
        };
        const row = leituraCochoToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('leituras_cocho').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('leituras_cocho').insert(row));
        }
      } else if(type==='pasto'){
        const loteId = Number(document.getElementById('f-lote').value);
        const dietaId = Number(document.getElementById('f-dietapasto').value);
        const data = document.getElementById('f-data').value;
        const quantidade = Number(document.getElementById('f-qtdpasto').value)||0;
        const dieta = state.dietas.find(x=>x.id===dietaId);
        const row = {data, lote_id: loteId, dieta_id: dietaId, quantidade};
        let pastoId = editDraft._editId;
        if(pastoId){
          ({error} = await db.from('pasto').update(row).eq('id', pastoId));
          if(!error) await db.from('movimentos').delete().eq('pasto_id', pastoId);
        } else {
          const res = await db.from('pasto').insert(row).select().single();
          error = res.error;
          if(res.data) pastoId = res.data.id;
        }
        if(!error && dieta){
          const movs = dieta.itens.filter(it=>it.ingredienteId).map(it=>{
            const ing = getIng(it.ingredienteId);
            const consumoKg = quantidade*it.pct/100;
            return {
              data, ingrediente_id: it.ingredienteId, tipo: 'saida',
              quantidade: kgParaUnidade(consumoKg, ing?.unidade), pasto_id: pastoId,
            };
          });
          if(movs.length){
            ({error} = await db.from('movimentos').insert(movs));
          }
        }
      } else if(type==='reproducaoCusto'){
        const campos = {
          loteId: Number(document.getElementById('f-lote').value),
          data: document.getElementById('f-data').value,
          item: document.getElementById('f-item').value || 'Sem descrição',
          custo: Number(document.getElementById('f-custoreproducao').value)||0,
        };
        const row = reproducaoCustoToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('reproducao_custos').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('reproducao_custos').insert(row));
        }
      } else if(type==='custoFixo'){
        const campos = {
          nome: document.getElementById('f-nome').value || 'Sem nome',
          categoria: document.getElementById('f-categoria').value,
          valorMensal: Number(document.getElementById('f-valormensal').value)||0,
        };
        const row = custoFixoToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('custos_fixos').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('custos_fixos').insert(row));
        }
      } else if(type==='investimento'){
        const campos = {
          nome: document.getElementById('f-nome').value || 'Sem nome',
          categoria: document.getElementById('f-categoria').value,
          valor: Number(document.getElementById('f-valorinvest').value)||0,
          data: document.getElementById('f-data').value,
        };
        const row = investimentoToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('investimentos').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('investimentos').insert(row));
        }
      } else if(type==='receita'){
        const campos = {
          loteId: document.getElementById('f-lotereceita').value ? Number(document.getElementById('f-lotereceita').value) : null,
          data: document.getElementById('f-data').value,
          descricao: document.getElementById('f-descricaoreceita').value || 'Sem descrição',
          arrobas: document.getElementById('f-arrobas').value ? Number(document.getElementById('f-arrobas').value) : null,
          valor: Number(document.getElementById('f-valorreceita').value)||0,
        };
        const row = receitaToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('receitas').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('receitas').insert(row));
        }
      } else if(type==='precoArroba'){
        const campos = {
          data: document.getElementById('f-dataarroba').value,
          valor: Number(document.getElementById('f-valorarroba').value)||0,
        };
        const row = precoArrobaToRow(campos);
        if(editDraft._editId){
          ({error} = await db.from('precos_arroba').update(row).eq('id', editDraft._editId));
        } else {
          ({error} = await db.from('precos_arroba').insert(row));
        }
      } else if(type==='metaMargem'){
        const pct = Number(document.getElementById('f-metamargem').value)||0;
        ({error} = await db.from('config_financeiro').upsert({id:1, meta_margem_pct:pct}));
      }
      if(error){
        alert('Não foi possível salvar: ' + error.message);
        return;
      }
      state.modal = null; editDraft = null;
      await loadAll();
    };
  }

  // painel de resultados: hover sincronizado entre gráfico e legenda
  const tooltip = document.getElementById('painel-tooltip');
  const clearHovers = ()=>{
    document.querySelectorAll('.donut-slice.hover, .legenda-row.hover').forEach(el=>el.classList.remove('hover'));
  };
  document.querySelectorAll('[data-slice-idx]').forEach(el=>{
    const idx = el.dataset.sliceIdx;
    el.addEventListener('pointerenter', ()=>{
      clearHovers();
      el.classList.add('hover');
      const row = document.querySelector(`[data-legenda-idx="${idx}"]`);
      if(row) row.classList.add('hover');
      if(tooltip){
        tooltip.innerHTML = `<div class="v">R$ ${el.dataset.tipValor}</div><div class="l">${el.dataset.tipNome} · ${el.dataset.tipPct}%</div>`;
        tooltip.style.display = 'block';
      }
    });
    el.addEventListener('pointermove', (e)=>{
      if(tooltip){ tooltip.style.left = (e.clientX+14)+'px'; tooltip.style.top = (e.clientY+14)+'px'; }
    });
    el.addEventListener('pointerleave', ()=>{
      clearHovers();
      if(tooltip) tooltip.style.display = 'none';
    });
    el.addEventListener('focus', ()=>{
      clearHovers();
      el.classList.add('hover');
      const row = document.querySelector(`[data-legenda-idx="${idx}"]`);
      if(row) row.classList.add('hover');
    });
    el.addEventListener('blur', clearHovers);
  });
  document.querySelectorAll('[data-legenda-idx]').forEach(el=>{
    const idx = el.dataset.legendaIdx;
    el.addEventListener('pointerenter', ()=>{
      clearHovers();
      el.classList.add('hover');
      const slice = document.querySelector(`[data-slice-idx="${idx}"]`);
      if(slice) slice.classList.add('hover');
    });
    el.addEventListener('pointerleave', clearHovers);
  });
}

loadAll();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js'));
}
