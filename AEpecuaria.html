<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AE Pecuária</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0F2A4A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde-escuro:#0F2A4A;
    --verde-medio:#1D5DA8;
    --verde-claro:#9DC0E8;
    --grafite:#1E2A38;
    --cinza:#65758A;
    --cinza-claro:#DEE6F0;
    --cinza-bg:#F2F5FA;
    --branco:#FFFFFF;
    --trigo:#C98A2B;
    --alerta:#B3462F;
    --alerta-bg:#F6E7E2;
    --ok-bg:#E5EEF9;
    --bom:#0C7A43;
    --bom-bg:#E3F1E8;
    --radius:10px;
    --shadow:0 1px 2px rgba(15,42,74,0.06), 0 4px 12px rgba(15,42,74,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--cinza-bg);
    color:var(--grafite);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    display:flex;
    min-height:100vh;
  }
  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:230px;
    flex-shrink:0;
    background:var(--verde-escuro);
    color:var(--branco);
    display:flex;
    flex-direction:column;
    padding:24px 16px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 8px 24px 8px;
    margin-bottom:8px;
    border-bottom:1px solid rgba(255,255,255,0.12);
  }
  .brand-mark{
    width:32px;height:32px;flex-shrink:0;
  }
  .brand-name{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:19px;
    letter-spacing:0.2px;
  }
  nav{margin-top:18px; display:flex; flex-direction:column; gap:4px;}
  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    font-weight:500;
    color:rgba(255,255,255,0.72);
    transition:background 0.15s, color 0.15s;
    border:none;
    background:none;
    width:100%;
    text-align:left;
  }
  .nav-item:hover{background:rgba(255,255,255,0.06); color:var(--branco);}
  .nav-item.active{background:var(--verde-medio); color:var(--branco);}
  .nav-item svg{flex-shrink:0;}
  .sidebar-footer{
    margin-top:auto;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,0.12);
    font-size:11px;
    color:rgba(255,255,255,0.45);
    line-height:1.5;
  }
  /* ---------- MAIN ---------- */
  .main{
    flex:1;
    padding:32px 40px 60px 40px;
    max-width:1180px;
  }
  .page-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:28px;
  }
  .eyebrow{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.4px;
    color:var(--verde-medio);
    font-weight:600;
    margin:0 0 4px 0;
  }
  h1{
    font-family:'Fraunces',serif;
    font-size:28px;
    font-weight:600;
    margin:0;
    color:var(--verde-escuro);
  }
  .page-desc{color:var(--cinza); font-size:13.5px; margin-top:6px; max-width:520px;}
  .btn{
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    font-weight:600;
    padding:10px 18px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    transition:filter 0.15s, transform 0.1s;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--verde-escuro); color:var(--branco);}
  .btn-primary:hover{filter:brightness(1.15);}
  .btn-ghost{background:transparent; color:var(--verde-escuro); border:1px solid var(--cinza-claro);}
  .btn-ghost:hover{background:var(--branco);}
  .btn-danger-ghost{background:transparent; color:var(--alerta); border:1px solid var(--cinza-claro); padding:6px 10px; font-size:12px;}
  .btn-danger-ghost:hover{background:var(--alerta-bg);}
  .btn-sm{padding:6px 12px; font-size:12.5px;}

  .card{
    background:var(--branco);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    border:1px solid var(--cinza-claro);
  }
  .card-pad{padding:22px 24px;}
  .stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px;}
  .stat-card{
    background:var(--branco);
    border:1px solid var(--cinza-claro);
    border-radius:var(--radius);
    padding:16px 18px;
  }
  .stat-label{font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--cinza); font-weight:600;}
  .stat-value{
    font-family:'IBM Plex Mono',monospace;
    font-size:22px;
    font-weight:600;
    color:var(--verde-escuro);
    margin-top:6px;
  }
  .stat-value.alerta{color:var(--alerta);}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{
    text-align:left;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--cinza);
    font-weight:600;
    padding:10px 14px;
    border-bottom:1px solid var(--cinza-claro);
    white-space:nowrap;
  }
  td{
    padding:12px 14px;
    border-bottom:1px solid var(--cinza-claro);
    color:var(--grafite);
    vertical-align:middle;
  }
  tr:last-child td{border-bottom:none;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .pill{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    padding:3px 9px;
    border-radius:20px;
  }
  .pill-ok{background:var(--ok-bg); color:var(--verde-medio);}
  .pill-alerta{background:var(--alerta-bg); color:var(--alerta);}
  .pill-cat{background:var(--cinza-claro); color:var(--grafite);}
  .pill-warn{background:#F5E9D7; color:var(--trigo);}

  /* silo gauge */
  .silo-wrap{display:flex; align-items:center; gap:8px;}
  .silo{
    width:14px; height:30px;
    border:1.5px solid var(--verde-escuro);
    border-radius:3px;
    position:relative;
    overflow:hidden;
    background:var(--cinza-claro);
    flex-shrink:0;
  }
  .silo-fill{
    position:absolute; bottom:0; left:0; right:0;
    background:var(--verde-medio);
  }
  .silo-fill.alerta{background:var(--alerta);}

  /* form modal */
  .overlay{
    position:fixed; inset:0; background:rgba(31,61,46,0.35);
    display:flex; align-items:flex-start; justify-content:center;
    padding:50px 20px; overflow-y:auto; z-index:50;
  }
  .modal{
    background:var(--branco); border-radius:14px; width:100%; max-width:560px;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-head{
    padding:20px 24px; border-bottom:1px solid var(--cinza-claro);
    display:flex; justify-content:space-between; align-items:center;
  }
  .modal-head h3{font-family:'Fraunces',serif; font-size:18px; margin:0; color:var(--verde-escuro);}
  .modal-close{background:none;border:none;cursor:pointer;color:var(--cinza);font-size:20px; line-height:1;}
  .modal-body{padding:22px 24px; display:flex; flex-direction:column; gap:14px; max-height:70vh; overflow-y:auto;}
  .modal-foot{padding:16px 24px; border-top:1px solid var(--cinza-claro); display:flex; justify-content:flex-end; gap:10px;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  label{font-size:12px; font-weight:600; color:var(--grafite);}
  input, select, textarea{
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    padding:9px 11px;
    border:1px solid var(--cinza-claro);
    border-radius:7px;
    background:var(--branco);
    color:var(--grafite);
    outline:none;
  }
  input:focus, select:focus, textarea:focus{border-color:var(--verde-medio); box-shadow:0 0 0 3px rgba(61,107,79,0.12);}
  .hint{font-size:11px; color:var(--cinza);}
  .composicao-row{
    display:grid; grid-template-columns: 1fr 90px 32px; gap:8px; align-items:center;
  }
  .total-bar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; border-radius:8px; background:var(--cinza-bg); font-size:13px;
  }
  .total-bar.ok{color:var(--verde-medio); font-weight:600;}
  .total-bar.warn{color:var(--trigo); font-weight:600;}

  .empty{
    text-align:center; padding:50px 20px; color:var(--cinza);
  }
  .empty h4{font-family:'Fraunces',serif; color:var(--verde-escuro); margin:10px 0 6px 0; font-size:16px;}
  .diet-card{
    border:1px solid var(--cinza-claro); border-radius:var(--radius); margin-bottom:14px; overflow:hidden;
  }
  .diet-head{
    padding:16px 20px; display:flex; justify-content:space-between; align-items:center;
    cursor:pointer; background:var(--branco);
  }
  .diet-head:hover{background:var(--cinza-bg);}
  .diet-title{font-family:'Fraunces',serif; font-weight:600; font-size:15.5px; color:var(--verde-escuro);}
  .diet-sub{font-size:12px; color:var(--cinza); margin-top:2px;}
  .diet-metrics{display:flex; gap:22px;}
  .diet-metric{text-align:right;}
  .diet-metric .v{font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--verde-escuro); font-size:14px;}
  .diet-metric .l{font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:var(--cinza);}
  .diet-body{padding:0 20px 18px 20px; border-top:1px solid var(--cinza-claro); background:var(--cinza-bg);}
  .chev{transition:transform 0.15s;}
  .chev.open{transform:rotate(180deg);}
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:12px;}
  .search{
    display:flex; align-items:center; gap:8px; background:var(--branco);
    border:1px solid var(--cinza-claro); border-radius:8px; padding:8px 12px; width:260px;
  }
  .search input{border:none; padding:0; flex:1;}
  .search input:focus{box-shadow:none;}

  /* sub-abas dentro de um grupo (ex: Ingredientes / Estoque) */
  .subtabs{display:flex; gap:18px; margin-bottom:22px; border-bottom:1px solid var(--cinza-claro); overflow-x:auto;}
  .subtab{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; color:var(--cinza);
    background:none; border:none; padding:10px 2px; cursor:pointer; white-space:nowrap;
    border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .subtab:hover{color:var(--verde-escuro);}
  .subtab.active{color:var(--verde-escuro); border-bottom-color:var(--verde-medio);}

  /* botão flutuante de ação rápida */
  .fab-wrap{position:fixed; bottom:28px; right:28px; z-index:60; display:flex; flex-direction:column; align-items:flex-end; gap:10px;}
  .fab-btn{
    width:56px; height:56px; border-radius:50%; border:none; cursor:pointer;
    background:var(--verde-escuro); color:#fff; font-size:26px; line-height:1;
    box-shadow:0 6px 18px rgba(15,42,74,0.28); transition:filter 0.15s, transform 0.1s;
  }
  .fab-btn:hover{filter:brightness(1.15);}
  .fab-btn:active{transform:scale(0.95);}
  .fab-menu{
    display:flex; flex-direction:column; gap:6px; background:var(--branco);
    border:1px solid var(--cinza-claro); border-radius:12px; padding:10px; box-shadow:var(--shadow);
  }
  .fab-menu-item{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; text-align:left;
    padding:10px 14px; border-radius:8px; border:none; background:none; cursor:pointer;
    color:var(--verde-escuro); white-space:nowrap;
  }
  .fab-menu-item:hover{background:var(--cinza-bg);}

  /* seletor de nota da leitura de cocho */
  .nota-picker{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .nota-btn{
    display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:12px 6px; border-radius:8px; border:1.5px solid var(--cinza-claro); background:var(--branco);
    cursor:pointer; font-family:'Inter',sans-serif;
  }
  .nota-btn .n{font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:600; color:var(--verde-escuro);}
  .nota-btn .l{font-size:10.5px; color:var(--cinza); text-align:center; line-height:1.3;}
  .nota-btn.active{border-color:var(--verde-medio); background:var(--ok-bg);}

  /* painel de resultados (gráfico de rosca + legenda) */
  .painel-resultados{display:flex; gap:32px; align-items:center; flex-wrap:wrap;}
  .donut-wrap{flex-shrink:0;}
  .donut-svg{display:block;}
  .donut-slice{cursor:pointer; transition:opacity 0.15s;}
  .donut-slice:hover, .donut-slice.hover{opacity:0.82;}
  .donut-slice:focus{outline:2px solid var(--verde-medio); outline-offset:2px;}
  .donut-label{font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; fill:#fff; pointer-events:none;}
  .donut-center-value{font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:600; fill:var(--verde-escuro);}
  .donut-center-label{font-family:'Inter',sans-serif; font-size:10px; fill:var(--cinza); text-transform:uppercase; letter-spacing:0.5px;}
  .painel-legenda{flex:1; min-width:260px; display:flex; flex-direction:column; gap:2px;}
  .legenda-row{
    display:grid; grid-template-columns:12px 1fr auto auto; align-items:center; gap:10px;
    padding:7px 8px; border-radius:6px; cursor:pointer;
  }
  .legenda-row:hover, .legenda-row.hover{background:var(--cinza-bg);}
  .legenda-swatch{width:12px; height:12px; border-radius:3px;}
  .legenda-nome{font-size:13px; color:var(--grafite);}
  .legenda-valor{font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--grafite); font-variant-numeric:tabular-nums;}
  .legenda-pct{font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--cinza); min-width:48px; text-align:right; font-variant-numeric:tabular-nums;}
  .painel-tooltip{
    position:fixed; pointer-events:none; z-index:80; display:none; max-width:220px;
    background:var(--verde-escuro); color:#fff; padding:8px 12px; border-radius:8px;
    font-size:12.5px; box-shadow:0 6px 18px rgba(0,0,0,0.25);
  }
  .painel-tooltip .v{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:14px;}
  .painel-tooltip .l{font-size:11px; color:rgba(255,255,255,0.75); margin-top:2px;}

  /* ---------- DEMONSTRATIVO DESPESA x RECEITA ---------- */
  .demonstrativo-bars{display:flex; flex-direction:column; gap:14px; margin-bottom:18px;}
  .demo-bar-row{display:grid; grid-template-columns:70px 1fr 120px; align-items:center; gap:12px;}
  .demo-bar-label{font-size:12px; font-weight:600; color:var(--cinza); text-transform:uppercase; letter-spacing:0.5px;}
  .demo-bar-track{background:var(--cinza-claro); border-radius:20px; height:14px; overflow:hidden;}
  .demo-bar-fill{height:100%; border-radius:20px; transition:width 0.3s;}
  .demo-bar-despesa{background:var(--cinza);}
  .demo-bar-receita{background:var(--bom);}
  .demo-bar-valor{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--grafite); text-align:right; font-variant-numeric:tabular-nums;}
  .demo-resultado{
    display:flex; align-items:center; gap:10px; padding:14px 18px; border-radius:var(--radius);
  }
  .demo-resultado-ok{background:var(--bom-bg); color:var(--bom);}
  .demo-resultado-critico{background:var(--alerta-bg); color:var(--alerta);}
  .demo-resultado-icone{font-size:16px; line-height:1;}
  .demo-resultado-label{font-size:13px; font-weight:600; flex:1;}
  .demo-resultado-valor{font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:700;}

  /* ---------- LOGIN ---------- */
  .login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .login-card{background:var(--branco); border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,0.12); border:1px solid var(--cinza-claro); padding:40px 36px; width:100%; max-width:360px;}
  .login-brand{display:flex; align-items:center; gap:10px; margin-bottom:28px;}
  .login-brand .brand-name{color:var(--verde-escuro); font-family:'Fraunces',serif; font-weight:600; font-size:19px;}
  .login-field{margin-bottom:16px; display:flex; flex-direction:column; gap:5px;}
  .login-field input{width:100%;}
  .login-error{background:var(--alerta-bg); color:var(--alerta); font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:16px;}
  .login-btn{width:100%; margin-top:6px; justify-content:center;}
  .login-btn:disabled{opacity:0.6; cursor:default;}
  .login-loading{min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--cinza); font-size:14px;}

  /* ---------- USUÁRIO LOGADO (sidebar) ---------- */
  .sidebar-user{
    margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid rgba(255,255,255,0.12);
    display:flex; flex-direction:column; gap:8px; font-size:12.5px; color:rgba(255,255,255,0.85);
  }
  .sidebar-user-nome{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .sidebar-user-actions{display:flex; gap:8px;}
  .btn-sair{
    background:rgba(255,255,255,0.1); border:none; color:#fff; padding:6px 10px;
    border-radius:6px; font-size:11.5px; cursor:pointer; white-space:nowrap; flex:1;
  }
  .btn-sair:hover{background:rgba(255,255,255,0.2);}
  .btn-pendencias{
    background:rgba(201,138,43,0.22); border:1px solid rgba(201,138,43,0.5); color:#F5D9A8;
    padding:8px 10px; border-radius:8px; font-size:11.5px; font-weight:600; cursor:pointer;
    margin-bottom:14px; text-align:left; width:100%;
  }
  .btn-pendencias:hover{background:rgba(201,138,43,0.32);}

  /* ---------- ADMIN: MATRIZ DE PERMISSÕES ---------- */
  .perm-matrix{width:100%; border-collapse:collapse; font-size:13px;}
  .perm-matrix th, .perm-matrix td{padding:8px 10px; border-bottom:1px solid var(--cinza-claro); text-align:left;}
  .perm-matrix select{width:100%; padding:6px 8px; font-size:12.5px;}
  .status-dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px;}
  .status-dot.ativo{background:var(--bom);}
  .status-dot.inativo{background:var(--cinza);}

  /* ---------- RESPONSIVO (celular) ---------- */
  .mobile-nav-toggle{display:none;}
  @media (max-width:760px){
    .app{flex-direction:column;}
    .sidebar{
      width:100%; flex-direction:column; align-items:stretch;
      padding:12px 16px; gap:10px;
    }
    .brand{border-bottom:none; padding:0; margin-bottom:0;}
    .mobile-nav-toggle{
      display:flex; align-items:center; justify-content:space-between; gap:8px;
      width:100%; background:rgba(255,255,255,0.08); color:var(--branco);
      border:none; border-radius:8px; padding:11px 14px; font-size:14px; font-weight:600;
      cursor:pointer; font-family:'Inter',sans-serif;
    }
    .mobile-nav-toggle-label{display:flex; align-items:center; gap:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
    .mobile-nav-toggle-chevron{flex-shrink:0; transition:transform 0.15s;}
    .mobile-nav-toggle.open .mobile-nav-toggle-chevron{transform:rotate(180deg);}
    nav{display:none; margin-top:0; flex-direction:column; gap:2px;}
    nav.nav-open{display:flex;}
    .nav-item{padding:10px 12px; font-size:14px;}
    .sidebar-footer{display:none;}
    .sidebar-user{margin-bottom:0; padding-bottom:0; border-bottom:none;}
    .main{padding:20px 16px 48px 16px; max-width:100%;}
    .page-header{flex-direction:column; align-items:flex-start; gap:14px;}
    h1{font-size:23px;}
    .btn{width:100%; justify-content:center;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .toolbar{flex-direction:column; align-items:stretch;}
    .search{width:100%;}
    .card{overflow-x:auto; -webkit-overflow-scrolling:touch;}
    .field-row{grid-template-columns:1fr;}
    .composicao-row{grid-template-columns:1fr 68px 28px; gap:6px;}
    .overlay{padding:16px 10px;}
    .diet-metrics{flex-wrap:wrap; gap:10px 16px; justify-content:flex-end;}
    .diet-head{flex-direction:column; align-items:flex-start; gap:10px;}
    .fab-wrap{bottom:18px; right:18px;}
    .fab-btn{width:50px; height:50px; font-size:24px;}
    .painel-resultados{flex-direction:column; align-items:stretch;}
    .donut-wrap{align-self:center;}

/* ===================== AUTENTICAÇÃO E PERMISSÕES ===================== */
const DOMINIO_LOGIN = 'aeagropecuaria.local';
const MODULOS_GROUP = {insumos:'insumos', dietas:'dietas', confinamento:'confinamento', pasto:'pasto', reproducao:'cria', financeiro:'financeiro', resultados:'resultados'};
// tipo (mesma chave usada por loteTipo()) -> rótulo de tela e módulo de permissão
const TIPO_PESAGEM_LABEL = {confinamento:'Confinamento', pasto:'Pasto', reproducao:'Cria'};
const TIPO_MODULO = {confinamento:'confinamento', pasto:'pasto', reproducao:'cria'};
const DIETA_TIPO_LABEL = {confinamento:'Confinamento', cria:'Cria', pasto:'Pasto'};
const ACAO_MODULOS = {
  ingrediente:['insumos'], movimento:['insumos'],
  dieta:['dietas'], producaoRacao:['dietas'],
  lote:['confinamento','pasto','cria'],
  saidaRacao:['confinamento'], cocho:['confinamento'],
  pasto:['pasto'],
  saidaRacaoCria:['cria'], reproducaoCusto:['cria'], parto:['cria'],
  pesagem:['confinamento','pasto','cria'],
  custoFixo:['financeiro'], precoArroba:['financeiro'],
  receita:['resultados'], metaMargem:['resultados'], investimento:['resultados'],
};

function normalizeUsuario(s){ return String(s||'').trim().toLowerCase().replace(/[^a-z0-9._-]/g,''); }
function souAdmin(){ return state.perfil?.papel === 'admin' || state.perfil?.papel === 'proprietario'; }
// criar lote é restrito por cargo (não pela tabela de permissões por módulo): Colaborador nunca pode.
function podeCriarLote(){ return souAdmin() || state.perfil?.papel === 'consultor'; }
function temPermissao(modulo, nivel){
  if(!state.perfil) return false;
  if(souAdmin()) return true;
  const atual = state.perfil.permissoes?.[modulo];
  if(nivel==='visualizar') return atual==='visualizar' || atual==='editar';
  return atual==='editar';
}
function podeEditarAcao(type){
  return (ACAO_MODULOS[type]||[]).some(m=>temPermissao(m,'editar'));
}
// Venda (abate, venda por animal ou por kg) lança uma Receita
// automaticamente (módulo Resultados, mantido separado do resto de
// propósito pra controlar quem vê receita/resultado da operação) — por
// isso exige editar tanto no módulo do lote (Confinamento/Pasto/Cria)
// quanto em Resultados, não só um dos dois.
function podeRegistrarVenda(tipo){
  return temPermissao(TIPO_MODULO[tipo],'editar') && temPermissao('resultados','editar');
}
function grupoVisivel(key){
  if(key==='admin') return souAdmin();
  if(key==='lotesGeral') return souAdmin() || state.perfil?.papel==='consultor';
  if(key==='fazenda') return souAdmin();
  if(key==='vendas') return temPermissao('confinamento','visualizar') || temPermissao('pasto','visualizar') || temPermissao('cria','visualizar');
  return temPermissao(MODULOS_GROUP[key], 'visualizar');
}
function gruposVisiveis(){
  return Object.entries(GROUPS).filter(([key])=>grupoVisivel(key));
}
function primeiraPaginaVisivel(){
  const grupos = gruposVisiveis();
  return grupos[0] ? grupos[0][1].pages[0].key : null;
}

// Perfil (nome/papel/permissões) fica salvo neste aparelho depois de toda
// busca com sucesso — se depois a busca falhar por falta de conexão (não
// por um erro real, tipo perfil removido), usamos o último salvo em vez de
// mostrar "sem acesso liberado" pra quem só está sem sinal.
const PERFIL_CACHE_KEY = 'aepecuaria_perfil_cache_v1';
function lerPerfilCache(uid){
  try{
    const cache = JSON.parse(localStorage.getItem(PERFIL_CACHE_KEY)||'null');
    return (cache && cache.uid===uid) ? cache.perfil : null;
  }catch(e){ return null; }
}
function salvarPerfilCache(uid, perfil){
  try{ localStorage.setItem(PERFIL_CACHE_KEY, JSON.stringify({uid, perfil})); }
  catch(e){ /* localStorage indisponível (modo privado etc.) — sem o que fazer aqui */ }
}
async function loadPerfil(){
  const uid = state.session?.user?.id;
  if(!uid){ state.perfil = null; state.perfilErroRede = false; return; }
  const { data, error } = await db.from('profiles').select('*').eq('id', uid).single();
  state.perfilErroRede = false;
  if(data){
    state.perfil = rowToPerfil(data);
    salvarPerfilCache(uid, state.perfil);
  } else if(error && pareceErroDeRede(error)){
    const cache = lerPerfilCache(uid);
    if(cache){ state.perfil = cache; }
    else { state.perfil = null; state.perfilErroRede = true; }
  } else {
    state.perfil = null;
  }
  if(state.perfil && state.perfil.ativo && !gruposVisiveis().some(([k])=>k===currentGroupKey())){
    const primeira = primeiraPaginaVisivel();
    if(primeira) state.page = primeira;
  }
}

async function initAuth(){
  const { data } = await db.auth.getSession();
  state.session = data.session;
  if(state.session) await loadPerfil();
  state.authChecked = true;
  render();
  if(state.session && state.perfil?.ativo) loadAll();

  let primeiroEvento = true;
  db.auth.onAuthStateChange(async (event, newSession)=>{
    // o primeiro disparo (INITIAL_SESSION) já foi tratado acima; e o disparo
    // logo após o login manual também já foi tratado em fazerLogin()
    if(primeiroEvento){ primeiroEvento = false; return; }
    if(event==='SIGNED_IN' && state.session?.access_token===newSession?.access_token) return;
    state.session = newSession;
    if(newSession){
      await loadPerfil();
      render();
      if(state.perfil?.ativo) loadAll();
    } else {
      state.perfil = null;
      render();
    }
  });
}

async function fazerLogin(){
  const usuario = normalizeUsuario(state.loginDraft.usuario);
  const senha = state.loginDraft.senha;
  if(!usuario || !senha){ state.loginError = 'Informe usuário e senha.'; render(); return; }
  state.loginLoading = true; state.loginError = ''; render();
  const email = `${usuario}@${DOMINIO_LOGIN}`;
  const { data, error } = await db.auth.signInWithPassword({ email, password: senha });
  state.loginLoading = false;
  if(error){
    state.loginError = 'Usuário ou senha inválidos.';
    render();
    return;
  }
  state.session = data.session;
  await loadPerfil();
  state.loginDraft = {usuario:'', senha:''};
  render();
  if(state.perfil?.ativo) loadAll();
}

async function fazerLogout(){
  await db.auth.signOut();
  state.session = null;
  state.perfil = null;
  state.page = 'financeiroResumo';
  render();
}

          <input type="text" autocomplete="username" data-login-usuario="1" value="${state.loginDraft.usuario}" autofocus />
        </div>

/* ===================== HELPERS ===================== */
function fmt(n, dec=2){ return Number(n||0).toLocaleString('pt-BR', {minimumFractionDigits:dec, maximumFractionDigits:dec}); }
function fmtInt(n){ return Number(n||0).toLocaleString('pt-BR'); }
// Valida campos obrigatórios de um lançamento antes de salvar — campos:
// [[valorBruto, rótulo], ...]. Barra o salvamento com um alerta claro se
// algum estiver em branco (observação nunca entra aqui, é sempre opcional).
function validarObrigatorios(campos){
  for(const [valor, rotulo] of campos){
    if(valor===null || valor===undefined || String(valor).trim()===''){
      alert(`Preencha o campo "${rotulo}" antes de salvar.`);
      return false;
    }
  }
  return true;
}
function getIng(id){ return state.ingredientes.find(i=>i.id===Number(id)); }

/* ===================== FILA OFFLINE (lançamentos sem sinal) ===================== */
// Lançamentos de campo (ração, cocho, pasto, reprodução, parto, pesagem) não
// podem se perder quando não há sinal de internet no curral/pasto. Se o
// salvamento falhar por causa de rede (não por um erro real do servidor),
// o lançamento é guardado neste aparelho (localStorage) e reenviado
// automaticamente assim que a conexão voltar — nunca fica só na memória,
// senão se perderia ao fechar a aba antes de sincronizar.
const FILA_OFFLINE_KEY = 'aepecuaria_fila_offline_v1';
const LANCAMENTO_LABEL = {
  saidaRacao:'Saída de ração', saidaRacaoCria:'Saída de ração (Cria)', cocho:'Leitura de cocho',
  pasto:'Reposição de pasto', reproducaoCusto:'Lançamento de reprodução', parto:'Parto', pesagem:'Pesagem',
};
function lerFilaOffline(){
  try{ return JSON.parse(localStorage.getItem(FILA_OFFLINE_KEY)||'[]'); }
  catch(e){ return []; }
}
function salvarFilaOffline(fila){
  try{ localStorage.setItem(FILA_OFFLINE_KEY, JSON.stringify(fila)); }
  catch(e){ /* localStorage indisponível (modo privado etc.) — sem o que fazer aqui */ }
}
function enfileirarLancamento(type, campos){
  const lote = campos.loteId ? state.lotes.find(l=>l.id===campos.loteId) : null;
  const fila = lerFilaOffline();
  fila.push({
    queueId: `${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
    type, campos,
    label: `${LANCAMENTO_LABEL[type]||type}${lote?' · '+lote.nome:''}`,
    criadoEm: new Date().toISOString(),
  });
  salvarFilaOffline(fila);
}
// Distingue "sem conexão" (vale a pena guardar e tentar de novo depois) de
// um erro real do servidor (dado inválido, RLS etc. — tentar de novo não
// vai resolver, então não faz sentido enfileirar).
function pareceErroDeRede(err){
  if(typeof navigator!=='undefined' && navigator.onLine===false) return true;
  if(err && err.name==='TypeError') return true;
  const msg = String((err && err.message) || err || '').toLowerCase();
  return msg.includes('failed to fetch') || msg.includes('network') || msg.includes('load failed') || msg.includes('conexão');
}
// Executa de fato o insert (+ efeitos colaterais, como descontar estoque) de
// um lançamento novo — usado tanto pelo salvamento normal quanto por essa
// mesma função sendo chamada de novo depois, ao sincronizar a fila.
// Nome de quem está logado no momento do lançamento — grava em cada
// lançamento de campo pra saber quem fez, sem afetar edições posteriores
// (só o insert grava; editar não troca o autor original).
function autorAtual(){ return state.perfil?.nome || state.perfil?.usuario || null; }
async function executarInsertLancamento(type, campos){
  if(type==='saidaRacao'){
    // Confinamento: a ração é formulada e servida na hora (sem virar um lote
    // guardado) — desconta o ingrediente cru direto, igual antes de existir
    // o estoque de ração pronta (que só faz sentido pra dieta produzida em
    // lote e guardada, como a da Cria).
    const dieta = state.dietas.find(x=>x.id===campos.dietaId);
    const row = {data:campos.data, dieta_id:campos.dietaId, lote_id:campos.loteId, quantidade_kg:campos.quantidadeKg, criado_por:autorAtual(), criado_em:new Date().toISOString()};
    const res = await db.from('saidas_racao').insert(row).select().single();
    if(res.error) return {error:res.error};
    const saidaId = res.data.id;
    if(dieta){
      const movs = dieta.itens.filter(it=>it.ingredienteId).map(it=>{
        const ing = getIng(it.ingredienteId);
        const consumoKg = campos.quantidadeKg*it.pct/100;
        return {data:campos.data, ingrediente_id:it.ingredienteId, tipo:'saida', quantidade:kgParaUnidade(consumoKg, ing?.unidade), saida_racao_id:saidaId};
      });
      if(movs.length){
        const {error} = await db.from('movimentos').insert(movs);
        if(error) return {error};
      }
    }
    return {error:null};
  }
  if(type==='saidaRacaoCria'){
    // Cria: a ração é produzida em lote e guardada (estoque de ração
    // pronta) — a Saída de Ração só consome desse estoque; quem desconta o
    // ingrediente cru é a Produção de Ração.
    const row = {data:campos.data, dieta_id:campos.dietaId, lote_id:campos.loteId, quantidade_kg:campos.quantidadeKg, criado_por:autorAtual(), criado_em:new Date().toISOString()};
    const {error} = await db.from('saidas_racao').insert(row);
    return {error};
  }
  if(type==='cocho'){
    const {error} = await db.from('leituras_cocho').insert({...leituraCochoToRow(campos), criado_por:autorAtual()});
    return {error};
  }
  if(type==='pasto'){
    const row = {data:campos.data, lote_id:campos.loteId, dieta_id:campos.dietaId, quantidade:campos.quantidade, criado_por:autorAtual()};
    const {error} = await db.from('pasto').insert(row);
    return {error};
  }
  if(type==='producaoRacao'){
    const dieta = state.dietas.find(x=>x.id===campos.dietaId);
    const row = {data:campos.data, dieta_id:campos.dietaId, quantidade_kg:campos.quantidadeKg, criado_por:autorAtual()};
    const res = await db.from('producoes_racao').insert(row).select().single();
    if(res.error) return {error:res.error};
    const producaoId = res.data.id;
    if(dieta){
      const movs = dieta.itens.filter(it=>it.ingredienteId).map(it=>{
        const ing = getIng(it.ingredienteId);
        const consumoKg = campos.quantidadeKg*it.pct/100;
        return {data:campos.data, ingrediente_id:it.ingredienteId, tipo:'saida', quantidade:kgParaUnidade(consumoKg, ing?.unidade), producao_racao_id:producaoId};
      });
      if(movs.length){
        const {error} = await db.from('movimentos').insert(movs);
        if(error) return {error};
      }
    }
    return {error:null};
  }
  if(type==='venda'){
    const lote = state.lotes.find(l=>l.id===campos.loteId);
    const row = {...vendaToRow(campos), criado_por:autorAtual()};
    const res = await db.from('abates').insert(row).select().single();
    if(res.error) return {error:res.error};
    const vendaId = res.data.id;
    const arrobas = campos.tipoVenda==='arroba' ? arrobasVenda(campos) : null;
    const valorTotal = valorVenda(campos);
    const descricao = `${TIPO_VENDA_LABEL[campos.tipoVenda]||'Venda'} — ${lote?lote.nome:'Lote'} (${fmtInt(campos.quantidade)} animais)`;
    const receitaRow = {data:campos.data, lote_id:campos.loteId, descricao, arrobas, valor:valorTotal, observacao:'', abate_id:vendaId};
    const {error:errReceita} = await db.from('receitas').insert(receitaRow);
    if(errReceita) return {error:errReceita};
    if(lote){
      const novoNumero = Math.max(0, Number(lote.numeroAnimais||0) - Number(campos.quantidade||0));
      const updLote = {numero_animais: novoNumero};
      if(novoNumero===0 && !lote.dataFim) updLote.data_fim = campos.data;
      const {error:errLote} = await db.from('lotes').update(updLote).eq('id', lote.id);
      if(errLote) return {error:errLote};
    }
    return {error:null};
  }
  if(type==='reproducaoCusto'){
    const {error} = await db.from('reproducao_custos').insert({...reproducaoCustoToRow(campos), criado_por:autorAtual()});
    return {error};
  }
  if(type==='parto'){
    const {error} = await db.from('partos').insert({...partoToRow(campos), criado_por:autorAtual()});
    return {error};
  }
  if(type==='pesagem'){
    const {error} = await db.from('pesagens').insert({...pesagemToRow(campos), criado_por:autorAtual()});
    return {error};
  }
  return {error:{message:'Tipo de lançamento desconhecido: '+type}};
}
// Tenta salvar de verdade; se falhar por rede, guarda na fila offline em vez
// de mostrar erro — do ponto de vista de quem está usando, "salvou" mesmo
// assim (só que localmente, até a internet voltar).
async function salvarOuEnfileirar(type, campos){
  try{
    const resultado = await executarInsertLancamento(type, campos);
    if(!resultado.error) return {ok:true};
    if(pareceErroDeRede(resultado.error)){
      enfileirarLancamento(type, campos);
      return {ok:true, enfileirado:true};
    }
    return {ok:false, error:resultado.error};
  } catch(err){
    if(pareceErroDeRede(err)){
      enfileirarLancamento(type, campos);
      return {ok:true, enfileirado:true};
    }
    return {ok:false, error:err};
  }
}
let sincronizandoFila = false;
async function tentarSincronizarFila(){
  if(sincronizandoFila) return;
  const filaInicial = lerFilaOffline();
  if(filaInicial.length===0) return;
  if(typeof navigator!=='undefined' && navigator.onLine===false) return;
  sincronizandoFila = true;
  const pendentes = [...filaInicial];
  const falhasReais = [];
  let algumSucesso = false;
  let i = 0;
  while(i < pendentes.length){
    const item = pendentes[i];
    let resultado;
    try{
      resultado = await executarInsertLancamento(item.type, item.campos);
    } catch(err){
      resultado = {error: err};
    }
    if(!resultado.error){
      pendentes.splice(i,1);
      algumSucesso = true;
    } else if(pareceErroDeRede(resultado.error)){
      break; // ainda sem sinal — para por aqui, mantém esse e os seguintes na fila
    } else {
      falhasReais.push(item.label);
      pendentes.splice(i,1); // erro real do servidor: não adianta insistir
    }
  }
  salvarFilaOffline(pendentes);
  sincronizandoFila = false;
  if(algumSucesso) await loadAll(); else render();
  if(falhasReais.length>0){
    alert(`Alguns lançamentos pendentes não puderam ser enviados e foram descartados da fila (dado inválido ou registro relacionado removido):\n\n${falhasReais.join('\n')}\n\nSerá preciso lançar de novo.`);
  }
}

// Traduz o destino explícito do lote (aba Lotes) para a chave interna usada nas páginas ('reproducao' = Cria).
function loteTipo(lote){
  return lote.destino==='cria' ? 'reproducao' : (lote.destino||'pasto');
}

// "Preço por kg" é sempre por quilo; quantidades guardadas em "ton" precisam
// ser convertidas para kg antes de multiplicar pelo preço.
function qtdEmKg(qtd, unidade){ return unidade==='ton' ? Number(qtd||0)*1000 : Number(qtd||0); }
function kgParaUnidade(qtdKg, unidade){ return unidade==='ton' ? qtdKg/1000 : qtdKg; }

function saldoIngrediente(id){
  let saldo = 0;
  state.movimentos.filter(m=>m.ingredienteId===id).forEach(m=>{
    saldo += m.tipo==='entrada' ? m.quantidade : -m.quantidade;
  });
  return saldo;
}

// Dietas que fazem sentido controlar por estoque de ração pronta (produzida
// em lote e guardada — Cria, Pasto). Confinamento é formulado e servido na
// hora, sem virar um lote guardado, então não entra aqui.
function dietasComEstoquePronto(){
  return state.dietas.filter(d=>d.tipo!=='confinamento');
}

// Estoque (kg) de ração já pronta/misturada de uma dieta: soma das produções
// registradas menos o que já foi consumido (Saída de Ração ou Pasto que
// usaram essa dieta). A produção é quem desconta o ingrediente cru do
// estoque (ver executarInsertLancamento) — o consumo diário só desconta
// daqui, sem tocar o estoque de ingrediente de novo.
function estoqueRacaoPronta(dietaId){
  const produzido = state.producoesRacao.filter(p=>p.dietaId===dietaId).reduce((a,p)=>a+Number(p.quantidadeKg||0),0);
  const consumidoRacao = state.saidasRacao.filter(s=>s.dietaId===dietaId).reduce((a,s)=>a+Number(s.quantidadeKg||0),0);
  const consumidoPasto = state.pasto.filter(p=>p.dietaId===dietaId).reduce((a,p)=>a+Number(p.quantidade||0),0);
  return produzido - consumidoRacao - consumidoPasto;
}

/* ===================== PÁGINA: DIETAS ===================== */
function calcDieta(d){
  let ms=0, pb=0, ndt=0, custoKg=0, pctTotal=0;
  d.itens.forEach(it=>{
    const ing = getIng(it.ingredienteId);
    if(!ing) return;
    const frac = it.pct/100;
    ms += ing.ms*frac;
    pb += ing.pb*frac;
    ndt += ing.ndt*frac;
    custoKg += ing.precoKg*frac;
    pctTotal += it.pct;
  });
  return {ms, pb, ndt, custoKg, pctTotal, custoAnimalDia: custoKg*d.kgAnimalDia};
}

// Se a composição de uma dieta não soma 100%, todo lançamento que a usa
// (Saída de Ração, Produção de Ração, Pasto) desconta só a fração
// correspondente do estoque de ingrediente cru — ex: composição somando
// 60% desconta só 60% da quantidade de ração realmente lançada, deixando
// "sobrar" ingrediente no estoque que na verdade já foi consumido. Por
// isso lançamentos com uma dieta incompleta são bloqueados. Soma o
// percentual direto de dieta.itens (não usa calcDieta/pctTotal, que
// ignora item cujo ingrediente foi excluído — aqui o que importa é só a
// soma dos percentuais cadastrados, não se o ingrediente ainda existe).
function composicaoIncompleta(dietaId){
  const dieta = state.dietas.find(d=>d.id===dietaId);
  if(!dieta) return null;
  const pctTotal = dieta.itens.reduce((a,it)=>a+Number(it.pct||0),0);
  return Math.abs(pctTotal-100)>0.01 ? {dieta, pctTotal} : null;
}

  return state.dietas.map(d=>{
    const c = calcDieta(d);
    const open = state.openDietId===d.id;
    return `
    <div class="diet-card">

/* ===================== PÁGINA: ESTOQUE DE RAÇÃO (produto pronto) ===================== */
function PageEstoqueRacao(){
  const dietasEstocaveis = dietasComEstoquePronto();
  if(dietasEstocaveis.length===0){
    return `<div class="card">${Empty('Nenhuma dieta de Cria ou Pasto formulada','O estoque de ração pronta vale pra dieta produzida em lote e guardada (Cria, Pasto) — Confinamento é formulado e servido na hora, sem entrar aqui.')}</div>`;
  }
  const rows = dietasEstocaveis.map(d=>{
    const saldo = estoqueRacaoPronta(d.id);
    const min = Number(d.estoqueMinPronta||0);
    const pctMin = min>0 ? Math.min(saldo/(min*2),1) : 1;
    const baixo = min>0 && saldo < min;
    return {d, saldo, min, pctMin, baixo};
  });
  const alertas = rows.filter(r=>r.baixo).length;
  const producoesRows = [...state.producoesRacao].sort((a,b)=> b.data.localeCompare(a.data) || b.id-a.id).slice(0,8);

  return `
  <p class="hint" style="margin:0 0 14px;">Vale pra dieta produzida em lote e guardada (Cria, Pasto) — Confinamento é formulado e servido na hora, sem passar por aqui.</p>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-label">Dietas com estoque de ração pronta</div><div class="stat-value">${dietasEstocaveis.length}</div></div>
    <div class="stat-card"><div class="stat-label">Alertas de estoque baixo</div><div class="stat-value ${alertas>0?'alerta':''}">${alertas}</div></div>
    <div class="stat-card"><div class="stat-label">Produções registradas</div><div class="stat-value">${state.producoesRacao.length}</div></div>
  </div>

  <div class="card" style="margin-bottom:22px;">
    <table>
      <thead><tr><th>Nível</th><th>Dieta</th><th>Estoque pronto</th><th>Mínimo</th><th>Status</th></tr></thead>
      <tbody>
        ${rows.map(r=>`
          <tr>
            <td><div class="silo-wrap"><div class="silo"><div class="silo-fill ${r.baixo?'alerta':''}" style="height:${Math.round(r.pctMin*100)}%"></div></div></div></td>
            <td><strong>${r.d.nome}</strong> <span class="pill ${r.d.tipo==='pasto'?'pill-warn':r.d.tipo==='cria'?'pill-cat':'pill-ok'}">${DIETA_TIPO_LABEL[r.d.tipo]||'Confinamento'}</span></td>
            <td class="mono">${fmtInt(r.saldo)} kg</td>
            <td class="mono">${r.min>0 ? fmtInt(r.min)+' kg' : '—'}</td>
            <td>${r.baixo ? '<span class="pill pill-alerta">Estoque baixo</span>' : '<span class="pill pill-ok">Normal</span>'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  </div>
  <p class="hint" style="margin:-14px 0 22px;">O estoque pronto sobe quando você registra uma "Produção de ração" (desconta os ingredientes da composição) e desce automaticamente com cada Saída de Ração ou reposição de Pasto lançada dessa dieta.</p>

  <p class="eyebrow" style="margin-bottom:10px;">Últimas produções</p>
  <div class="card">
    ${producoesRows.length===0 ? Empty('Nenhuma produção registrada','Registre uma produção de ração pra abastecer o estoque de uma dieta.') : `
    <table>
      <thead><tr><th>Data</th><th>Dieta</th><th>Quantidade</th><th></th></tr></thead>
      <tbody>
        ${producoesRows.map(p=>{
          const dieta = state.dietas.find(x=>x.id===p.dietaId);
          return `<tr>
            <td class="mono">${p.data.split('-').reverse().join('/')}</td>
            <td>${dieta?dieta.nome:'—'}</td>

              ${temPermissao('dietas','editar') ? `

}

// Descreve o preço de uma venda de acordo com o tipo, já que os campos que
// importam mudam (peso+arroba / só valor por animal / peso+valor do kg).
function detalhePrecoVenda(v){
  if(v.tipoVenda==='cabeca') return `R$ ${fmt(v.valorPorAnimal)} / animal`;
  if(v.tipoVenda==='kg') return `${fmt(Number(v.pesoMedioKg),1)} kg vivo × R$ ${fmt(v.valorKg)}/kg`;
  return `${fmt(arrobasVenda(v),2)} @ (${fmt(Number(v.pesoMedioKg),1)} kg carcaça) × R$ ${fmt(v.valorArroba)}/@`;
}

// Painel de resultado dos lotes: resumo (peso inicial x atual, ganho,
// GMD médio e @ produzidas) de cada lote lado a lado, sem precisar
// escolher/filtrar um lote de cada vez pra ver o resultado.
function PainelResultadoLotes(lotesTipo){
  const linhas = lotesTipo.map(l=>{
    const historico = pesagensDoLote(l.id);
    if(historico.length===0) return {lote:l, semDados:true};
    const primeira = historico[0], ultima = historico[historico.length-1];
    const ganhoTotal = Number(ultima.pesoMedioKg) - Number(primeira.pesoMedioKg);
    const gmdMedio = gmdEntre(Number(primeira.pesoMedioKg), Number(ultima.pesoMedioKg), primeira.data, ultima.data);
    const arrobaPorAnimal = ganhoTotal/KG_POR_ARROBA;
    const arrobaTotal = arrobaPorAnimal * Number(l.numeroAnimais||0);
    return {lote:l, semDados:false, primeira, ultima, ganhoTotal, gmdMedio, arrobaTotal};
  });
  return `
  <div class="card">
    <table>
      <thead><tr>
        <th>Lote</th><th>Nº animais</th><th>Peso inicial</th><th>Peso atual</th><th>Ganho no período</th><th>GMD médio</th><th>@ produzidas</th>
      </tr></thead>
      <tbody>
        ${linhas.map(r=>`
          <tr>
            <td><strong>${r.lote.nome}</strong></td>
            <td class="mono">${fmtInt(r.lote.numeroAnimais)}</td>
            ${r.semDados ? `<td class="mono" colspan="5">Nenhuma pesagem registrada ainda</td>` : `
            <td class="mono">${fmt(Number(r.primeira.pesoMedioKg),1)} kg <span class="hint">(${r.primeira.data.split('-').reverse().join('/')})</span></td>
            <td class="mono">${fmt(Number(r.ultima.pesoMedioKg),1)} kg <span class="hint">(${r.ultima.data.split('-').reverse().join('/')})</span></td>
            <td class="mono">${r.ganhoTotal>=0?'+':''}${fmt(r.ganhoTotal,1)} kg</td>
            <td class="mono">${r.gmdMedio!==null?fmt(r.gmdMedio,3)+' kg/dia':'—'}</td>
            <td class="mono">${fmt(r.arrobaTotal,1)} @</td>
            `}
          </tr>
        `).join('')}
      </tbody>
    </table>
  </div>
  <p class="hint" style="margin:10px 0 18px;">Ganho e @ produzidas contam desde a primeira pesagem lançada de cada lote até a mais recente. 1 @ ≈ ${KG_POR_ARROBA} kg de peso vivo ganho.</p>`;
}

function custoSaidaRacao(s){

  return dieta ? calcDieta(dieta).custoKg * s.quantidadeKg : 0;
}
function hojeStr(){ return new Date().toISOString().slice(0,10); }
function mesAtualStr(){ return new Date().toISOString().slice(0,7); }

/* paleta categórica validada (fixa, nunca ciclada) */
const SERIES_COLORS = ['#2a78d6','#008300','#e87ba4','#eda100','#1baf7a','#eb6834','#4a3aa7','#e34948'];

// A cor segue sempre a mesma categoria (nunca a posição no ranking do mês),
// para não trocar de cor quando um custo cresce/encolhe em relação aos outros.
// São dois gráficos com jobs diferentes — não fazem sentido misturados no
// mesmo painel: um compara as áreas de produção (Confinamento/Pasto/Cria),
// o outro compara os centros de custo fixo (Pessoal, Manutenção etc.).
const AREAS_PRODUCAO = ['Confinamento','Pasto','Cria'];
function coresPorArea(){
  const mapa = {};
  AREAS_PRODUCAO.forEach((nome,idx)=>{ mapa[nome] = SERIES_COLORS[idx]; });
  return mapa;
}
// No painel global, Confinamento/Pasto/Cria têm cor fixa reservada (mesma dos
// outros gráficos); as categorias de custo fixo (texto livre) recebem uma cor
// por ordem alfabética nos slots restantes, sem repetir cor entre elas.
// Centros de custo fixo têm cor própria (ordem alfabética) — não precisam
// reservar slots para Confinamento/Pasto/Cria porque esse gráfico não mistura
// os dois eixos (área x centro de custo): cada real do custo fixo pertence a
// exatamente uma categoria aqui, sem sobrepor com o gráfico de área.
function coresPorCentroCusto(nomes){
  const mapa = {};
  const unicos = [...new Set(nomes)].sort();
  unicos.forEach((nome,idx)=>{ mapa[nome] = SERIES_COLORS[idx % SERIES_COLORS.length]; });
  return mapa;
}

// Cada área (Confinamento/Pasto/Cria) já vem com o custo fixo diluído por
// cabeça somado (mesmo critério do Por Curral), então as 3 fatias juntas
// somam 100% do custo total do mês — sem precisar repetir os centros de
// custo fixo como fatias à parte.
function composicaoPorArea(confMes, pastoMes, criaMes, detalhesPorArea){
  detalhesPorArea = detalhesPorArea || {confinamento:[], pasto:[], cria:[]};
  const grupos = {};
  if(confMes>0) grupos['Confinamento'] = {valor:confMes, itens:detalhesPorArea.confinamento};
  if(pastoMes>0) grupos['Pasto'] = {valor:pastoMes, itens:detalhesPorArea.pasto};
  if(criaMes>0) grupos['Cria'] = {valor:criaMes, itens:detalhesPorArea.cria};
  let entries = Object.entries(grupos).map(([nome,g])=>({nome, valor:g.valor, itens:g.itens}));
  entries.sort((a,b)=>b.valor-a.valor);
  const cores = coresPorArea();
  const total = entries.reduce((a,e)=>a+e.valor,0);
  return entries.map(e=>({...e, pct: total>0 ? e.valor/total*100 : 0, cor: cores[e.nome]}));
}

// Painel de despesas por centro de custo — só o que está cadastrado em
// Despesas, sem misturar com o lançamento diário de ração/pasto/cria (que
// é custo operacional do dia a dia, já mostrado em Financeiro).
// Nutrição Animal nunca some dentro de "Outros", mesmo fora do top 7 — é um
// centro de custo que a operação quer acompanhar sempre.
const CENTRO_CUSTO_SEMPRE_VISIVEL = ['Nutrição Animal'];

function composicaoCentrosCusto(custosFixos, extras){
  const grupos = {};
  custosFixos.forEach(c=>{
    const cat = (c.categoria||'').trim() || 'Outros';
    if(!grupos[cat]) grupos[cat] = {valor:0, itens:[]};
    grupos[cat].valor += Number(c.valorMensal||0);
    grupos[cat].itens.push({id:c.id, nome:c.nome, mes:c.mes, valor:Number(c.valorMensal||0)});
  });
  (extras||[]).forEach(e=>{
    if(!grupos[e.nome]) grupos[e.nome] = {valor:0, itens:[]};
    grupos[e.nome].valor += Number(e.valor||0);
  });
  let entries = Object.entries(grupos).map(([nome,g])=>({nome, valor:g.valor, itens:g.itens})).filter(e=>e.valor>0);
  entries.sort((a,b)=>b.valor-a.valor);
  if(entries.length>8){
    const fixas = entries.filter(e=>CENTRO_CUSTO_SEMPRE_VISIVEL.includes(e.nome));
    const resto = entries.filter(e=>!CENTRO_CUSTO_SEMPRE_VISIVEL.includes(e.nome));
    const vagas = Math.max(0, 7-fixas.length);
    const principais = resto.slice(0, vagas);
    const dobra = resto.slice(vagas);
    const restoValor = dobra.reduce((a,e)=>a+e.valor,0);
    const restoItens = [].concat(...dobra.map(e=>e.itens));
    entries = [...fixas, ...principais];
    if(restoValor>0) entries.push({nome:'Outros', valor:restoValor, itens:restoItens});
    entries.sort((a,b)=>b.valor-a.valor);
  }
  const cores = coresPorCentroCusto(entries.map(e=>e.nome));
  const total = entries.reduce((a,e)=>a+e.valor,0);
  return entries.map(e=>({...e, pct: total>0 ? e.valor/total*100 : 0, cor: cores[e.nome]}));
}

function polarXY(cx, cy, r, ang){ return [cx + r*Math.sin(ang), cy - r*Math.cos(ang)]; }
function donutSlicePath(cx, cy, rOut, rIn, a0, a1){
  const largeArc = (a1-a0) > Math.PI ? 1 : 0;
  const [x0,y0] = polarXY(cx,cy,rOut,a0);
  const [x1,y1] = polarXY(cx,cy,rOut,a1);
  const [x2,y2] = polarXY(cx,cy,rIn,a1);
  const [x3,y3] = polarXY(cx,cy,rIn,a0);
  return `M ${x0} ${y0} A ${rOut} ${rOut} 0 ${largeArc} 1 ${x1} ${y1} L ${x2} ${y2} A ${rIn} ${rIn} 0 ${largeArc} 0 ${x3} ${y3} Z`;
}

// O total usado pro donut (ângulo das fatias e valor no centro) vem sempre
// da soma das próprias entries — nunca de um total externo — pra garantir
// que as fatias sempre fechem o círculo e batam com os % da legenda, mesmo
// que o chamador tenha um "total geral" que inclua algo fora dessas entries
// (ex: um custo fixo não diluído por área, que não aparece no gráfico "por área").
function PainelResultados(entries, panelId, eyebrow, titulo, vazioMsg, labelPeriodo){
  labelPeriodo = labelPeriodo || 'no mês';
  // Guarda os dados desse painel (com o detalhe despesa-por-despesa de cada
  // fatia) pra o clique numa fatia/linha da legenda poder abrir o detalhe —
  // a única forma de recuperar isso depois, já que o SVG em si só tem o
  // índice da fatia, não os dados.
  state.paineisResultadosDados[panelId] = entries;
  if(entries.length===0){
    return `<div class="card" style="margin-bottom:22px;">${Empty(`Sem custos ${labelPeriodo==='no ano'?'no ano':'no mês'} para compor o gráfico`, vazioMsg)}</div>`;
  }
  const totalPeriodo = entries.reduce((a,e)=>a+e.valor,0);
  const cx=110, cy=110, rOut=100, rIn=64;
  const gap = entries.length>1 ? 0.025 : 0;
  let angle = 0;
  const slices = entries.map((e,idx)=>{
    const frac = totalPeriodo>0 ? e.valor/totalPeriodo : 0;
    const sweep = frac*Math.PI*2;
    const a0 = angle + gap/2;
    const a1 = angle + sweep - gap/2;
    angle += sweep;
    const path = donutSlicePath(cx,cy,rOut,rIn,a0,a1);
    const midAngle = (a0+a1)/2;
    const [lx,ly] = polarXY(cx,cy,(rOut+rIn)/2,midAngle);
    const showLabel = e.pct>=6;
    return `
      <path class="donut-slice" data-slice-idx="${panelId}-${idx}" data-tip-nome="${e.nome}" data-tip-valor="${fmt(e.valor)}" data-tip-pct="${fmt(e.pct,1)}"
        d="${path}" fill="${e.cor}" tabindex="0" role="img" aria-label="${e.nome}: R$ ${fmt(e.valor)}, ${fmt(e.pct,1)}% ${labelPeriodo}"></path>
      ${showLabel ? `<text class="donut-label" x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle">${fmt(e.pct,0)}%</text>` : ''}
    `;
  }).join('');

  const legenda = entries.map((e,idx)=>`
    <div class="legenda-row" data-legenda-idx="${panelId}-${idx}">
      <span class="legenda-swatch" style="background:${e.cor}"></span>
      <span class="legenda-nome">${e.nome}</span>
      <span class="legenda-valor">R$ ${fmt(e.valor)}</span>
      <span class="legenda-pct">${fmt(e.pct,1)}%</span>
    </div>
  `).join('');

  return `
  <div class="card" style="margin-bottom:22px;">
    <div class="card-pad">
      <p class="eyebrow" style="margin:0 0 4px;">${eyebrow}</p>
      <h3 style="font-family:'Fraunces',serif; font-size:16px; color:var(--verde-escuro); margin:0 0 ${labelPeriodo==='no ano'?'4px':'16px'};">${titulo}</h3>
      ${labelPeriodo==='no ano' ? `<p class="hint" style="margin:0 0 16px;">Estimativa: soma, mês a mês, a despesa real cadastrada quando existe ou o valor recorrente atual como substituto — não é o gasto já efetivamente lançado, e sim uma projeção pro ano.</p>` : ''}
      <div class="painel-resultados">
        <div class="donut-wrap">
          <svg class="donut-svg" viewBox="0 0 220 220" width="220" height="220">
            ${slices}
            <text class="donut-center-value" x="110" y="104" text-anchor="middle">R$ ${fmt(totalPeriodo,0)}</text>
            <text class="donut-center-label" x="110" y="123" text-anchor="middle">${labelPeriodo}</text>
          </svg>
        </div>
        <div class="painel-legenda">${legenda}</div>
      </div>
    </div>
  </div>`;
}

// Saída de Ração é uma tabela só, compartilhada entre lotes de Confinamento e
// de Cria; para separar os dois no painel de resultados, é preciso checar o
// tipo do lote de destino de cada lançamento.
function racaoLoteTipo(s){ const lote = state.lotes.find(l=>l.id===s.loteId); return lote ? loteTipo(lote) : null; }

// 1 arroba ≈ 30 kg de peso vivo ganho (padrão de mercado — a arroba em si é
// uma medida de carcaça de 15 kg, mas o rendimento de carcaça de boi gordo
// gira em torno de 50%, então 30 kg de peso vivo vira ~1 @ de carcaça).
const KG_POR_ARROBA = 30;

// Numa venda por abate, o peso lançado é o peso de CARCAÇA vindo do
// frigorífico (não peso vivo) — então a conversão usa a arroba "cheia" de
// 15 kg, sem o desconto de rendimento de carcaça usado na Pesagem (que
// parte de peso vivo).
const KG_POR_ARROBA_CARCACA = 15;
const TIPO_VENDA_LABEL = {arroba:'Abate', cabeca:'Venda por animal', kg:'Venda por kg'};
// Só faz sentido calcular @ na venda por abate (tipoVenda==='arroba') — nos
// outros dois tipos o preço já não depende de arroba nenhuma.
function arrobasVenda(v){ return (Number(v.pesoMedioKg||0)/KG_POR_ARROBA_CARCACA) * Number(v.quantidade||0); }
// Valor total de uma venda, de acordo com o tipo escolhido:
// - 'arroba' (abate): arrobas de carcaça × valor da arroba paga.
// - 'cabeca' (venda por animal): valor fechado por animal × quantidade.
// - 'kg' (venda por peso vivo): peso por animal × quantidade × valor do kg.
function valorVenda(v){
  const qtd = Number(v.quantidade||0);
  if(v.tipoVenda==='cabeca') return qtd * Number(v.valorPorAnimal||0);
  if(v.tipoVenda==='kg') return qtd * Number(v.pesoMedioKg||0) * Number(v.valorKg||0);
  return arrobasVenda(v) * Number(v.valorArroba||0);
}

function pesagensDoLote(loteId){
  return state.pesagens.filter(p=>p.loteId===loteId).sort((a,b)=> a.data.localeCompare(b.data) || a.id-b.id);
}
// Ganho de peso (kg/dia) entre duas pesagens consecutivas do mesmo lote.
function gmdEntre(pesoAnterior, pesoAtual, dataAnterior, dataAtual){
  const dias = (new Date(dataAtual) - new Date(dataAnterior)) / 86400000;
  return dias>0 ? (pesoAtual-pesoAnterior)/dias : null;
}
// Peso do lote na pesagem mais recente até (incluirIgual=true) ou antes de
// (incluirIgual=false) uma data — usado pra "ganho de peso dentro do mês",
// que precisa do peso mais próximo de antes do mês começar.
function pesoNaData(loteId, dataLimite, incluirIgual){
  let resultado = null;
  pesagensDoLote(loteId).forEach(p=>{
    if(incluirIgual ? p.data<=dataLimite : p.data<dataLimite) resultado = p;
  });
  return resultado;
}
// Ganho de peso do lote dentro de um mês: usa a pesagem mais recente até o
// fim do mês menos a pesagem mais recente antes do mês começar; sem pesagem
// anterior ao mês, cai pra primeira x última pesagem dentro do próprio mês
// (se houver ao menos duas). Sem dado suficiente, retorna null.
function ganhoPesoNoMes(loteId, mesStr){
  const ano = Number(mesStr.slice(0,4)), mes = Number(mesStr.slice(5,7));
  const fimMes = new Date(ano, mes, 0).toISOString().slice(0,10);
  const inicioMes = `${mesStr}-01`;
  const final = pesoNaData(loteId, fimMes, true);
  if(!final) return null;
  let inicial = pesoNaData(loteId, inicioMes, false);
  if(!inicial){
    const doMes = state.pesagens.filter(p=>p.loteId===loteId && p.data.startsWith(mesStr)).sort((a,b)=>a.data.localeCompare(b.data));
    if(doMes.length<2) return null;
    inicial = doMes[0];
  }
  if(inicial.data>=final.data) return null;
  return {ganhoKg: Number(final.pesoMedioKg)-Number(inicial.pesoMedioKg), dataInicial:inicial.data, dataFinal:final.data};
}
// @ produzidas por um lote num mês = ganho de peso (kg) ÷ 30 × nº de animais.
function arrobasProduzidasNoMes(loteId, mesStr, numeroAnimais){
  const ganho = ganhoPesoNoMes(loteId, mesStr);
  if(!ganho) return null;
  return (ganho.ganhoKg/KG_POR_ARROBA) * Number(numeroAnimais||0);
}
function arrobasProduzidasFazendaNoMes(mesStr){
  return state.lotes.filter(l=>!l.dataFim).reduce((a,l)=>{
    const arrobas = arrobasProduzidasNoMes(l.id, mesStr, l.numeroAnimais);
    return a + (arrobas||0);
  }, 0);
}

function precoArrobaAtual(){
  if(state.precosArroba.length===0) return null;
  return [...state.precosArroba].sort((a,b)=> b.data.localeCompare(a.data) || b.id-a.id)[0];
}

const NOMES_MES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function custoVariavelDoMes(mesStr){
  const racao = state.saidasRacao.filter(s=>s.data.startsWith(mesStr)).reduce((a,s)=>a+custoSaidaRacao(s),0);
  const pasto = state.pasto.filter(p=>p.data.startsWith(mesStr)).reduce((a,p)=>a+custoPasto(p),0);
  const reproducao = state.reproducao.filter(r=>r.data.startsWith(mesStr)).reduce((a,r)=>a+custoReproducao(r),0);
  return racao + pasto + reproducao;
}

// Custo fixo real daquele mês, se cadastrado (ex: importado de um relatório
// histórico); senão, cai para os custos fixos "recorrentes" (mes em branco),
// que representam o valor mensal atual/projetado. Essa escolha (mês
// específico vs. recorrente) é feita centro de custo por centro de custo —
// cada grupo (mesmo nome+categoria) tem seu próprio fallback independente,
// senão um centro de custo com lançamento de um mês faria os outros centros
// (sem lançamento próprio naquele mês) sumirem em vez de cair no recorrente.
function custosFixosDoMes(mesStr){
  const grupos = new Map();
  state.custosFixos.forEach(c=>{
    // as atividades entram na chave pra não misturar, no mesmo grupo de
    // fallback mês-específico/recorrente, duas "contas" que só coincidem de
    // nome e centro de custo mas têm atividades diferentes (ex: Insumos
    // Pecuários indireto vs. Insumos Pecuários — Reprodução, que é direto
    // da Cria).
    const chaveAreas = (c.areas||[]).slice().sort().join(',');
    const chave = `${c.nome}||${c.categoria||''}||${chaveAreas}`;
    if(!grupos.has(chave)) grupos.set(chave, []);
    grupos.get(chave).push(c);
  });
  const resultado = [];
  grupos.forEach(rows=>{
    const doMes = rows.filter(c=>c.mes===mesStr);
    resultado.push(...(doMes.length>0 ? doMes : rows.filter(c=>!c.mes)));
  });
  return resultado;
}
function fixosDoMes(mesStr){
  return custosFixosDoMes(mesStr).reduce((a,c)=>a+Number(c.valorMensal||0),0);
}
function receitaDoMes(mesStr){
  return state.receitas.filter(r=>r.data.startsWith(mesStr)).reduce((a,r)=>a+Number(r.valor||0),0);
}
// Quanto de UMA despesa (já filtrada pro mês) cai em cada atividade —
// nenhuma atividade marcada (Geral) rateia por cabeça entre as três; uma
// marcada vai 100% pra ela; duas ou três marcadas rateiam por cabeça só
// entre as marcadas (ex: Pasto+Cria sem pesar no Confinamento). Usado tanto
// pra somar o total de cada área quanto pra listar, despesa por despesa, o
// que compõe cada fatia do gráfico "por área" (clique numa fatia pra ver
// o detalhe).
function alocarDespesaPorArea(c, ctx){
  const v = Number(c.valorMensal||0);
  const areas = (c.areas && c.areas.length) ? c.areas : ['confinamento','pasto','cria'];
  const resultado = {confinamento:0, pasto:0, cria:0};
  if(areas.length===1){
    resultado[areas[0]] = v;
    return resultado;
  }
  const animaisPorArea = {confinamento:ctx.animaisConfinamento, pasto:ctx.animaisPasto, cria:ctx.animaisCria};
  const totalAnimaisAreas = areas.reduce((a,ar)=>a+animaisPorArea[ar],0);
  if(totalAnimaisAreas>0) areas.forEach(ar=>{ resultado[ar] = v*(animaisPorArea[ar]/totalAnimaisAreas); });
  return resultado;
}
// Soma (e detalha, despesa por despesa) o custo fixo de cada área para um
// conjunto de linhas de despesa já filtradas pro(s) mês(es) desejado(s).
function alocarDespesasPorArea(rows, ctx){
  let confinamento=0, pasto=0, cria=0;
  const detalhes = {confinamento:[], pasto:[], cria:[]};
  rows.forEach(c=>{
    const aloc = alocarDespesaPorArea(c, ctx);
    confinamento += aloc.confinamento; pasto += aloc.pasto; cria += aloc.cria;
    if(aloc.confinamento>0) detalhes.confinamento.push({id:c.id, nome:c.nome, mes:c.mes, valor:aloc.confinamento});
    if(aloc.pasto>0) detalhes.pasto.push({id:c.id, nome:c.nome, mes:c.mes, valor:aloc.pasto});
    if(aloc.cria>0) detalhes.cria.push({id:c.id, nome:c.nome, mes:c.mes, valor:aloc.cria});
  });
  return {confinamento, pasto, cria, detalhes};
}

// Custo fixo não tem histórico por mês no app (só o valor mensal atual),
// então o mesmo total é aplicado a todos os meses do ano ao montar o
// comparativo — é uma aproximação, avisada na tela.
function comparativoMensal(){
  const hoje = new Date();
  const ano = hoje.getFullYear();
  const mesAtual = hoje.getMonth();
  const meses = [];
  for(let m=0; m<=mesAtual; m++){
    const mesStr = `${ano}-${String(m+1).padStart(2,'0')}`;
    const despesa = custoVariavelDoMes(mesStr) + fixosDoMes(mesStr);
    const receita = receitaDoMes(mesStr);
    meses.push({mesStr, label: `${NOMES_MES[m]}/${ano}`, despesa, receita, resultado: receita-despesa});
  }
  return meses;
}
function comparativoAnual(meses){
  const despesa = meses.reduce((a,m)=>a+m.despesa,0);
  const receita = meses.reduce((a,m)=>a+m.receita,0);
  return {despesa, receita, resultado: receita-despesa};
}

function mesesDoAnoAteAgora(){
  const hoje = new Date();
  const ano = hoje.getFullYear();
  const mesAtual = hoje.getMonth();
  const meses = [];
  for(let m=0; m<=mesAtual; m++) meses.push(`${ano}-${String(m+1).padStart(2,'0')}`);
  return meses;
}

// Mesmo critério de diluição por área do mês atual, somado por todos os
// meses do ano — usa a composição de lotes ativos de hoje pra ratear o
// custo fixo diluível de cada mês passado (aproximação, já que o app não
// guarda o histórico de quantos animais havia em cada mês).
function composicaoPorAreaAno(){
  const lotesAtivos = state.lotes.filter(l=>!l.dataFim);
  const totalAnimais = lotesAtivos.reduce((a,l)=>a+Number(l.numeroAnimais||0),0);
  const animaisPorTipo = tipo => lotesAtivos.filter(l=>loteTipo(l)===tipo).reduce((a,l)=>a+Number(l.numeroAnimais||0),0);
  const animaisConfinamento = animaisPorTipo('confinamento');
  const animaisPasto = animaisPorTipo('pasto');
  const animaisCria = animaisPorTipo('reproducao');
  const animaisPastoCria = animaisPasto + animaisCria;

  // Só a despesa cadastrada (fixo diluído/direto) entra aqui — o lançamento
  // diário de ração/pasto/cria é custo operacional do dia a dia, já visível
  // em Financeiro, e não deve se misturar no resultado por área/centro de
  // custo (que é sobre despesa formal, não sobre consumo diário).
  const ctxArea = {animaisConfinamento, animaisPasto, animaisCria, animaisPastoCria, totalAnimais};
  let confinamento=0, pasto=0, cria=0;
  const detalhesPorArea = {confinamento:[], pasto:[], cria:[]};
  mesesDoAnoAteAgora().forEach(mesStr=>{
    const aloc = alocarDespesasPorArea(custosFixosDoMes(mesStr), ctxArea);
    confinamento += aloc.confinamento;
    pasto += aloc.pasto;
    cria += aloc.cria;
    detalhesPorArea.confinamento.push(...aloc.detalhes.confinamento);
    detalhesPorArea.pasto.push(...aloc.detalhes.pasto);
    detalhesPorArea.cria.push(...aloc.detalhes.cria);
  });
  return composicaoPorArea(confinamento, pasto, cria, detalhesPorArea);
}

// Custos do ano por centro de custo — só despesa cadastrada (custos fixos),
// sem o lançamento diário de ração/pasto/cria (ver comentário acima).
function composicaoCentrosCustoAno(){
  const meses = mesesDoAnoAteAgora();
  const todosFixos = [].concat(...meses.map(m=>custosFixosDoMes(m)));
  return composicaoCentrosCusto(todosFixos);
}

function dadosFinanceiro(){
  const hoje = hojeStr();
  const mes = mesAtualStr();

  const racaoConfHoje = state.saidasRacao.filter(s=>s.data===hoje && racaoLoteTipo(s)==='confinamento').reduce((a,s)=>a+custoSaidaRacao(s),0);
  const racaoCriaHoje = state.saidasRacao.filter(s=>s.data===hoje && racaoLoteTipo(s)==='reproducao').reduce((a,s)=>a+custoSaidaRacao(s),0);
  const racaoHoje = racaoConfHoje + racaoCriaHoje;
  const pastoHoje = state.pasto.filter(p=>p.data===hoje).reduce((a,p)=>a+custoPasto(p),0);
  const reproducaoHoje = state.reproducao.filter(r=>r.data===hoje).reduce((a,r)=>a+custoReproducao(r),0);
  const criaHoje = racaoCriaHoje + reproducaoHoje;
  const custoHoje = racaoHoje + pastoHoje + reproducaoHoje;

  const racaoConfMes = state.saidasRacao.filter(s=>s.data.startsWith(mes) && racaoLoteTipo(s)==='confinamento').reduce((a,s)=>a+custoSaidaRacao(s),0);
  const racaoCriaMes = state.saidasRacao.filter(s=>s.data.startsWith(mes) && racaoLoteTipo(s)==='reproducao').reduce((a,s)=>a+custoSaidaRacao(s),0);
  const racaoMes = racaoConfMes + racaoCriaMes;
  const pastoMes = state.pasto.filter(p=>p.data.startsWith(mes)).reduce((a,p)=>a+custoPasto(p),0);
  const reproducaoMes = state.reproducao.filter(r=>r.data.startsWith(mes)).reduce((a,r)=>a+custoReproducao(r),0);
  const criaMes = racaoCriaMes + reproducaoMes;
  const variavelMes = racaoMes + pastoMes + reproducaoMes;
  const fixosMes = fixosDoMes(mes);
  const totalMes = variavelMes + fixosMes;

  const lotesAtivos = state.lotes.filter(l=>!l.dataFim);
  const totalAnimais = lotesAtivos.reduce((a,l)=>a+Number(l.numeroAnimais||0),0);
  const custoPorAnimalHoje = totalAnimais>0 ? custoHoje/totalAnimais : 0;

  const fixoDiario = fixosMes/30;
  const custoTotalPorAnimalDia = totalAnimais>0 ? (custoHoje+fixoDiario)/totalAnimais : 0;
  const custoTotalPorAnimalMes = totalAnimais>0 ? totalMes/totalAnimais : 0;

  // Custo fixo (mão de obra, energia etc.) diluído por área, na proporção do
  // número de animais de cada uma — mesmo critério já usado em Por Curral.
  // Uma despesa com nenhuma atividade marcada (Geral) rateia por cabeça
  // entre as três; com uma marcada, vai 100% pra ela; com duas ou três
  // marcadas, rateia por cabeça só entre as marcadas.
  const animaisPorTipo = tipo => lotesAtivos.filter(l=>loteTipo(l)===tipo).reduce((a,l)=>a+Number(l.numeroAnimais||0),0);
  const animaisConfinamento = animaisPorTipo('confinamento');
  const animaisPasto = animaisPorTipo('pasto');
  const animaisCria = animaisPorTipo('reproducao');
  const ctxArea = {animaisConfinamento, animaisPasto, animaisCria};
  const alocacaoArea = alocarDespesasPorArea(custosFixosDoMes(mes), ctxArea);
  const fixoConfinamento = alocacaoArea.confinamento;
  const fixoPasto = alocacaoArea.pasto;
  const fixoCria = alocacaoArea.cria;
  const detalhesPorArea = alocacaoArea.detalhes;
  const custoTotalConfinamentoMes = racaoConfMes + fixoConfinamento;
  const custoTotalPastoMes = pastoMes + fixoPasto;
  const custoTotalCriaMes = criaMes + fixoCria;

  const valorEstoque = state.ingredientes.reduce((a,i)=>{
    const saldo = saldoIngrediente(i.id);
    return a + qtdEmKg(saldo, i.unidade)*i.precoKg;
  }, 0);

  const receitaMes = state.receitas.filter(r=>r.data.startsWith(mes)).reduce((a,r)=>a+Number(r.valor||0),0);
  const resultadoMes = receitaMes - totalMes;
  const margemAtualPct = receitaMes>0 ? (resultadoMes/receitaMes*100) : null;

  const arrobasMes = arrobasProduzidasFazendaNoMes(mes);
  const custoPorArrobaMes = arrobasMes>0 ? totalMes/arrobasMes : null;

  return {hoje, mes, racaoConfHoje, racaoCriaHoje, racaoHoje, pastoHoje, reproducaoHoje, criaHoje, custoHoje,
    racaoConfMes, racaoCriaMes, racaoMes, pastoMes, reproducaoMes, criaMes, variavelMes, fixosMes, totalMes,
    fixoConfinamento, fixoPasto, fixoCria, detalhesPorArea,
    custoTotalConfinamentoMes, custoTotalPastoMes, custoTotalCriaMes, receitaMes, resultadoMes, margemAtualPct,
    totalAnimais, custoPorAnimalHoje, custoTotalPorAnimalDia, custoTotalPorAnimalMes, valorEstoque, arrobasMes, custoPorArrobaMes};
}

/* ---- Financeiro: Por Curral ---- */
function PageFinanceiroCurral(){
  const d = dadosFinanceiro();

  // O custo fixo de cada área (dadosFinanceiro já rateia despesa por
  // despesa entre Confinamento/Pasto/Cria) ainda precisa ser dividido entre
  // os lotes daquela área — na proporção do número de animais de cada um.
  const lotesAtivos = state.lotes.filter(l=>!l.dataFim);
  const animaisPorTipoCurral = tipo => lotesAtivos.filter(l=>loteTipo(l)===tipo).reduce((a,l)=>a+Number(l.numeroAnimais||0),0);
  const animaisPorAreaMes = {confinamento: animaisPorTipoCurral('confinamento'), pasto: animaisPorTipoCurral('pasto'), reproducao: animaisPorTipoCurral('reproducao')};
  const fixoAreaMes = {confinamento: d.fixoConfinamento, pasto: d.fixoPasto, reproducao: d.fixoCria};
  function fixoLoteAlocado(lote, fixoDaAreaNoPeriodo){
    const tipo = loteTipo(lote);
    const totalAnimaisArea = animaisPorAreaMes[tipo];
    return totalAnimaisArea>0 ? fixoDaAreaNoPeriodo*(Number(lote.numeroAnimais||0)/totalAnimaisArea) : 0;
  }

  const custosPorLote = lotesAtivos.map(l=>{
    const racao = state.saidasRacao.filter(s=>s.data===d.hoje && s.loteId===l.id).reduce((a,s)=>a+custoSaidaRacao(s),0);
    const pasto = state.pasto.filter(p=>p.data===d.hoje && p.loteId===l.id).reduce((a,p)=>a+custoPasto(p),0);
    const reproducao = state.reproducao.filter(r=>r.data===d.hoje && r.loteId===l.id).reduce((a,r)=>a+custoReproducao(r),0);
    const variavel = racao + pasto + reproducao;
    const fixoAlocado = fixoLoteAlocado(l, fixoAreaMes[loteTipo(l)]/30);
    const total = variavel + fixoAlocado;
    const porAnimal = l.numeroAnimais>0 ? total/l.numeroAnimais : 0;
    return {lote:l, racao, pasto, reproducao, fixoAlocado, total, porAnimal};
  }).sort((a,b)=> b.total-a.total);

  const custosMesPorLote = lotesAtivos.map(l=>{
    const racao = state.saidasRacao.filter(s=>s.data.startsWith(d.mes) && s.loteId===l.id).reduce((a,s)=>a+custoSaidaRacao(s),0);
    const pasto = state.pasto.filter(p=>p.data.startsWith(d.mes) && p.loteId===l.id).reduce((a,p)=>a+custoPasto(p),0);
    const reproducao = state.reproducao.filter(r=>r.data.startsWith(d.mes) && r.loteId===l.id).reduce((a,r)=>a+custoReproducao(r),0);
    const variavel = racao + pasto + reproducao;
    const fixoAlocado = fixoLoteAlocado(l, fixoAreaMes[loteTipo(l)]);
    const total = variavel + fixoAlocado;
    const porAnimal = l.numeroAnimais>0 ? total/l.numeroAnimais : 0;
    const arrobas = arrobasProduzidasNoMes(l.id, d.mes, l.numeroAnimais);
    const custoPorArroba = arrobas>0 ? total/arrobas : null;
    return {lote:l, racao, pasto, reproducao, fixoAlocado, total, porAnimal, arrobas, custoPorArroba};
  }).sort((a,b)=> b.total-a.total);

  // Mesmos dados de custosMesPorLote, só que somados por área (Confinamento/
  // Pasto/Cria) em vez de por lote individual — pra comparar categorias.
  const custoPorAreaMes = ['confinamento','pasto','reproducao'].map(tipo=>{
    const lotesArea = custosMesPorLote.filter(r=>loteTipo(r.lote)===tipo);
    const totalAnimais = lotesArea.reduce((a,r)=>a+Number(r.lote.numeroAnimais||0),0);
    const totalCusto = lotesArea.reduce((a,r)=>a+r.total,0);
    const totalArrobas = lotesArea.reduce((a,r)=>a+(r.arrobas||0),0);
    return {
      tipo, label: TIPO_PESAGEM_LABEL[tipo], numeroLotes: lotesArea.length, totalAnimais, totalCusto, totalArrobas,
      custoPorArroba: totalArrobas>0 ? totalCusto/totalArrobas : null,
      custoPorAnimal: totalAnimais>0 ? totalCusto/totalAnimais : null,
    };
  }).filter(r=>r.numeroLotes>0);

  return `
  <p class="eyebrow" style="margin-bottom:10px;">Custo diário por curral (ração + pasto + cria + fatia do custo fixo)</p>
  <div class="card" style="margin-bottom:22px;">
    ${custosPorLote.length===0 ? Empty('Nenhum lote ativo','Cadastre lotes em Confinamento, Pasto ou Cria para ver o custo diário de cada um aqui.') : `
    <table>
      <thead><tr><th>Curral</th><th>Nº animais</th><th>Ração hoje</th><th>Pasto hoje</th><th>Cria hoje</th><th>Custo fixo (dia)</th><th>Total hoje</th><th>Custo/animal hoje</th></tr></thead>
      <tbody>
        ${custosPorLote.map(r=>`
          <tr>
            <td><strong>${r.lote.nome}</strong></td>
            <td class="mono">${fmtInt(r.lote.numeroAnimais)}</td>
            <td class="mono">R$ ${fmt(r.racao)}</td>
            <td class="mono">R$ ${fmt(r.pasto)}</td>
            <td class="mono">R$ ${fmt(r.reproducao)}</td>
            <td class="mono">R$ ${fmt(r.fixoAlocado)}</td>
            <td class="mono">R$ ${fmt(r.total)}</td>
            <td class="mono">R$ ${fmt(r.porAnimal,2)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`}
  </div>
  <p class="hint" style="margin:-14px 0 22px;">O custo fixo mensal é diluído por dia (mensal ÷ 30) e depois rateado entre os currais na proporção do número de animais de cada um — mesmo critério do total do mês, abaixo.</p>

  <p class="eyebrow" style="margin-bottom:10px;">Custo total do mês por curral (ração + pasto + cria + fatia do custo fixo)</p>
  <div class="card" style="margin-bottom:22px;">
    ${custosMesPorLote.length===0 ? Empty('Nenhum lote ativo','Cadastre lotes em Confinamento, Pasto ou Cria para ver o custo total do mês de cada um aqui.') : `
    <table>
      <thead><tr><th>Curral</th><th>Nº animais</th><th>Ração+Pasto+Cria no mês</th><th>Custo fixo alocado</th><th>Total no mês</th><th>Custo/animal no mês</th><th>@ produzidas</th><th>Custo/@</th></tr></thead>
      <tbody>
        ${custosMesPorLote.map(r=>`
          <tr>
            <td><strong>${r.lote.nome}</strong></td>
            <td class="mono">${fmtInt(r.lote.numeroAnimais)}</td>
            <td class="mono">R$ ${fmt(r.racao+r.pasto+r.reproducao)}</td>
            <td class="mono">R$ ${fmt(r.fixoAlocado)}</td>
            <td class="mono">R$ ${fmt(r.total)}</td>
            <td class="mono">R$ ${fmt(r.porAnimal,2)}</td>
            <td class="mono">${r.arrobas!==null ? fmt(r.arrobas,1)+' @' : '—'}</td>
            <td class="mono">${r.custoPorArroba!==null ? 'R$ '+fmt(r.custoPorArroba,2) : '—'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`}
  </div>
  <p class="hint" style="margin:-14px 0 22px;">O custo fixo de cada curral é alocado na proporção do número de animais dele em relação ao total de animais em lotes ativos. "@ produzidas" vem do ganho de peso do lote no mês (Pesagem) ÷ 30 kg × nº de animais — sem pesagem cadastrada no mês, aparece "—".</p>

  <p class="eyebrow" style="margin-bottom:10px;">Custo por @ produzida — por área</p>
  <div class="card">
    ${custoPorAreaMes.length===0 ? Empty('Nenhum lote ativo','Cadastre lotes em Confinamento, Pasto ou Cria para comparar o custo por @ produzida entre as áreas.') : `
    <table>
      <thead><tr><th>Área</th><th>Lotes</th><th>Nº animais</th><th>Total no mês</th><th>Custo/animal</th><th>@ produzidas</th><th>Custo/@</th></tr></thead>
      <tbody>
        ${custoPorAreaMes.map(r=>`
          <tr>
            <td><strong>${r.label}</strong></td>
            <td class="mono">${r.numeroLotes}</td>
            <td class="mono">${fmtInt(r.totalAnimais)}</td>
            <td class="mono">R$ ${fmt(r.totalCusto)}</td>
            <td class="mono">${r.custoPorAnimal!==null ? 'R$ '+fmt(r.custoPorAnimal,2) : '—'}</td>
            <td class="mono">${r.totalArrobas>0 ? fmt(r.totalArrobas,1)+' @' : '—'}</td>
            <td class="mono">${r.custoPorArroba!==null ? 'R$ '+fmt(r.custoPorArroba,2) : '—'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`}
  </div>
  <p class="hint" style="margin-top:12px;">Soma dos lotes de cada área (mesmos dados da tabela "Por Lote" acima) — útil pra comparar, por exemplo, se o Confinamento está produzindo @ mais barata que o Pasto.</p>`;
}

function PageFinanceiroCustosFixos(){
  const busca = state.searchDespesas.toLowerCase();
  const mesesDisponiveis = [...new Set(state.custosFixos.map(c=>c.mes).filter(Boolean))].sort((a,b)=>b.localeCompare(a));
  const list = [...state.custosFixos].filter(c=>
    (!busca || c.nome.toLowerCase().includes(busca) || (c.categoria||'').toLowerCase().includes(busca))
    && (!state.filtroMesDespesas || (state.filtroMesDespesas==='__recorrente__' ? !c.mes : c.mes===state.filtroMesDespesas))
  ).sort((a,b)=>{

  return `

      <thead><tr><th>Nome</th><th>Centro de custo</th><th>Mês</th><th>Data</th><th>Área</th><th>Valor</th><th>Observação</th><th></th></tr></thead>

            <td style="display:flex; gap:6px;">
              ${temPermissao('financeiro','editar') ? `

          </tr>
        `).join('')}
      </tbody>
    </table>`}
  </div>
  <p class="hint" style="margin:14px 0 0;">"Recorrente" é o valor mensal atual, usado em qualquer mês que não tenha um custo fixo próprio cadastrado. Cadastrar um custo fixo com um mês específico (ex: a partir de um relatório histórico) substitui o recorrente só naquele mês, para refletir o gasto real.</p>`;
