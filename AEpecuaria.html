        ({error} = await db.from('config_financeiro').upsert({id:1, meta_margem_pct:pct}));
      } else if(type==='hectares'){
        const hectares = Number(document.getElementById('f-hectares').value)||0;
        ({error} = await db.from('config_fazenda').upsert({id:1, hectares}));
      } else if(type==='permissoes'){
        const papel = document.getElementById('f-papelusuario').value;
        const ativo = document.getElementById('f-ativousuario').checked;
        const permissoes = {};
        document.querySelectorAll('[data-perm-modulo]').forEach(sel=>{ permissoes[sel.dataset.permModulo] = sel.value; });
        ({error} = await db.from('profiles').update({papel, ativo, permissoes}).eq('id', editDraft._perfilId));
      } else if(type==='trocarSenha'){
        const senhaAtual = document.getElementById('f-senhaatual').value;
        const novaSenha = document.getElementById('f-novasenha').value;
        const confirmarSenha = document.getElementById('f-confirmarsenha').value;
        if(!senhaAtual || !novaSenha || !confirmarSenha){ alert('Preencha todos os campos.'); return; }
        if(novaSenha.length<6){ alert('A nova senha precisa ter pelo menos 6 caracteres.'); return; }
        if(novaSenha!==confirmarSenha){ alert('A confirmação não bate com a nova senha.'); return; }
        const email = `${state.perfil.usuario}@${DOMINIO_LOGIN}`;
        const { error: erroSenhaAtual } = await db.auth.signInWithPassword({ email, password: senhaAtual });
        if(erroSenhaAtual){ alert('Senha atual incorreta.'); return; }
        ({error} = await db.auth.updateUser({ password: novaSenha }));
        if(error){ alert('Não foi possível trocar a senha: ' + error.message); return; }
        state.modal = null; editDraft = null;
        alert('Senha alterada com sucesso.');
        render();
        return;
      }
      if(error){
        alert('Não foi possível salvar: ' + error.message);
        return;
      }
      state.modal = null; editDraft = null;
      await loadAll();
    };
  }

  // painel de resultados: hover sincronizado entre gráfico e legenda
  const tooltip = document.getElementById('painel-tooltip');
  const clearHovers = ()=>{
    document.querySelectorAll('.donut-slice.hover, .legenda-row.hover').forEach(el=>el.classList.remove('hover'));
  };
  document.querySelectorAll('[data-slice-idx]').forEach(el=>{
    const idx = el.dataset.sliceIdx;
    el.addEventListener('pointerenter', ()=>{
      clearHovers();
      el.classList.add('hover');
      const row = document.querySelector(`[data-legenda-idx="${idx}"]`);
      if(row) row.classList.add('hover');
      if(tooltip){
        tooltip.innerHTML = `<div class="v">R$ ${el.dataset.tipValor}</div><div class="l">${el.dataset.tipNome} · ${el.dataset.tipPct}%</div>`;
        tooltip.style.display = 'block';
      }
    });
    el.addEventListener('pointermove', (e)=>{
      if(tooltip){ tooltip.style.left = (e.clientX+14)+'px'; tooltip.style.top = (e.clientY+14)+'px'; }
    });
    el.addEventListener('pointerleave', ()=>{
      clearHovers();
      if(tooltip) tooltip.style.display = 'none';
    });
    el.addEventListener('focus', ()=>{
      clearHovers();
      el.classList.add('hover');
      const row = document.querySelector(`[data-legenda-idx="${idx}"]`);
      if(row) row.classList.add('hover');
    });
    el.addEventListener('blur', clearHovers);
  });
  document.querySelectorAll('[data-legenda-idx]').forEach(el=>{
    const idx = el.dataset.legendaIdx;
    el.addEventListener('pointerenter', ()=>{
      clearHovers();
      el.classList.add('hover');
      const slice = document.querySelector(`[data-slice-idx="${idx}"]`);
      if(slice) slice.classList.add('hover');
    });
    el.addEventListener('pointerleave', clearHovers);
  });
}

initAuth();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js'));
}

// tenta sincronizar a fila offline assim que o navegador avisar que voltou
// a conexão, e periodicamente como reforço (o evento 'online' nem sempre
// dispara de forma confiável em todo dispositivo/navegador).
window.addEventListener('online', tentarSincronizarFila);
setInterval(tentarSincronizarFila, 30000);
// se sobrou algo pendente de uma sessão anterior (app fechado antes de
// sincronizar), tenta assim que o app abre de novo.
setTimeout(tentarSincronizarFila, 3000);
</script>
